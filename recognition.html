<script>
"use strict";

let INDEX=[];
let MANIFEST=null;
let MEDIA={};
let CONSTELLATIONS=null;
let SPECIES=null;
let ARCHIVE_SNAPSHOT=null;
const RECORDS=new Map();
const SHARDS=new Map();
let canonicalPromise=null;
let renderSequence=0;
let firstRecord=true;

const page=document.getElementById("page");
const view=document.getElementById("record-view");
const themeButton=document.getElementById("theme");
const themeColor=document.getElementById("theme-color");
const recordStatus=document.getElementById("record-status");
page.setAttribute("aria-busy","true");
const RELEASE_URL=/^https:\/\/github\.com\/[^/]+\/[^/]+\/releases\/download\/[^/]+\/[^/?#]+$/;
const ID_RE=/^UC-G?\d+$/;

function esc(value){
  return String(value==null?"":value)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function safeId(value){
  const id=String(value==null?"":value).toUpperCase();
  return ID_RE.test(id)?id:"";
}
function resolveId(value){const id=safeId(value);return safeId(MANIFEST&&MANIFEST.redirects&&MANIFEST.redirects[id]||id);}
function safeUrl(value){
  try{const url=new URL(String(value==null?"":value).trim());return /^https?:$/.test(url.protocol)?url.href:"#";}
  catch(_){return "#";}
}
function safeSrc(value){
  const src=String(value==null?"":value).trim();
  if(/^images\/[A-Za-z0-9._/-]+$/.test(src)||RELEASE_URL.test(src)) return src;
  return "";
}
function normal(value){
  return String(value==null?"":value).normalize("NFKC").toLowerCase().replace(/[’‘]/g,"'").replace(/\s+/g," ").trim();
}
function mediaSrc(src){
  const entry=MEDIA[src];
  return entry&&entry.location==="release"&&RELEASE_URL.test(entry.url||"")?entry.url:src;
}
function asEntry(record){
  return {
    id:record.id,sh:-1,u:record.universe,y:record.years||"",d:record.designer||"",
    a:record.actor||"",c:record.character||"",p:record.production||"",tf:record.transform||0,
    kw:[record.knownFor,record.reveal].filter(Boolean).join(" "),kind:record.kind||"",k:record.kind==="voice"?1:0,

function parseMakers(value){
  if(!value) return [];
  return String(value)
    .split(/\s*[·•|;\/]\s*|,\s+(?=(?:sculpt|makeup|design|prosthetic|supv|key|from|over|with)\b)/i)
    .map((part)=>part
      .replace(/^\s*(?:special\s+)?(?:burn\s+)?(?:makeup(?:\s+effects)?|prosthetics?|costume|creature\s+design|character\s+design|performance\s+capture|mo-?cap|sculpt(?:or|ing)?|design(?:ed|s)?|created|key\s+\w+|supervis(?:ed|or)|animatronics?|puppet(?:eer|ry)?)\b\s*(?:by|:|—|-|effects)?\s*/i,"")
      .replace(/\bsupv\.?\b/ig,"").replace(/\(.*?\)/g,"")
      .replace(/^[\s,–—-]+|[\s,–—-]+$/g,"").trim())
    .filter(Boolean)
    .filter((name)=>name.length>=3&&name.length<=60&&/[A-Z]/.test(name)&&!/\b(own|vary|varies|concept|features|frame|team|his|her|their|from|suit)\b/i.test(name));
}
function performerParts(value){
  return String(value||"").split(/\s+(?:&|and)\s+|\s*\/\s*/i)
    .map((name)=>name.replace(/\s+\((?:voice|body|suit|performance|puppeteer)[^)]*\)$/i,"").trim())
    .filter((name)=>name.split(/\s+/).length>=2&&name.length>=4)
    .map((display)=>({display,key:normal(display)}));
}

const METHOD_RULES=[
  {key:"capture",label:"Performance capture",pattern:/\b(?:performance|motion)\s+capture\b|\bmo-?cap\b|\bdigital skin\b|\bpixels? instead of\b/i},
  {key:"puppetry",label:"Puppetry & animatronics",pattern:/\bpuppet(?:eer|ry|s)?\b|\banimatronic(?:s)?\b|\bmuppet\b/i},
  {key:"suit",label:"Suit & costume performance",pattern:/\b(?:creature|monster|body|rubber|gorilla|wookiee|xenomorph)\s+suit\b|\bfull[- ]body\s+(?:suit|costume)\b|\binside (?:the )?suit\b|\bcostume by\b/i},
  {key:"mask",label:"Mask performance",pattern:/\bmask(?:ed|s)?\b|\bhelmet(?:ed)?\b/i},
  {key:"prosthetic",label:"Prosthetic makeup",pattern:/\bprosthetic(?:s)?\b|\bmakeup\b|\bappliance(?:s)?\b|\bfoam latex\b|\bsilicone\b|\blife cast\b|\bhours? (?:in|the) (?:makeup )?chair\b/i},
  {key:"body-led",label:"Body-led creature work",pattern:/\bbody cast\b|\bcast (?:him|her|them) for (?:his|her|their) (?:body|frame)\b|\bcreature performer\b|\bhyper[- ]?flexible\b|\bcontortion(?:ist|ism)?\b/i}
];
const CONDITION_LABELS={

  "extended-application":"Extended application","full-body-enclosure":"Full-body enclosure","heat":"Heat",
  "restricted-breathing":"Restricted breathing","restricted-vision":"Restricted vision","stunt-movement":"Stunt movement",
  "suspension-or-harness":"Suspension or harness","voice-strain":"Voice strain","water":"Water","other":"Other documented condition"
};
function methodOf(entry,record){
  if((record&&record.kind)==="voice"||entry.kind==="voice"||entry.k===1||entry.u==="Voice") return {key:"voice",label:"Unseen voice performance"};
  const hay=[entry.d,entry.kw,record&&record.designer,record&&record.reveal,record&&record.knownFor].filter(Boolean).join(" ");
  return METHOD_RULES.find((rule)=>rule.pattern.test(hay))||null;
}
function creditPresent(value){
  const text=String(value||"").trim();
  return Boolean(text&&!/^(?:—|-|unknown|not credited|uncredited)$/i.test(text));
}
function transformLabel(value){
  return ({1:"light",2:"visible",3:"substantial",4:"deep",5:"total"})[Number(value)]||"filed";
}

function loadShard(number){
  if(SHARDS.has(number)) return SHARDS.get(number);
  const meta=MANIFEST&&MANIFEST.shards&&MANIFEST.shards[number];
  if(!meta) return Promise.resolve([]);
  const promise=fetch("./data/"+meta.file+"?v="+encodeURIComponent(meta.sha256||""))
    .then((response)=>{ if(!response.ok) throw new Error("Could not load shard "+number); return response.json(); })
    .then((records)=>{ for(const record of records) RECORDS.set(record.id,record); return records; })
    .catch((error)=>{ SHARDS.delete(number); throw error; });
  SHARDS.set(number,promise);
  return promise;
}
async function loadCanonical(){
  if(canonicalPromise) return canonicalPromise;
  const canonical=ARCHIVE_SNAPSHOT?.canonical?.records;
  const canonicalUrl=(canonical?.path||"./data/specimens.json")+(canonical?.sha256?"?v="+encodeURIComponent(canonical.sha256):"");
  canonicalPromise=fetch(canonicalUrl,{cache:canonical?.sha256?"default":"no-store"})
    .then((response)=>{ if(!response.ok) throw new Error("Could not load canonical roster"); return response.json(); })
    .then((records)=>{ for(const record of records) RECORDS.set(record.id,record); return records; });
  return canonicalPromise;
}
async function ensureRecords(entries){
  const needed=new Set();
  for(const entry of entries){
    if(!RECORDS.has(entry.id)&&Number.isInteger(entry.sh)&&entry.sh>=0) needed.add(entry.sh);
  }
  try{ await Promise.all([...needed].map(loadShard)); }
  catch(_){ await loadCanonical(); }
}
async function loadProjection(){
  try{
    const manifest=await fetch("./data/shard-manifest.json",{cache:"no-cache"}).then((response)=>{ if(!response.ok) throw new Error("manifest"); return response.json(); });
    const index=await fetch("./data/index.json?v="+encodeURIComponent(manifest.index_sha256||"")).then((response)=>{ if(!response.ok) throw new Error("index"); return response.json(); });
    if(!Array.isArray(index)||!manifest||!Array.isArray(manifest.shards)) throw new Error("invalid projections");
    INDEX=index;
    MANIFEST=manifest;
  }catch(_){
    const records=await loadCanonical();
    INDEX=records.map(asEntry);
    MANIFEST={shards:[]};
  }
}
async function loadMedia(){
  try{
    const live=await fetch("./data/media-live.json?v="+encodeURIComponent(MANIFEST?.media_live_sha256||"")).then((response)=>response.ok?response.json():null);
    if(live&&live.urls){
      for(const src in live.urls) MEDIA[src]={url:live.urls[src],location:"release"};

}

function wireRecordControls(position,currentId){
  document.getElementById("prev").addEventListener("click",()=>navigateTo(INDEX[(position-1+INDEX.length)%INDEX.length].id));
  document.getElementById("next").addEventListener("click",()=>navigateTo(INDEX[(position+1)%INDEX.length].id));
  document.getElementById("random").addEventListener("click",()=>{
    if(INDEX.length<2) return;
    let candidate=currentId;
    while(candidate===currentId) candidate=INDEX[Math.floor(Math.random()*INDEX.length)].id;
    navigateTo(candidate);
  });
}
function wireImageFailures(){
  for(const image of view.querySelectorAll(".uc-image-node.has-photo img")){
    image.addEventListener("error",()=>{
      const node=image.closest(".uc-image-node");
      if(!node||node.dataset.failed) return;
      const plate=image.closest("[data-plate]");
      const side=plate?.dataset.plate||"";
      node.dataset.failed="1";
      node.outerHTML=absenceGraphic((image.alt||"Image")+" could not be loaded");
      if(side){
        const pairPlate=document.querySelector(`#pair [data-plate="${side}"]`);
        const pairImage=pairPlate?.querySelector(".uc-image-node.has-photo");
        if(pairImage) pairImage.outerHTML=absenceGraphic((image.alt||"Image")+" could not be loaded");
        const caption=pairPlate?.querySelector(".uc-caption-main");
        if(caption){ caption.textContent="Image could not be loaded."; caption.classList.add("is-missing"); }
        if(pairPlate&&!pairPlate.querySelector(".uc-note")) pairPlate.insertAdjacentHTML("beforeend",`<div class="uc-note">The filed image could not be retrieved. Its provenance remains visible so the failure is not mistaken for missing evidence.</div>`);
        const pair=document.getElementById("pair");
        const hasStill=Boolean(pair?.querySelector('[data-plate="still"] .uc-image-node.has-photo'));
        const hasPortrait=Boolean(pair?.querySelector('[data-plate="portrait"] .uc-image-node.has-photo'));
        const evidence=document.getElementById("record-evidence-status");
        if(evidence) evidence.textContent=hasStill&&hasPortrait?"Character and person images on file":hasStill?"Performer portrait unavailable":hasPortrait?"Character still unavailable":"Filed images unavailable";
      }
    },{once:true});
  }
}

function makerFrequency(name){
  const key=normal(name);
  let count=0;
  for(const entry of INDEX) if(parseMakers(entry.d).some((maker)=>normal(maker)===key)) count++;

}
function sharedPerformer(entry,currentParts){
  const candidate=new Set(performerParts(entry.a).map((part)=>part.key));

}
function rankConnections(entries,current,position){
  return entries.sort((a,b)=>{
    const aProduction=a.p===current.p?1:0,bProduction=b.p===current.p?1:0;
    if(aProduction!==bProduction) return bProduction-aProduction;
    const aShelf=a.u===current.u?1:0,bShelf=b.u===current.u?1:0;
    if(aShelf!==bShelf) return bShelf-aShelf;
    const transformDiff=Math.abs((a.tf||0)-(current.tf||0))-Math.abs((b.tf||0)-(current.tf||0));
    if(transformDiff) return transformDiff;
    return Math.abs(INDEX.indexOf(a)-position)-Math.abs(INDEX.indexOf(b)-position);
  });
}
function buildConnectionPlan(entry,position){
  const currentParts=performerParts(entry.a);
  const performerMatches=rankConnections(INDEX.filter((candidate)=>candidate.id!==entry.id&&sharedPerformer(candidate,currentParts)),entry,position).slice(0,8);
  const sharedName=performerMatches.length?sharedPerformer(performerMatches[0],currentParts):null;

  const makers=parseMakers(entry.d);
  const primary=makers.slice().sort((a,b)=>makerFrequency(b)-makerFrequency(a))[0]||"";
  const primaryKey=normal(primary);
  const makerMatches=primary?rankConnections(INDEX.filter((candidate)=>candidate.id!==entry.id&&parseMakers(candidate.d).some((maker)=>normal(maker)===primaryKey)),entry,position).slice(0,8):[];

  const method=methodOf(entry,null);
  const methodMatches=method?rankConnections(INDEX.filter((candidate)=>candidate.id!==entry.id&&methodOf(candidate,null)?.key===method.key),entry,position).slice(0,8):[];

  const condition=String(entry.co||"").split(/\s+/).filter(Boolean)[0]||"";
  const conditionMatches=condition?rankConnections(INDEX.filter((candidate)=>candidate.id!==entry.id&&String(candidate.co||"").split(/\s+/).includes(condition)),entry,position).slice(0,8):[];

  const species=Array.isArray(entry.sp)?entry.sp[0]:"";
  const speciesMatches=species?rankConnections(INDEX.filter((candidate)=>candidate.id!==entry.id&&Array.isArray(candidate.sp)&&candidate.sp.includes(species)),entry,position).slice(0,8):[];

  return [
    {kind:"performer",lead:"Same performer",key:sharedName?sharedName.display:(currentParts[0]?.display||entry.a),reason:performerMatches.length?"A credited person is the thread across characters that otherwise appear unrelated.":"No other record names this performer exactly enough to make a safe connection yet.",entries:performerMatches},
    ...(species?[{kind:"species",lead:"Same filed species",key:species,reason:speciesMatches.length?"These records share an exact performer-role join to the same maintained source category; prose keywords do not qualify a record.":"No other live record has an exact sourced role in this species category yet.",entries:speciesMatches}]:[]),
    {kind:"maker",lead:"Same maker",key:primary||"No structured maker",reason:makerMatches.length?"The filed maker credit stays visible across the faces it helped build.":(primary?`No other live record shares the parsed maker credit “${primary}” yet.`:"This free-form credit cannot be reduced to a maker name without guessing."),entries:makerMatches},
    {kind:"method",lead:"Same method signal",key:method?method.label:"Not confidently named",reason:methodMatches.length?"This connection is conservatively inferred from words already filed in each record; it is a navigation signal, not new canonical metadata.":(method?"No other record carries the same conservative method signal yet.":"The record does not name a method clearly enough for an honest connection."),entries:methodMatches},
    ...(condition?[{kind:"condition",lead:"Same performance condition",key:CONDITION_LABELS[condition]||condition,reason:conditionMatches.length?"These records share an evidence-backed physical or environmental condition.":"No other sourced record carries this condition yet.",entries:conditionMatches}]:[])
  ];
}
function thumb(record){
  const image=record.still;
  return `<a class="uc-thumb" href="./recognition.html#${safeId(record.id)}" aria-label="Open ${esc(record.character)}, performed by ${esc(record.actor)}">
    <div class="uc-thumb-img">${imageNode(image,record.character)}</div>
    <div class="uc-thumb-name">${esc(record.character)}</div><div class="uc-thumb-sub">${esc(record.actor)}</div>
  </a>`;
}
function renderRails(plan){
  const rails=document.getElementById("rails");
  if(!rails) return;
  rails.innerHTML=plan.map((rail)=>{
    const heading=`<div class="uc-rail-label"><span class="lead">${esc(rail.lead)} · </span><span class="key">${esc(rail.key)}</span></div><div class="uc-rail-reason">${esc(rail.reason)}</div>`;
    if(!rail.entries.length) return `<section class="uc-rail">${heading}<div class="uc-empty-path"><span>Connection not on file.</span><a href="./index.html">Browse the complete wall</a></div></section>`;
    const records=rail.entries.map((entry)=>RECORDS.get(entry.id)).filter(Boolean);
    return `<section class="uc-rail">${heading}<div class="uc-rail-row">${records.map(thumb).join("")}</div></section>`;
  }).join("");
  wireImageFailures();
}
function renderRailsUnavailable(){
  const rails=document.getElementById("rails");
  if(!rails) return;
  rails.innerHTML=`<div class="uc-empty-path" role="status"><span>Connections could not be loaded. The record above remains available.</span><a href="./index.html">Browse the complete wall</a></div>`;
}

async function showRecord(id){
  const requested=resolveId(id);
  const sequence=++renderSequence;
  const position=INDEX.findIndex((entry)=>entry.id===requested);
  if(position<0){ renderError(requested||id); return; }
  const entry=INDEX[position];
  page.setAttribute("aria-busy","true");
  try{
    await ensureRecords([entry]);
    if(sequence!==renderSequence) return;
    const record=RECORDS.get(entry.id);
    if(!record) throw new Error("Record not found in its catalog shard");
    renderRecord(record,entry,position);
    document.title=`${record.character} — UNDERCAST Recognition Loop`;
    try{
      const plan=buildConnectionPlan(entry,position);
      const candidates=[...new Map(plan.flatMap((rail)=>rail.entries).map((candidate)=>[candidate.id,candidate])).values()];
      await ensureRecords(candidates);
      if(sequence!==renderSequence) return;
      renderRails(plan);
    }catch(_){
      if(sequence!==renderSequence) return;
      renderRailsUnavailable();
    }
    page.setAttribute("aria-busy","false");
    recordStatus.textContent=record.kind==="voice"?`Opened ${record.character}, voiced by ${record.actor}.`:`Opened ${record.character}, performed by ${record.actor}.`;
    if(!firstRecord){
      window.scrollTo({top:0,behavior:matchMedia("(prefers-reduced-motion: reduce)").matches?"auto":"smooth"});
      document.getElementById("record-title")?.focus({preventScroll:true});
    }
    firstRecord=false;
  }catch(error){
    if(sequence===renderSequence) renderLoadError(requested,error);
  }
}
function renderError(id){
  page.setAttribute("aria-busy","false");
  view.innerHTML=`<section class="uc-error"><div class="uc-kicker">Record not found</div><h1>${esc(id||"Unknown record")}</h1><p>That catalog number is not present in the live UNDERCAST index. Growth IDs are supported; the record itself still has to exist.</p><a href="./index.html">Browse the wall</a></section>`;
  document.title="Record not found — UNDERCAST";
  recordStatus.textContent=`Record ${id||"unknown"} was not found.`;
}
function renderLoadError(id,error){
  page.setAttribute("aria-busy","false");
  view.innerHTML=`<section class="uc-error"><div class="uc-kicker">Archive unavailable</div><h1>${esc(id||"Record")}</h1><p>The roster could not be read from its projection or canonical fallback. Serve this page over HTTP and keep the data directory beside it.</p><button class="uc-btn" id="retry" type="button" style="margin-top:24px">Retry record</button><span class="uc-sr-only">${esc(error&&error.message)}</span></section>`;
  document.getElementById("retry").addEventListener("click",restart);
  recordStatus.textContent=`Record ${id||"unknown"} could not be loaded.`;
}
function renderLoading(){
  page.setAttribute("aria-busy","true");
  recordStatus.textContent="Loading recognition record.";
  view.innerHTML=`<section class="uc-loading" aria-label="Loading recognition record"><div class="uc-loading-mark" aria-hidden="true"></div><div class="uc-kicker">Recognition loop</div><p>Opening the catalog record and its live connections…</p></section>`;
}
function restart(){
  ++renderSequence;
  INDEX=[];MANIFEST=null;MEDIA={};canonicalPromise=null;firstRecord=true;
  RECORDS.clear();SHARDS.clear();
  renderLoading();
  boot().catch((error)=>renderLoadError(requestedId(),error));
}
function requestedId(){
  let fragment="";
  try{ fragment=decodeURIComponent(location.hash.replace(/^#/,"")); }catch(_){ fragment=""; }
  return fragment||new URLSearchParams(location.search).get("id")||"";
}
function navigateTo(id){
  const safe=safeId(id);
  if(!safe) return;
  if(location.hash==="#"+safe) showRecord(safe);
  else location.hash=safe;
}

function setTheme(theme,persist=true){
  const dark=theme==="dark";
  document.documentElement.dataset.theme=dark?"dark":"light";
  themeButton.textContent=dark?"☀ Light":"☾ Dark";
  themeButton.setAttribute("aria-pressed",String(dark));
  themeColor.setAttribute("content",dark?"#15120D":"#E8E3D9");
  if(persist){ try{ localStorage.setItem("uc-theme",dark?"dark":"light"); }catch(_){} }
}
function initialTheme(){
  try{
    const stored=localStorage.getItem("uc-theme");
    if(stored==="light"||stored==="dark") return stored;
  }catch(_){}
  return matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";
}
themeButton.addEventListener("click",()=>setTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"));
document.getElementById("connections-nav").addEventListener("click",()=>document.getElementById("connections")?.scrollIntoView({behavior:matchMedia("(prefers-reduced-motion: reduce)").matches?"auto":"smooth",block:"start"}));
window.addEventListener("hashchange",()=>showRecord(requestedId()));
window.addEventListener("keydown",(event)=>{
  if(event.altKey||event.ctrlKey||event.metaKey) return;
  const target=event.target;
  if(target instanceof Element&&target.closest("input,textarea,select,button,a,[contenteditable='true']")) return;
  const current=INDEX.findIndex((entry)=>entry.id===resolveId(requestedId()));
  if(current<0) return;
  if(event.key==="ArrowLeft"){ event.preventDefault(); navigateTo(INDEX[(current-1+INDEX.length)%INDEX.length].id); }
  if(event.key==="ArrowRight"){ event.preventDefault(); navigateTo(INDEX[(current+1)%INDEX.length].id); }
  if(event.key.toLowerCase()==="t"){ event.preventDefault(); themeButton.click(); }
  if(event.key.toLowerCase()==="r"){ event.preventDefault(); document.getElementById("random")?.click(); }
});

async function boot(){
  setTheme(initialTheme(),false);
  ARCHIVE_SNAPSHOT=await fetch("data/archive.json",{cache:"no-store"}).then((response)=>{if(!response.ok)throw new Error("archive snapshot");return response.json();});
  const graphMeta=ARCHIVE_SNAPSHOT?.canonical?.constellations;
  const graphUrl=(graphMeta?.path||"data/constellations.json")+(graphMeta?.sha256?"?v="+encodeURIComponent(graphMeta.sha256):"");
  const speciesMeta=ARCHIVE_SNAPSHOT?.projections?.species;
  const speciesUrl=(speciesMeta?.path||"data/species.json")+(speciesMeta?.sha256?"?v="+encodeURIComponent(speciesMeta.sha256):"");
  [CONSTELLATIONS,SPECIES]=await Promise.all([
    fetch(graphUrl,{cache:graphMeta?.sha256?"default":"no-store"}).then((response)=>response.ok?response.json():null).catch(()=>null),
    fetch(speciesUrl,{cache:speciesMeta?.sha256?"default":"no-store"}).then((response)=>response.ok?response.json():null).catch(()=>null)
  ]);
  await loadProjection();
  const byId=new Map(INDEX.map((entry)=>[entry.id,entry]));
  for(const taxon of SPECIES?.taxa||[]) for(const record of taxon.records||[]){
    const entry=byId.get(record.id);if(entry) entry.sp=[...new Set([...(entry.sp||[]),taxon.label])].sort();
  }
  await loadMedia();
  let id=requestedId();
  if(!id){
    id=INDEX.some((entry)=>entry.id==="UC-025")?"UC-025":INDEX[0]?.id;
    if(id) history.replaceState(null,"",location.pathname+location.search+"#"+id);
  }
  await showRecord(id);
}
boot().catch((error)=>renderLoadError(requestedId(),error));
</script>
