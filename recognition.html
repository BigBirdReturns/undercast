<style>
html,body{margin:0;padding:0}
:root{
  --bg:#E8E3D9;--paper:#EEE9DF;--ink:#1B1915;--ink2:#39352E;
  --serif:#6E685C;--label:#918A79;--rule:#C7C0B1;--rule2:#D9D2C4;

.uc-section{border-bottom:1px solid var(--rule);padding:18px 0 21px}

.uc-body{font-family:var(--display);font-size:16px;line-height:1.63;margin:11px 0 0;color:var(--ink2);text-wrap:pretty}

.uc-rail{margin-top:31px}

.uc-rail-label .lead{color:var(--serif)}

.uc-rail-reason{font-family:var(--display);font-style:italic;color:var(--label);font-size:13px;margin-bottom:13px;max-width:72ch}
.uc-rail-row{display:flex;gap:15px;overflow-x:auto;padding-bottom:8px}
.uc-thumb{flex:none;width:126px;cursor:pointer}
.uc-thumb-img{position:relative;width:126px;height:158px;background:var(--well);border:1px solid var(--ink);overflow:hidden}

.uc-thumb-img.is-absence img{object-fit:contain;padding:14%;opacity:.9}

.uc-path-card{padding:24px 22px 26px;border-right:1px solid var(--rule);min-height:178px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}
.uc-path-card:last-child{border-right:0}
.uc-path-card:hover .uc-path-name{color:var(--acc)}
.uc-path-eyebrow{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--label)}

.uc-path-reason{font-family:var(--display);font-style:italic;font-size:13px;line-height:1.4;color:var(--serif);margin-top:18px}
.uc-footer{margin-top:58px;border-top:1px solid var(--rule);padding-top:16px;display:flex;gap:46px;flex-wrap:wrap;font-size:11px;letter-spacing:.035em;line-height:1.5;color:var(--label)}
.uc-loading{padding:120px 0;text-align:center;font-family:var(--display);font-style:italic;font-size:18px;color:var(--serif)}
@media(max-width:980px){
  .uc-entry{grid-template-columns:1fr;gap:46px}.uc-dossier{position:static;display:grid;grid-template-columns:1fr 1fr;border-top:1.5px solid var(--ink)}
  .uc-section{padding-right:24px}.uc-section:nth-child(odd){border-right:1px solid var(--rule)}

}

  .uc-wrap{padding:0 16px}.uc-masthead{align-items:flex-start}.uc-brand{display:block}.uc-tagline{display:block;margin-top:6px}.uc-nav{gap:12px 16px}
  .uc-association{grid-template-columns:1fr;gap:7px}.uc-kicker{padding-top:0}.uc-association-line{font-size:25px}
  .uc-entry{margin-top:28px}.uc-title{font-size:clamp(48px,15vw,70px)}.uc-pair{gap:10px!important;margin-top:23px}
  .uc-caption{display:block}.uc-caption-prov{text-align:left;margin-top:4px}.uc-note{font-size:9.5px}
  .uc-dossier{display:block}.uc-section:nth-child(odd){border-right:0}.uc-section{padding-right:0}
  .uc-memory{grid-template-columns:1fr}.uc-memory-visual{border-right:0;border-bottom:1px solid var(--ink);min-height:360px}.uc-memory-copy{padding:30px 4px 28px}
  .uc-fallback-paths{grid-template-columns:1fr}.uc-path-card{border-right:0;border-bottom:1px solid var(--rule);min-height:0;padding:21px 0}.uc-path-card:last-child{border-bottom:0}
}
@media(max-width:420px){
  .uc-wordmark{font-size:13px}.uc-record-controls{width:100%;justify-content:space-between}.uc-record-meta{font-size:9.5px}
  .uc-plate-head{font-size:8.5px}.uc-image-well{border-width:1px}.uc-caption-main{font-size:14px!important}.uc-caption-prov{font-size:7.5px}.uc-absence{padding:3%}
}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
</style>

<body>
<div class="uc-page" id="page" data-theme="light" style="--acc:#A6402F">
  <div class="uc-wrap" id="app">
    <div class="uc-loading">Loading the archive…</div>
  </div>
</div>
<noscript><div style="max-width:640px;margin:80px auto;padding:0 24px;font-family:Georgia,serif;color:#39352E">
  The Recognition Loop is an interactive reader over the UNDERCAST roster and needs JavaScript.
  You can still browse the full index on <a href="index.html">the wall</a>.
</div></noscript>

<script>
/* ============================================================
   UNDERCAST — Recognition Loop
   A single-record reader over the same two-tier data the wall uses: a lean
   data/index.json (facets for every card) + numbered data/shards/ that carry
   the full records, resolved lazily; data/media-live.json maps a local image
   path to its GitHub Release URL. If the projections are missing we fall back
   to reading data/specimens.json whole, so the page never hard-fails.

   The design's promise is honesty: a character with no still is shown as a
   neutral topology mark (missing evidence), never a fabricated photo; a
   voice-only role says so. The "recognition paths" are computed from the
   roster itself — the same performer, the same hands, the same shelf — so the
   connection is real before the visitor is invited to follow it.
   ============================================================ */
let INDEX = [];               // lean entries: {id,sh,u,y,d,a,c,p,tf,k?,kw?}
let MANIFEST = null;          // data/shard-manifest.json — the shard load map
let MEDIA = {};               // localSrc -> {url,location}: images living on GitHub Releases
const RECORDS = new Map();    // id -> full record (populated lazily from shards)
const SHARDS = new Map();     // shard# -> in-flight/settled load promise (dedupe)
const POS = new Map();        // id -> position in INDEX (for prev/next)

const TWORD = {5:"total",4:"heavy",3:"partial",2:"light",1:"subtle"};
const RAIL_CAP = 14;          // max thumbnails per rail
const GRADE = "contrast(1.054) saturate(0.880) brightness(0.988)"; // the design's default plate grade
const PLACEHOLDER = {light:"assets/placeholder-light-clean.png", dark:"assets/placeholder-dark-clean.png"};

const state = {
  idx: 0,
  compare: false,
  expand: false,
  theme: (typeof localStorage!=="undefined" && localStorage.getItem("uc-theme")) || "light"
};

/* ---------- injection guards (identical policy to the wall) ---------- */
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function safeId(s){return /^[A-Za-z0-9_-]+$/.test(String(s==null?"":s))?String(s):"";}
function safeUrl(u){u=String(u==null?"":u).trim();return /^https?:\/\//i.test(u)&&!/[\s"'<>]/.test(u)?u:"#";}
function safeSrc(u){u=String(u==null?"":u).trim();return /["'<>]/.test(u)?"":u;}

/* ---------- media resolution (mirrors index.html) ----------
   Only serve an image url that is exactly a github.com releases-download URL;
   anything else falls back to the local repo path. */
const RELEASE_URL=/^https:\/\/github\.com\/[^/]+\/[^/]+\/releases\/download\/[^/]+\/[^/?#]+$/;
function mediaSrc(src){ const e=MEDIA[src]; return (e&&e.location==="release"&&RELEASE_URL.test(e.url||""))?e.url:src; }

/* ---------- makers: parse a freeform designer credit into names (mirrors index.html) ---------- */
function parseMakers(str){
  if(!str) return [];
  return str
    .split(/\s*[·•|;/&]\s*|\s+&\s+|\s+and\s+|,\s+(?=(?:sculpt|makeup|design|prosthetic|supv|key|from|over|with)\b)/i)
    .map(c=>c
      .replace(/^\s*(?:special\s+)?(?:burn\s+)?(?:makeup(?:\s+effects)?|prosthetics?|costume|creature\s+design|character\s+design|performance\s+capture|mo-?cap|sculpt(?:or|ing)?|design(?:ed|s)?|created|key\s+\w+|supervis(?:ed|or)|animatronics?|puppet(?:eer|ry)?)\b\s*(?:by|:|—|-|effects)?\s*/i,"")
      .replace(/\bsupv\.?\b/ig,"")
      .replace(/\(.*?\)/g,"")
      .replace(/^[\s,–—-]+|[\s,–—-]+$/g,"")
      .trim())
    .filter(Boolean)
    .filter(n=>n.length>=3&&n.length<=44&&/[A-Z]/.test(n)&&!/\b(own|vary|varies|concept|features|frame|team|his|her|their|from)\b/i.test(n));
}
let MAKER_INDEX={};
function buildMakerIndex(list){ const idx={}; for(const s of list) for(const m of parseMakers(s.d)) idx[m]=(idx[m]||0)+1; return idx; }
function primaryMakerOf(designer){
  const ms=parseMakers(designer);
  if(!ms.length) return "";
  return ms.slice().sort((a,b)=>(MAKER_INDEX[b]||0)-(MAKER_INDEX[a]||0)||a.localeCompare(b))[0];
}

/* first 4-digit year → a decade label */
function decadeOf(years){
  const m=String(years).match(/\d{4}/);
  if(!m) return "—";
  const d=Math.floor(parseInt(m[0],10)/10)*10;
  return d<1970 ? "pre-70s" : (String(d).slice(2)+"s");
}

/* ---------- shard loading (mirrors index.html) ---------- */
function loadShard(sh){
  if(SHARDS.has(sh)) return SHARDS.get(sh);
  const meta=MANIFEST&&MANIFEST.shards&&MANIFEST.shards[sh];
  if(!meta){ const p=Promise.resolve([]); SHARDS.set(sh,p); return p; }
  const p=fetch("./data/"+meta.file).then(r=>{if(!r.ok)throw new Error("shard "+sh);return r.json();})
    .then(recs=>{ for(const rec of recs) RECORDS.set(rec.id,rec); return recs; })
    .catch(err=>{ SHARDS.delete(sh); throw err; });
  SHARDS.set(sh,p);
  return p;
}
async function ensureRecords(ids){
  const need=new Set();
  for(const id of ids){ const e=POS.has(id)?INDEX[POS.get(id)]:null; if(e && !RECORDS.has(id) && e.sh>=0) need.add(e.sh); }
  if(need.size) await Promise.all([...need].map(sh=>loadShard(sh).catch(()=>null)));
}

/* ---------- provenance line for an image (extends the mockup with the "generated" tier) ---------- */
function prov(kind,license){
  if(kind==="still") return "Still · studio, shown fan-use";
  if(kind==="free") return "Portrait · "+(license||"freely licensed");
  if(kind==="copyright") return "Portrait · "+(license||"fan-use");
  if(kind==="generated") return "Generated · machine-made fill";
  return "Archive mark · image not yet sourced";
}

/* ---------- synthesized prose (honest, from the record's own fields) ---------- */
function creditSentence(e){
  const voice = e.kind==="voice";
  const verb = voice ? "was voiced by" : "was performed by";
  const base = `${e.character} ${verb} ${e.actor}`;
  if(voice) return base + ".";
  // Headline the parsed maker name(s) — the same names the wall's leaderboard uses —
  // so a phrased credit ("Costume by John Mollo, from …") reads cleanly here; the full
  // verbatim designer string still appears in The hands, The work, and the ledger.
  const makers = parseMakers(e.designer);
  if(!makers.length) return base + ".";
  const named = makers.length<=2 ? makers.join(" & ") : (makers.slice(0,2).join(", ") + " & others");
  return base + `, with the face built by ${named}.`;
}
function caseLabel(e){
  if(e.kind==="voice") return "Voice only — no cast was ever taken";
  if(!e.still || !e.still.src) return "Absence — character still not yet sourced";
  if(e.portrait && e.portrait.src) return "Clean pair — the mask and the face";
  return "Mask on file — performer photo still missing";
}

/* ---------- image nodes ---------- */
function absenceNode(extraClass){
  const src = PLACEHOLDER[state.theme==="dark"?"dark":"light"];
  return `<div class="uc-image-node uc-absence ${extraClass||""}"><img src="${esc(src)}" alt="Neutral topology mark indicating the image has not yet been sourced"></div>`;
}
function photoNode(src,pos,kind){
  const badge = kind==="generated" ? `<div class="uc-gen-badge">gen</div>` : "";
  return `<div class="uc-image-node" style="filter:${GRADE}"><img class="uc-photo" src="${safeSrc(mediaSrc(src))}" alt="" loading="lazy" style="object-position:${pos}" onerror="ucImgFail(this)"></div>${badge}`;
}
// A remote still/portrait that 404s must fall back to the honest absence mark, not a broken icon.
function ucImgFail(img){
  if(!img||img.dataset.failed) return;
  img.dataset.failed="1";
  const node=img.closest(".uc-image-node"); if(!node) return;
  const src = PLACEHOLDER[state.theme==="dark"?"dark":"light"];
  node.classList.add("uc-absence");
  node.style.filter="none";
  node.innerHTML=`<img src="${esc(src)}" alt="Image unavailable — shown as a neutral topology mark">`;
  const box=node.closest(".uc-image-well")||node.closest(".uc-memory-visual");
  if(box){ box.style.background="var(--bg)"; box.classList.add("is-absence"); [...box.querySelectorAll(".uc-gen-badge")].forEach(b=>b.remove()); }
}
window.ucImgFail=ucImgFail;

/* ---------- recognition paths, computed from the roster ---------- */
function buildRails(e){
  const rails=[], used=new Set([e.id]);
  const take=(pred, cap)=>{
    const out=[];
    for(const x of INDEX){ if(out.length>=cap) break; if(used.has(x.id)) continue; if(pred(x)){ out.push(x); used.add(x.id); } }
    return out;
  };
  // 1 — the same performer, several identities
  const perf=take(x=>x.a===e.actor, RAIL_CAP);
  if(perf.length) rails.push({lead:"Also worn by", key:e.actor, keyHref:"index.html?q="+encodeURIComponent(e.actor),
    reason:"One performer, several identities the audience may never have joined together.", items:perf});
  // 2 — the same hands
  const pm=primaryMakerOf(e.designer), pml=pm.toLowerCase();
  if(pm){
    const made=take(x=>(x.d||"").toLowerCase().includes(pml), RAIL_CAP);
    if(made.length) rails.push({lead:"Also built by", key:pm, keyHref:"index.html?maker="+encodeURIComponent(pm),
      reason:"One hand, a recurring visual language across characters and productions.", items:made});
  }
  // 3 — the same shelf
  const shelf=take(x=>x.u===e.universe, RAIL_CAP);
  if(shelf.length) rails.push({lead:"Also on the", key:e.universe+" shelf", keyHref:"index.html?shelf="+encodeURIComponent(e.universe),
    reason:"A shelf of the archive where bodies, materials, and eras otherwise apart sit together.", items:shelf});
  return rails;
}
function railThumb(x){
  const rec=RECORDS.get(x.id);
  const still=rec&&rec.still&&rec.still.src, portrait=rec&&rec.portrait&&rec.portrait.src;
  const src=still||portrait;
  const inner = src
    ? `<img src="${safeSrc(mediaSrc(src))}" loading="lazy" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 32%;display:block;filter:contrast(1.05) saturate(.9)" onerror="ucThumbFail(this)"><div style="position:absolute;inset:0;box-shadow:inset 0 0 46px rgba(10,8,6,.45);pointer-events:none"></div>`
    : `<img src="${esc(PLACEHOLDER[state.theme==="dark"?"dark":"light"])}" alt="">`;
  const absent = src ? "" : " is-absence";
  return `<a class="uc-thumb" href="#${safeId(x.id)}">
    <div class="uc-thumb-img${absent}">${inner}</div>
    <div class="uc-thumb-name">${esc(x.c)}</div>
    <div class="uc-thumb-sub">${esc(x.a)}</div>
  </a>`;
}
function ucThumbFail(img){
  if(!img||img.dataset.failed) return; img.dataset.failed="1";
  const box=img.closest(".uc-thumb-img"); if(box){ box.classList.add("is-absence"); }
  img.style.cssText=""; img.src=PLACEHOLDER[state.theme==="dark"?"dark":"light"];
}
window.ucThumbFail=ucThumbFail;

/* ---------- render one record ---------- */
function render(){
  const e=RECORDS.get(INDEX[state.idx].id);
  const app=document.getElementById("app"), page=document.getElementById("page");
  page.setAttribute("data-theme", state.theme);
  if(!e){ app.innerHTML=`<div class="uc-loading">This record didn't load — likely a network blip. <button class="uc-btn" onclick="show(state.idx)">Retry</button></div>`; return; }

  const voice=e.kind==="voice";
  const charAbsent=!(e.still&&e.still.src), perfAbsent=!(e.portrait&&e.portrait.src);
  const compareAvailable=!charAbsent&&!perfAbsent;
  const pmaker=primaryMakerOf(e.designer); // a real, parsed maker name — or "" when the credit is prose ("cast for his own frame…")
  const designer=(e.designer && !/^[\s—–-]*$/.test(String(e.designer)))?e.designer:""; // treat a bare "—" placeholder as no credit

  const charNode = charAbsent ? absenceNode() : photoNode(e.still.src,"center 40%",e.still.kind);
  const perfNode = perfAbsent ? absenceNode() : photoNode(e.portrait.src,"center 28%",e.portrait.kind);
  const overlays = `<div style="position:absolute;inset:0;background:#241d14;mix-blend-mode:multiply;opacity:.075;pointer-events:none"></div><div style="position:absolute;inset:0;box-shadow:inset 0 0 90px rgba(10,8,6,.48);pointer-events:none"></div>`;

  const specRows=[["Production",e.production],["Years",e.years],["Shelf",e.universe],
    ["Transformation",`${e.transform} / 5 — ${TWORD[e.transform]||""}`]];
  if(designer) specRows.push([voice?"Character design":"Design & build", designer]);

  const makersPrimary = voice
    ? [{name:e.actor,role:"Voice"}]
    : [{name:e.actor,role:"Performance under the face"}].concat(designer?[{name:designer,role:"Design & build"}]:[]);
  const makersFull = makersPrimary.concat([
    {name:e.production,role:`Production · ${e.years}`},
    {name:e.universe,role:"Archive shelf"}
  ]);

  const rails=buildRails(e);
  const pairGap=(state.compare&&compareAvailable)?"2px":"clamp(16px,2.6vw,38px)";

  const provChar = charAbsent ? prov(null) : prov(e.still.kind);
  const provPerf = perfAbsent ? prov(null) : prov(e.portrait.kind, e.portrait.license);

  app.style.setProperty("--pair-gap", pairGap);

  app.innerHTML = `
    <header class="uc-masthead">
      <div class="uc-brand"><div class="uc-wordmark">UNDERCAST</div><div class="uc-tagline">the people behind the faces culture remembers</div></div>
      <nav class="uc-nav"><a href="index.html">Browse</a><a href="index.html?sort=actor">People</a><a href="index.html#makers">Makers</a><a href="index.html">Connections</a><a href="index.html#about">About</a><span onclick="toggleTheme()" style="color:var(--acc)">${state.theme==="dark"?"☀ Light":"☾ Dark"}</span></nav>
    </header>

    <div class="uc-record">
      <div class="uc-record-meta"><span style="color:var(--label)">Record</span><a href="index.html#${safeId(e.id)}" style="color:var(--acc);font-weight:700" title="Find this specimen on the wall">${esc(e.id)} · ${esc(String(e.universe).toUpperCase())}</a><span class="uc-dot"></span><span style="color:var(--serif)">${esc(caseLabel(e))}</span></div>
      <div class="uc-record-controls"><button class="uc-btn" onclick="prev()">‹ prev</button><span style="color:var(--label)">${String(state.idx+1).padStart(2,"0")} / ${String(INDEX.length).padStart(2,"0")}</span><button class="uc-btn" onclick="next()">next ›</button><button class="uc-btn" onclick="rnd()" style="color:var(--acc)">random</button></div>
    </div>

    <section class="uc-association"><div class="uc-kicker">The association</div><div class="uc-association-line">${esc(creditSentence(e))}</div></section>

    <main class="uc-entry">
      <section>
        <div class="uc-title-meta">${esc(e.production)} · ${esc(e.years)}</div>
        <h1 class="uc-title">${esc(e.character)}</h1>

        <div class="uc-pair">
          <article>
            <div class="uc-plate-head"><span>The character</span><span style="color:var(--acc)">01</span></div>
            <div class="uc-image-well" style="background:${charAbsent?"var(--bg)":"var(--well)"}">${charNode}${charAbsent?"":overlays}</div>
            <div class="uc-caption"><div class="uc-caption-main" style="font-style:italic;font-size:15px;color:var(--serif)">${charAbsent?(voice?"No cast — a voice role.":"No still on file."):"The face you know."}</div><div class="uc-caption-prov">${esc(provChar)}</div></div>
            ${charAbsent?`<div class="uc-note">${voice?"A voice-only role: no mask or cast was ever made. The archive marks the absence rather than inventing a face.":"Character still not yet sourced. The archive uses a neutral topology mark rather than inventing a photograph."}</div>`:""}
          </article>

          <article>
            <div class="uc-plate-head"><span>${perfAbsent?"The person — image missing":(voice?"The voice":"The person")}</span><span style="color:var(--acc)">02</span></div>
            <div class="uc-image-well" style="background:${perfAbsent?"var(--bg)":"var(--well)"}">${perfNode}${perfAbsent?"":overlays}</div>
            <div class="uc-caption"><div class="uc-caption-main" style="font-size:20px">${esc(e.actor)}</div><div class="uc-caption-prov" style="white-space:nowrap">${esc(provPerf)}</div></div>
          </article>
          ${(state.compare&&compareAvailable)?`<div style="position:absolute;top:26px;bottom:52px;left:50%;width:1px;background:var(--acc);opacity:.7;pointer-events:none"></div>`:""}
        </div>

        <div class="uc-compare">
          ${compareAvailable
            ? `<button class="uc-compare-action" onclick="toggleCompare()"><span style="font-size:14px">⇔</span><span>${state.compare?"Comparing — side by side":"Compare · align the two"}</span></button><span class="uc-compare-note">optional, and offered only where the two images align</span>`
            : `<span class="uc-compare-note">No comparison here: ${charAbsent?(voice?"this is a voice-only role — there is no mask to compare.":"the character still is not yet sourced."):"the performer photo is missing."}</span>`}
        </div>
      </section>

      <aside class="uc-dossier">
        <section class="uc-section">
          <div class="uc-section-head"><span class="uc-section-no">03</span><span class="uc-section-title">The hands</span></div>
          <div class="uc-credit-list">${makersPrimary.map(m=>`<div><div class="uc-credit-name">${esc(m.name)}</div><div class="uc-credit-role">${esc(m.role)}</div></div>`).join("")}</div>
          <button class="uc-expand" onclick="toggleExpand()">${state.expand?"▾ Hide full production record":"▸ Show full production record"}</button>
          ${state.expand?`<div style="margin-top:14px;border-top:1px dashed var(--rule);padding-top:14px;display:flex;flex-direction:column;gap:10px">${makersFull.map(m=>`<div><div style="font-size:13px;color:var(--ink)">${esc(m.name)}</div><div style="font-size:10.5px;letter-spacing:.06em;color:var(--label);margin-top:2px">${esc(m.role)}</div></div>`).join("")}</div>`:""}
        </section>
        <section class="uc-section">
          <div class="uc-section-head"><span class="uc-section-no">04</span><span class="uc-section-title">The work</span></div>
          <div style="margin-top:12px">${specRows.map(r=>`<div class="uc-spec-row"><div class="uc-spec-k">${esc(r[0])}</div><div class="uc-spec-v">${esc(r[1])}</div></div>`).join("")}</div>
        </section>
        ${e.reveal?`<section class="uc-section"><div class="uc-section-head"><span class="uc-section-no">05</span><span class="uc-section-title">The reveal</span></div><p class="uc-body">${esc(e.reveal)}</p></section>`:""}
        ${e.knownFor?`<section class="uc-section"><div class="uc-section-head"><span class="uc-section-no">06</span><span class="uc-section-title">You already ${voice?"heard":"knew"} them</span></div><p class="uc-known">${esc(e.knownFor)}</p></section>`:""}
      </aside>
    </main>

    <section class="uc-memory">
      <div class="uc-memory-visual ${charAbsent?"is-absence":""}" style="background:${charAbsent?"var(--bg)":"var(--well)"}">${charAbsent?absenceNode():`<div class="uc-image-node" style="filter:${GRADE}"><img class="uc-photo" src="${safeSrc(mediaSrc(e.still.src))}" alt="" style="object-position:center 40%" onerror="ucImgFail(this)"></div>`}</div>
      <div class="uc-memory-copy">
        <div class="uc-section-head"><span class="uc-section-no">07</span><span class="uc-section-title">Look again</span></div>
        <h2 class="uc-memory-title">${esc(e.character)}</h2>
        <p class="uc-memory-line">The next time you ${voice?"hear":"see"} ${esc(e.character)}, keep ${esc(e.actor)}${(!voice&&pmaker)?` and ${esc(pmaker)}`:""} attached to the ${voice?"voice":"image"}.</p>
        <div class="uc-memory-ledger"><div><span>${voice?"Voiced by":"Performed by"}</span><b>${esc(e.actor)}</b></div>${designer?`<div><span>Design & build</span><b>${esc(designer)}</b></div>`:""}</div>
      </div>
    </section>

    <section class="uc-paths">
      <div class="uc-paths-head"><div class="uc-paths-title">Recognition paths</div><div class="uc-paths-note">the connection is named before the visitor follows it</div></div>
      ${rails.length
        ? rails.map(rail=>`<div class="uc-rail">
            <div class="uc-rail-label"><span class="lead">${esc(rail.lead)} </span><a class="key" href="${esc(rail.keyHref)}">${esc(rail.key)}</a><span style="color:var(--acc);margin-left:8px">→</span></div>
            <div class="uc-rail-reason">${esc(rail.reason)}</div>
            <div class="uc-rail-row">${rail.items.map(railThumb).join("")}</div>
          </div>`).join("")
        : `<div class="uc-fallback-paths">
            <a class="uc-path-card" href="index.html?q=${encodeURIComponent(e.actor)}"><div><div class="uc-path-eyebrow">Follow the performer</div><div class="uc-path-name">More bodies carried by ${esc(e.actor)} <span style="color:var(--acc)">→</span></div></div><div class="uc-path-reason">The person becomes the thread across characters that otherwise seem unrelated.</div></a>
            ${pmaker?`<a class="uc-path-card" href="index.html?maker=${encodeURIComponent(pmaker)}"><div><div class="uc-path-eyebrow">Follow the hands</div><div class="uc-path-name">More work shaped by ${esc(pmaker)} <span style="color:var(--acc)">→</span></div></div><div class="uc-path-reason">A recurring visual language becomes visible when the credit is treated as part of the image.</div></a>`:""}
            <a class="uc-path-card" href="index.html?shelf=${encodeURIComponent(e.universe)}"><div><div class="uc-path-eyebrow">Follow the shelf</div><div class="uc-path-name">Others on the ${esc(e.universe)} shelf <span style="color:var(--acc)">→</span></div></div><div class="uc-path-reason">The archive shelf gathers bodies, materials, and eras that share a world.</div></a>
          </div>`}
    </section>

    <footer class="uc-footer"><div style="max-width:42ch">Character, performer, and credited work remain attached throughout the record. A missing image is shown as missing evidence, never replaced with a fabricated person.</div><div style="max-width:44ch">The complete index remains <a href="index.html" style="color:var(--serif)">searchable and exhaustive</a>; this reader exists to make one association stay in memory.</div></footer>
  `;
}

/* ---------- navigation ---------- */
async function show(idx){
  if(!INDEX.length) return;
  state.idx=((idx%INDEX.length)+INDEX.length)%INDEX.length;
  state.compare=false; state.expand=false;
  const e=INDEX[state.idx];
  const railIds=buildRailIds(e);
  await ensureRecords([e.id, ...railIds]);
  render();
  const want="#"+e.id;
  if(location.hash!==want) history.replaceState(null,"",location.pathname+location.search+want);
  window.scrollTo({top:0,behavior:"auto"});
}
// rail membership only needs the lean INDEX — compute the ids up front so their
// shards load alongside the current record (thumbs need the full record's image).
function buildRailIds(e){
  const ids=[], used=new Set([e.id]);
  const grab=(pred)=>{ let n=0; for(const x of INDEX){ if(n>=RAIL_CAP) break; if(used.has(x.id))continue; if(pred(x)){ ids.push(x.id); used.add(x.id); n++; } } };
  grab(x=>x.a===e.a);
  const pm=primaryMakerOf(e.d).toLowerCase(); if(pm) grab(x=>(x.d||"").toLowerCase().includes(pm));
  grab(x=>x.u===e.u);
  return ids;
}
function prev(){ show(state.idx-1); }
function next(){ show(state.idx+1); }
function rnd(){ if(INDEX.length<2) return; let i=state.idx; while(i===state.idx) i=Math.floor(Math.random()*INDEX.length); show(i); }
function toggleCompare(){ state.compare=!state.compare; render(); }
function toggleExpand(){ state.expand=!state.expand; render(); }
function toggleTheme(){ state.theme=state.theme==="dark"?"light":"dark"; try{localStorage.setItem("uc-theme",state.theme);}catch(_){}
  document.querySelector('meta[name=theme-color]').setAttribute("content", state.theme==="dark"?"#15120D":"#E8E3D9"); render(); }
window.show=show;window.prev=prev;window.next=next;window.rnd=rnd;window.toggleCompare=toggleCompare;window.toggleExpand=toggleExpand;window.toggleTheme=toggleTheme;window.state=state;

/* pick a first record: honor the #hash, else the first "clean pair" so the design opens at its fullest */
function firstIdx(){
  const hash=location.hash.replace(/^#/,"");
  if(hash && POS.has(hash)) return POS.get(hash);
  for(let i=0;i<INDEX.length;i++){ const e=INDEX[i]; if(e.k!==1) { const r=RECORDS.get(e.id); if(r&&r.still&&r.still.src&&r.portrait&&r.portrait.src) return i; } }
  return 0;
}

/* ---------- boot ---------- */
async function boot(){
  try{
    const [idx,man]=await Promise.all([
      fetch("./data/index.json").then(r=>{if(!r.ok)throw new Error("index");return r.json();}),
      fetch("./data/shard-manifest.json").then(r=>{if(!r.ok)throw new Error("manifest");return r.json();}),
    ]);
    INDEX=idx; MANIFEST=man;
  }catch(_){
    const specs=await fetch("./data/specimens.json").then(r=>r.json());
    MANIFEST={shards:[]};
    INDEX=specs.map(s=>{ RECORDS.set(s.id,s); return {id:s.id,sh:-1,u:s.universe,y:s.years||"",d:s.designer||"",a:s.actor||"",c:s.character||"",p:s.production||"",tf:s.transform||0,k:s.kind==="voice"?1:0}; });
  }
  INDEX.forEach((e,i)=>POS.set(e.id,i));
  MAKER_INDEX=buildMakerIndex(INDEX);
  try{
    const live=await fetch("./data/media-live.json").then(r=>r.ok?r.json():null);
    if(live&&live.urls) for(const src in live.urls){ MEDIA[src]={url:live.urls[src],location:"release"}; }
  }catch(_){}
  // to pick the opening "clean pair" we need a couple of shards resident
  await ensureRecords(INDEX.slice(0,Math.min(INDEX.length, (MANIFEST.shards&&MANIFEST.shards[0]?MANIFEST.shards[0].n:INDEX.length))).map(e=>e.id)).catch(()=>{});
  await show(firstIdx());
  window.addEventListener("hashchange",()=>{ const id=location.hash.replace(/^#/,""); if(id&&POS.has(id)&&POS.get(id)!==state.idx) show(POS.get(id)); });
  window.addEventListener("keydown",ev=>{
    const tag=(ev.target&&ev.target.tagName)||""; if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT") return;
    if(ev.key==="ArrowLeft") prev(); else if(ev.key==="ArrowRight") next();
    else if(ev.key.toLowerCase()==="r") rnd(); else if(ev.key.toLowerCase()==="t") toggleTheme();
  });
}
boot().catch(()=>{ document.getElementById("app").innerHTML='<div class="uc-loading">Couldn\'t load the roster. Serve this over http (not file://) and make sure data/index.json (or data/specimens.json) is present.</div>'; });
</script>
</body>
