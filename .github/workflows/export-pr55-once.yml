name: export-pr55-once

on:
  push:
    branches:
      - claude/full-canon-census

permissions:
  contents: read
  issues: write

jobs:
  export:
    if: github.repository == 'BigBirdReturns/undercast'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack exact branch checkout
        run: tar --exclude=.git --exclude=node_modules -czf /tmp/undercast-pr55.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: undercast-pr55-checkout
          path: /tmp/undercast-pr55.tar.gz
          if-no-files-found: error
          retention-days: 2
      - name: Publish artifact run ID to PR 55
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/issues/55/comments -f body="PR55 checkout export is ready in Actions run ${{ github.run_id }} (artifact: undercast-pr55-checkout)."
