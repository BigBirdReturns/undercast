name: install-star-trek-media-audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: install-star-trek-media-audit
  cancel-in-progress: true

jobs:
  install:
    if: github.head_ref == 'agent/star-trek-media-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/star-trek-media-audit
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Reconstruct the reviewed media-audit implementation
        run: |
          set -euxo pipefail
          printf '%s\n' \
            '0c190d59a7675af04b2c93ca9e2105a251ba6ca368592c5911e47236f376fff5  .github/media-audit-install/install.part00' \
            'cc9f7e4bbbf54a2bfe53d8f27c6b4b18a1706ad3242e25145feaed25a6cced74  .github/media-audit-install/install.part01' \
            'e263b84d640cf3cce1500ea915560f2cef14f4d4a075bd749c4e1aa33a758188  .github/media-audit-install/install.part02' \
            'f551d8382e3f344b77dd9b518e0e1d5dc9953c865a0cf1f61fc24e4cb92e7684  .github/media-audit-install/install.part03a' \
            '260c5bc4ac6520dfac6e38cd4b25fc5f84986db4affccd40cf576065a3287ac4  .github/media-audit-install/install.part03b' \
            '2c527d054eb1146c2dcb9e443d92cf517249bce95db3f1a81bb526d891c8bc16  .github/media-audit-install/install.part04' \
            | sha256sum -c -
          cat \
            .github/media-audit-install/install.part00 \
            .github/media-audit-install/install.part01 \
            .github/media-audit-install/install.part02 \
            .github/media-audit-install/install.part03a \
            .github/media-audit-install/install.part03b \
            .github/media-audit-install/install.part04 \
            | base64 -d > /tmp/media-audit-install.tar.gz
          echo "96353b9cc26c15ee7ea4e44035f4bb3e2c43eb5037615d697c42c23eacc518cd  /tmp/media-audit-install.tar.gz" | sha256sum -c -
          gzip -t /tmp/media-audit-install.tar.gz
          tar -tzf /tmp/media-audit-install.tar.gz
          tar -xzf /tmp/media-audit-install.tar.gz
          git diff --check

      - name: Install deterministic test runtime
        run: npm ci

      - name: Generate the hash-bound baseline and apply reviewed presentation rulings
        run: |
          if [ ! -f data/MEDIA-AUDIT.json ]; then
            node scripts/media-audit.mjs sync --now 2026-07-22T00:00:00.000Z
            node scripts/media-audit.mjs resolve --input data/MEDIA-AUDIT-BASELINE-REVIEW.json
          fi
          node scripts/media-audit.mjs validate
          node scripts/media-audit.mjs status --scope star-trek
          node - <<'NODE'
          const fs = require('fs');
          const state = JSON.parse(fs.readFileSync('data/MEDIA-AUDIT.json','utf8'));
          const rows = state.items.filter((item) => item.scope === 'star-trek');
          const count = (status) => rows.filter((item) => item.status === status).length;
          const votes = rows.reduce((sum, item) => sum + item.votes.length, 0);
          if (rows.length !== 744) throw new Error(`expected 744 Star Trek media facets, got ${rows.length}`);
          if (count('verified') !== 0 || count('absent') !== 96 || count('review') !== 564 || count('attention') !== 84) {
            throw new Error(`unexpected state: verified=${count('verified')} absent=${count('absent')} review=${count('review')} attention=${count('attention')}`);
          }
          if (votes !== 84) throw new Error(`expected 84 reviewed presentation votes, got ${votes}`);
          NODE

      - name: Validate the audit, archive, roadmap, preservation, and lease backpressure contracts
        run: |
          node --check scripts/lib/media-audit.mjs
          node --check scripts/media-audit.mjs
          node --check scripts/media-audit-fixtures.mjs
          node --check scripts/autopilot.mjs
          npm run media:audit:fixtures
          npm run media:audit -- validate
          npm run autopilot:fixtures
          node scripts/validate.mjs
          npm run audit:corpus
          npm run test:site-seams
          npm run roadmap -- validate
          npm run roadmap:fixtures
          npm run preserve:fixtures
          npm run preserve:status -- --json
          set +e
          node scripts/media-audit.mjs gate --scope star-trek > /tmp/media-gate.out 2> /tmp/media-gate.err
          gate_code=$?
          node scripts/autopilot.mjs claim --agent luna --scope star-trek --limit 1 > /tmp/claim.out 2> /tmp/claim.err
          claim_code=$?
          set -e
          test "$gate_code" -eq 2
          test "$claim_code" -eq 1
          grep -q "648 facet(s) remain" /tmp/media-gate.err
          grep -q "incomplete exact-subject media baseline" /tmp/claim.err
          git diff --check

      - name: Commit the exact-subject audit control plane and baseline ledger
        run: |
          git config user.name "undercast-media-audit"
          git config user.email "undercast-media-audit@users.noreply.github.com"
          git add \
            .gitignore AGENTS.md LUNA.md MEDIA.md package.json \
            docs/AUTOPILOT.md docs/ROADMAP-PLAYBOOKS.md docs/MEDIA-AUDIT.md \
            scripts/autopilot.mjs scripts/lib/media-audit.mjs \
            scripts/media-audit.mjs scripts/media-audit-fixtures.mjs \
            data/MEDIA-AUDIT-SCOPES.json data/MEDIA-AUDIT-BASELINE-REVIEW.json \
            data/MEDIA-AUDIT.json data/journal/media-audit.jsonl
          git diff --cached --quiet && exit 0
          git commit -m "Media: add exact-subject consensus audit for Star Trek"
          git push origin HEAD:agent/star-trek-media-audit
