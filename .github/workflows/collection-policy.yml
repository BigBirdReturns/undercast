name: collection-policy

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  collection-mode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enforce collection-only product freeze
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/corpus-ops.mjs check-pr --base "$BASE_SHA" --event "$GITHUB_EVENT_PATH" --json
