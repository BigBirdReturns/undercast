name: pages

# Deploys the static wall to GitHub Pages. Matches Settings -> Pages ->
# Source: "GitHub Actions".
#
# NOTE: a `push` from the bot workflows uses the default GITHUB_TOKEN, and GitHub
# deliberately does NOT start new runs from GITHUB_TOKEN pushes (recursion guard).
# So `on: push` alone would never republish after the nightly/media bots commit —
# the `workflow_run` trigger below is what actually redeploys after each bot commit.

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["retrieve-images", "grow-cards", "ingest-leads", "media-upload"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# let a running deploy finish; don't cancel it mid-publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate the deploy on the same data/contract invariants as validate.yml. This is
  # load-bearing: bot commits push with GITHUB_TOKEN, which does NOT trigger
  # validate.yml (recursion guard, see note above) — but the workflow_run trigger
  # here DOES redeploy after each bot commit. Without this job, nightly bot data
  # would reach production having never passed the gate. These scripts are pure
  # node builtins (no npm ci, no browser), so the guard stays fast and flake-free.
  # The rendered/browser suite remains PR-time in validate.yml.
  guard:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Rebuild every deterministic projection
        run: node scripts/shard.mjs
      - name: Refuse generated drift
        run: git diff --exit-code
      - name: Validate archive invariants
        run: node scripts/validate.mjs
      - name: Validate semantic corpus invariants
        run: npm run audit:corpus
      - name: Validate public site seams
        run: npm run test:site-seams

  deploy:
    needs: guard
    # on a workflow_run trigger, only deploy if the upstream bot run actually succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build permanent record routes
        run: npm run build:site
      - uses: actions/configure-pages@v5
      - name: Upload the site (whole repo root — index.html + data/ + images/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
