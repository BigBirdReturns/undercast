name: pages

# Deploys the static wall to GitHub Pages. Matches Settings -> Pages ->
# Source: "GitHub Actions". Runs on every push to the default branch, so the
# site republishes automatically after the nightly bots commit new cards/images.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# let a running deploy finish; don't cancel it mid-publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload the site (whole repo root — index.html + data/ + images/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
