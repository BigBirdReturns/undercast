name: finalize-corpus-operations

on:
  push:
    branches: [agent/corpus-operations-mode]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: finalize-corpus-operations
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/corpus-operations-mode
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install runtime
        run: npm ci

      - name: Rebuild deterministic outputs
        run: |
          node scripts/shard.mjs
          node scripts/build-record-pages.mjs
          node scripts/build-contract.mjs

      - name: Remove one-shot operating workflows and commit the permanent candidate
        run: |
          rm -f \
            .github/workflows/reconcile-corpus-operations.yml \
            .github/workflows/finalize-corpus-operations.yml
          git config user.name "undercast-operations"
          git config user.email "undercast-operations@users.noreply.github.com"
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Permanent candidate already reconciled."
          else
            git commit -m "Operations: finalize collection-only steady state"
          fi

      - name: Gate the exact permanent candidate
        run: |
          npx playwright install --with-deps chromium
          npm run gate
          npm run preserve:status -- --json

      - name: Publish the exact gated candidate
        run: git push origin HEAD:agent/corpus-operations-mode
