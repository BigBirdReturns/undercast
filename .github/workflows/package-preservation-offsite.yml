name: package-preservation-offsite

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/package-preservation-offsite.yml"

permissions:
  contents: read
  actions: read

concurrency:
  group: package-preservation-offsite
  cancel-in-progress: false

jobs:
  package:
    if: github.event.pull_request.number == 61
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/preservation-rescue
          fetch-depth: 1

      - name: Download the already verified preservation exports
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/offsite/public-src /tmp/offsite/originals-src /tmp/offsite/parts
          gh run download 29869955274 --repo "$GITHUB_REPOSITORY" \
            --name preservation-public-preservation-20260721-3bbec746c478 \
            --dir /tmp/offsite/public-src
          gh run download 29869955274 --repo "$GITHUB_REPOSITORY" \
            --name preservation-originals-preservation-20260721-3bbec746c478 \
            --dir /tmp/offsite/originals-src
          (cd /tmp/offsite/public-src && sha256sum --check --strict SHA256SUMS)
          (cd /tmp/offsite/originals-src && sha256sum --check --strict SHA256SUMS)

      - name: Build deterministic transfer packages and split below provider limits
        run: |
          tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
            -C /tmp/offsite/public-src -cf /tmp/offsite/public-bundle.tar .
          tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
            -C /tmp/offsite/originals-src -cf /tmp/offsite/originals-bag.tar .
          split -b 90000000 -d -a 2 /tmp/offsite/public-bundle.tar /tmp/offsite/parts/public-bundle.part-
          split -b 90000000 -d -a 2 /tmp/offsite/originals-bag.tar /tmp/offsite/parts/originals-bag.part-
          test "$(find /tmp/offsite/parts -name 'public-bundle.part-*' | wc -l)" = 2
          test "$(find /tmp/offsite/parts -name 'originals-bag.part-*' | wc -l)" = 12
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          root = Path('/tmp/offsite')
          def digest(path):
              h = hashlib.sha256()
              with path.open('rb') as f:
                  for block in iter(lambda: f.read(1024 * 1024), b''):
                      h.update(block)
              return h.hexdigest()
          packages = []
          for kind, source, prefix in [
              ('public-bundle', root / 'public-bundle.tar', 'public-bundle.part-'),
              ('originals-bag', root / 'originals-bag.tar', 'originals-bag.part-'),
          ]:
              parts = []
              for path in sorted((root / 'parts').glob(prefix + '*')):
                  parts.append({'name': path.name, 'bytes': path.stat().st_size, 'sha256': digest(path)})
              packages.append({
                  'kind': kind,
                  'format': 'tar-split-v1',
                  'bytes': source.stat().st_size,
                  'sha256': digest(source),
                  'parts': parts,
              })
          manifest = {
              'schema': 'undercast.preservation.offsite-parts/1',
              'snapshot': 'preservation-20260721-3bbec746c478',
              'source_workflow_run': '29869955274',
              'packages': packages,
              'restore': 'Extract each uploaded artifact ZIP, concatenate raw parts in lexical order, then verify the package bytes and SHA-256 before extracting the tar.',
          }
          (root / 'offsite-parts.json').write_text(json.dumps(manifest, indent=2) + '\n')
          print(json.dumps(manifest, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: offsite-manifest-preservation-20260721-3bbec746c478
          path: /tmp/offsite/offsite-parts.json
          compression-level: 0
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: offsite-public-00-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/public-bundle.part-00
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-public-01-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/public-bundle.part-01
          compression-level: 0
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-00-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-00
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-01-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-01
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-02-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-02
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-03-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-03
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-04-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-04
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-05-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-05
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-06-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-06
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-07-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-07
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-08-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-08
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-09-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-09
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-10-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-10
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: offsite-originals-11-preservation-20260721-3bbec746c478
          path: /tmp/offsite/parts/originals-bag.part-11
          compression-level: 0
          if-no-files-found: error
          retention-days: 14
