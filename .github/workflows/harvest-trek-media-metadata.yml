name: harvest-trek-media-metadata

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: harvest-trek-media-metadata
  cancel-in-progress: true

jobs:
  harvest:
    if: github.head_ref == 'agent/trek-media-baseline-closure'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-media-baseline-closure
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Harvest MediaWiki identity metadata
        env:
          CONTACT: undercast-preservation@example.invalid
        run: |
          python - <<'PY'
          import html
          import json
          import os
          import re
          import time
          import urllib.parse
          import urllib.request
          from collections import defaultdict
          from pathlib import Path

          UA = f'UNDERCAST exact-subject source audit/1.0 ({os.environ.get("CONTACT")})'
          state = json.loads(Path('data/MEDIA-AUDIT.json').read_text())
          specimens = {row['id']: row for row in json.loads(Path('data/specimens.json').read_text())}
          open_items = [
              item for item in state['items']
              if item.get('scope') == 'star-trek'
              and item.get('asset')
              and item.get('status') not in ('verified', 'absent')
          ]

          def request_json(base, params, attempts=5):
              url = base + '?' + urllib.parse.urlencode(params)
              last = None
              for attempt in range(attempts):
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': UA, 'Accept': 'application/json'})
                      with urllib.request.urlopen(req, timeout=45) as response:
                          return json.load(response)
                  except Exception as exc:
                      last = exc
                      time.sleep(min(16, 2 ** attempt))
              raise RuntimeError(f'GET failed after {attempts} attempts: {url}: {last}')

          def clean_markup(value):
              value = html.unescape(str(value or ''))
              value = re.sub(r'<[^>]+>', ' ', value)
              value = re.sub(r'\[\[(?:[^\]|]+\|)?([^\]]+)\]\]', r'\1', value)
              value = re.sub(r'\{\{[^{}]*\}\}', ' ', value)
              return re.sub(r'\s+', ' ', value).strip()

          def chunks(rows, size=40):
              for i in range(0, len(rows), size):
                  yield rows[i:i+size]

          origins_by_host = defaultdict(set)
          actor_articles = set()
          rows = []
          for item in open_items:
              origin = item['asset'].get('origin') or ''
              parsed = urllib.parse.urlparse(origin)
              title = urllib.parse.unquote(parsed.path.split('/wiki/', 1)[-1]).replace('_', ' ') if '/wiki/' in parsed.path else ''
              origins_by_host[parsed.hostname or ''].add(title)
              specimen = specimens[item['wall_id']]
              link = specimen.get('link') or ''
              lp = urllib.parse.urlparse(link)
              article_title = urllib.parse.unquote(lp.path.split('/wiki/', 1)[-1]).replace('_', ' ') if lp.hostname == 'en.wikipedia.org' and '/wiki/' in lp.path else None
              if item['side'] == 'portrait' and article_title:
                  actor_articles.add(article_title)
              rows.append({
                  'item_id': item['id'],
                  'wall_id': item['wall_id'],
                  'side': item['side'],
                  'expected_subject': item['expected_subject'],
                  'origin': origin,
                  'origin_host': parsed.hostname or '',
                  'origin_title': title,
                  'expected_article_url': link,
                  'expected_article_title': article_title,
                  'asset_sha256': item['asset']['sha256'],
                  'asset_kind': item['asset'].get('kind'),
                  'risk_codes': item.get('risk_codes', []),
              })

          expected_articles = {}
          for batch in chunks(sorted(actor_articles)):
              doc = request_json('https://en.wikipedia.org/w/api.php', {
                  'action': 'query', 'format': 'json', 'formatversion': 2,
                  'redirects': 1, 'prop': 'pageprops', 'titles': '|'.join(batch),
              })
              normalized = {row['from']: row['to'] for row in doc.get('query', {}).get('normalized', [])}
              redirects = {row['from']: row['to'] for row in doc.get('query', {}).get('redirects', [])}
              for page in doc.get('query', {}).get('pages', []):
                  expected_articles[page.get('title')] = {
                      'title': page.get('title'),
                      'pageid': page.get('pageid'),
                      'wikibase_item': (page.get('pageprops') or {}).get('wikibase_item'),
                  }
              for original in batch:
                  target = redirects.get(normalized.get(original, original), normalized.get(original, original))
                  if target in expected_articles:
                      expected_articles[original] = expected_articles[target]
              time.sleep(0.2)

          origin_metadata = {}
          for host, titles in origins_by_host.items():
              titles = [title for title in sorted(titles) if title]
              if not titles:
                  continue
              api = f'https://{host}/api.php'
              for batch in chunks(titles):
                  params = {
                      'action': 'query', 'format': 'json', 'formatversion': 2,
                      'redirects': 1, 'prop': 'pageprops|categories|links',
                      'cllimit': 'max', 'pllimit': 'max', 'titles': '|'.join(batch),
                  }
                  if any(title.lower().startswith('file:') for title in batch):
                      params['prop'] += '|imageinfo|globalusage'
                      params['iiprop'] = 'extmetadata|url|mime|size'
                      params['gulimit'] = 'max'
                  try:
                      doc = request_json(api, params)
                  except Exception as exc:
                      for title in batch:
                          origin_metadata[f'{host}|{title}'] = {'error': str(exc)}
                      continue
                  normalized = {row['from']: row['to'] for row in doc.get('query', {}).get('normalized', [])}
                  redirects = {row['from']: row['to'] for row in doc.get('query', {}).get('redirects', [])}
                  pages = {page.get('title'): page for page in doc.get('query', {}).get('pages', [])}
                  for original in batch:
                      target = redirects.get(normalized.get(original, original), normalized.get(original, original))
                      page = pages.get(target) or pages.get(original) or {'title': target, 'missing': True}
                      ii = (page.get('imageinfo') or [{}])[0]
                      ext = {}
                      for key, value in (ii.get('extmetadata') or {}).items():
                          ext[key] = clean_markup(value.get('value')) if isinstance(value, dict) else clean_markup(value)
                      origin_metadata[f'{host}|{original}'] = {
                          'title': page.get('title'),
                          'pageid': page.get('pageid'),
                          'wikibase_item': (page.get('pageprops') or {}).get('wikibase_item'),
                          'categories': [row.get('title') for row in page.get('categories', [])],
                          'links': [row.get('title') for row in page.get('links', [])],
                          'globalusage': [row.get('title') for row in page.get('globalusage', [])],
                          'image_url': ii.get('url'),
                          'mime': ii.get('mime'),
                          'width': ii.get('width'),
                          'height': ii.get('height'),
                          'extmetadata': ext,
                          'missing': bool(page.get('missing')),
                      }
                  time.sleep(0.3)

          # Commons structured-data P180 depicts claims, queried independently.
          commons_titles = sorted(origins_by_host.get('commons.wikimedia.org', set()))
          for batch in chunks([title for title in commons_titles if title.lower().startswith('file:')], 40):
              try:
                  doc = request_json('https://commons.wikimedia.org/w/api.php', {
                      'action': 'wbgetentities', 'format': 'json', 'sites': 'commonswiki',
                      'titles': '|'.join(batch), 'props': 'claims',
                  })
              except Exception:
                  continue
              for entity in doc.get('entities', {}).values():
                  sitelink = (entity.get('sitelinks') or {}).get('commonswiki', {}).get('title')
                  if not sitelink:
                      continue
                  depicts = []
                  for claim in (entity.get('claims') or {}).get('P180', []):
                      value = (((claim.get('mainsnak') or {}).get('datavalue') or {}).get('value') or {})
                      if isinstance(value, dict) and value.get('id'):
                          depicts.append(value['id'])
                  key = f'commons.wikimedia.org|{sitelink}'
                  if key in origin_metadata:
                      origin_metadata[key]['depicts_qids'] = sorted(set(depicts))
              time.sleep(0.2)

          for row in rows:
              row['expected_article'] = expected_articles.get(row.get('expected_article_title'))
              row['origin_metadata'] = origin_metadata.get(f'{row["origin_host"]}|{row["origin_title"]}', {})

          output = {
              'version': 1,
              'generated_at': '2026-07-23T00:00:00.000Z',
              'item_set_sha256': state['source']['item_set_sha256'],
              'count': len(rows),
              'rows': rows,
          }
          Path('source-metadata').mkdir(exist_ok=True)
          Path('source-metadata/metadata.json').write_text(json.dumps(output, indent=2) + '\n')
          print(f'harvested metadata for {len(rows)} facets')
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: trek-media-source-metadata
          path: source-metadata
          if-no-files-found: error
          retention-days: 14
