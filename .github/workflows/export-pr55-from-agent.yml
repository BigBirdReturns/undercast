name: export-pr55-from-agent

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    if: github.event.pull_request.number == 56
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/full-canon-census
      - name: Pack exact PR 55 branch checkout
        run: tar --exclude=.git --exclude=node_modules -czf /tmp/undercast-pr55.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: undercast-pr55-checkout
          path: /tmp/undercast-pr55.tar.gz
          if-no-files-found: error
          retention-days: 2
