name: finalize-trek-media-baseline-v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  actions: read

concurrency:
  group: finalize-trek-media-baseline-v2
  cancel-in-progress: true

jobs:
  finalize:
    if: github.head_ref == 'agent/trek-media-baseline-closure'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-media-baseline-closure
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Correct receipt-field assertions
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/finalize-trek-baseline.sh')
          text = path.read_text()
          replacements = {
              "row['source_signal']": "row['identity_signal']",
              "row['source_metadata']": "row['origin_receipt']",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing expected finalizer assertion field {old}')
              text = text.replace(old, new)
          path.write_text(text)
          PY

      - name: Apply, gate, and publish the permanent baseline closure
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/finalize-trek-baseline.sh
