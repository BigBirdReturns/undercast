name: finalize-trek-media-baseline-v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  actions: read

concurrency:
  group: finalize-trek-media-baseline-v2
  cancel-in-progress: true

jobs:
  finalize:
    if: github.head_ref == 'agent/trek-media-baseline-closure'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-media-baseline-closure
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Apply, gate, and publish the permanent baseline closure
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/finalize-trek-baseline.sh
