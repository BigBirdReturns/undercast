name: abort-m5-listener-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  actions: read

concurrency:
  group: abort-m5-listener-gate
  cancel-in-progress: true

jobs:
  cycle:
    if: github.head_ref == 'agent/trek-cycle-001'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-cycle-001
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Restore and verify the exact M-5 lease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .luna cycle-export .waterline
          gh run download 30031752138 -n trek-cycle-001-second-lease -D .luna
          cp .luna/second-batch.json .luna/m5-batch.json
          node - <<'NODE'
          const fs=require('fs');
          const batch=JSON.parse(fs.readFileSync('.luna/m5-batch.json','utf8'));
          if(batch.tasks?.length!==1) throw new Error('expected one M-5 task');
          const task=batch.tasks[0];
          if(task.character!=='M-5 multitronic unit'||task.performer!=='James Doohan') {
            throw new Error(`unexpected task ${task.performer} as ${task.character}`);
          }
          NODE

      - name: Submit the listener-gate block
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const batch=JSON.parse(fs.readFileSync('.luna/m5-batch.json','utf8'));
          const task=batch.tasks[0];
          const reason='A reproducible 5.260590-second M-5 sample was recovered and hash-bound, but three independent blind reviewers all reported that their runtime omitted audio input. Under the governing voice rubric, no transform grade may be filed without three actual listening scores, so drafting would invent a required fact.';
          const result={version:1,lease_id:batch.lease_id,agent:batch.agent,results:[{
            task_id:task.id,
            decision:'blocked',
            reason,
            evidence:[
              {label:'Exact M-5 performance credit',source:task.sources[0]},
              {label:'Official Star Trek account of James Doohan as M-5',source:'https://www.startrek.com/news/the-sound-of-their-voices'},
              {label:'Hash-bound M-5 listening sample',source:'https://www.wavsource.com/snds_2020-10-01_3728627494378403/tv/star_trek/2-24_must-survive3.wav'}
            ],
            retry_after:'2026-08-01T00:00:00.000Z'
          }]};
          fs.writeFileSync('.luna/m5-results.json',JSON.stringify(result,null,2)+'\n');
          fs.writeFileSync('cycle-export/m5-listener-gate.json',JSON.stringify({
            version:1,
            audio:{
              url:'https://www.wavsource.com/snds_2020-10-01_3728627494378403/tv/star_trek/2-24_must-survive3.wav',
              sha256:'ae0152ed12fc06ac31f11f54e70868fd67928ab6e42b62162bcbcf7940008ba1',
              bytes:232036,
              duration_seconds:5.260590,
              codec:'pcm_s16le',
              sample_rate:22050,
              channels:1
            },
            reviewers:[
              {id:'alpha',disposition:'unable',reason:'runtime omitted audio input; no score issued'},
              {id:'beta',disposition:'unable',reason:'runtime omitted audio input; no score issued'},
              {id:'gamma',disposition:'unable',reason:'runtime omitted audio input; no score issued'}
            ],
            decision:'blocked',
            reason
          },null,2)+'\n');
          NODE
          npm run autopilot -- submit --batch .luna/m5-batch.json --input .luna/m5-results.json --now 2026-07-23T19:00:00.000Z
          node - <<'NODE'
          const fs=require('fs');
          const batch=JSON.parse(fs.readFileSync('.luna/m5-batch.json','utf8'));
          const state=JSON.parse(fs.readFileSync('data/AUTOPILOT.json','utf8'));
          const job=state.jobs.find(row=>row.id===batch.tasks[0].id);
          if(job?.status!=='blocked'||job.outcome?.kind!=='blocked') throw new Error(`M-5 not durably blocked: ${job?.status}`);
          NODE

      - name: Record the reviewed aborted-cycle receipt
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const batch=JSON.parse(fs.readFileSync('.luna/m5-batch.json','utf8'));
          const task=batch.tasks[0], source=task.source_receipts[0];
          const doc={
            version:1,
            scope_id:task.scope,
            lease_id:batch.lease_id,
            outcome:'aborted',
            reviewed_by:'chatgpt-second-desk',
            reviewed_role:'second-desk',
            reviewed_at:'2026-07-23T19:05:00.000Z',
            note:'M-5 is an eligible unseen James Doohan voice performance and a reproducible sample was recovered, but all three independent reviewers were technically unable to hear the hash-bound bytes. The required three-pass voice consensus therefore does not exist; the task was blocked without fabricating transform.',
            evidence:[
              {type:'incident',value:'Three independent blind reviewer runtimes omitted audio input; no M-5 transform scores were issued'},
              {type:'audio-sample',value:'sha256 ae0152ed12fc06ac31f11f54e70868fd67928ab6e42b62162bcbcf7940008ba1; 232036 bytes; 5.260590 seconds; PCM s16le mono 22050 Hz'},
              {type:'source-revision',value:`Memory Alpha M-5 page ${source.pageid} revision ${source.revision} content ${source.content_sha256}`},
              {type:'independent-review',value:'alpha=unable; beta=unable; gamma=unable; each verified exact bytes and withheld a score'},
              {type:'restart-proof',value:'M-5 lease packet restored from workflow artifact 8573582319 produced by run 30031752138'}
            ]
          };
          fs.writeFileSync('.waterline/m5-abort.json',JSON.stringify(doc,null,2)+'\n');
          NODE
          npm run waterline -- record-cycle --input .waterline/m5-abort.json
          node scripts/waterline.mjs status --scope star-trek --json > cycle-export/after-m5-abort.json
          node - <<'NODE'
          const fs=require('fs');
          const status=JSON.parse(fs.readFileSync('cycle-export/after-m5-abort.json','utf8'));
          if(status.phase!=='ready-for-cycle'||status.claim_allowed!==true) {
            throw new Error(`waterline did not reopen: ${status.phase} ${JSON.stringify(status.claim_reasons)}`);
          }
          if(status.cycles?.successful_receipts!==0) throw new Error('aborted M-5 cycle was incorrectly counted successful');
          NODE

      - name: Commit M-5 block and aborted receipt
        run: |
          git config user.name 'undercast-cycle-bot'
          git config user.email 'undercast-cycle-bot@users.noreply.github.com'
          git add data/AUTOPILOT.json data/journal/autopilot.jsonl data/WATERLINE-STATE.json data/journal/waterline.jsonl
          git diff --cached --check
          git commit -m 'Cycle: receipt M-5 listener-gate abort'
          git push origin HEAD:agent/trek-cycle-001

      - uses: actions/upload-artifact@v4
        with:
          name: trek-cycle-001-m5-abort
          path: cycle-export
          if-no-files-found: error
          retention-days: 14
