name: read-collection-publish-log

on:
  push:
    branches: [agent/read-collection-publish-log]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  read:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download failed publication job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p publication-log
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/BigBirdReturns/undercast/actions/jobs/89418434798/logs \
            -o publication-log/full.log
          tail -n 180 publication-log/full.log > publication-log/tail.log
          cat publication-log/tail.log
      - uses: actions/upload-artifact@v4
        with:
          name: collection-publish-log
          path: publication-log
          if-no-files-found: error
          retention-days: 7
