name: export-ferengi-physical-media

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: export-ferengi-physical-media
  cancel-in-progress: true

jobs:
  export:
    if: github.event.pull_request.number == 72
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ferengi-role-filter
          fetch-depth: 1
      - name: Package exact local assets and provenance
        run: |
          mkdir -p ferengi-physical-media/images
          cp images/uc-678-still.jpg images/uc-678-portrait.jpg images/uc-679-still.jpg images/uc-679-portrait.jpg ferengi-physical-media/images/
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          import { createHash } from 'node:crypto';
          const read=async path=>JSON.parse(await readFile(path,'utf8'));
          const [specimens,sources,manifest]=await Promise.all([read('data/specimens.json'),read('data/SOURCES.json'),read('data/media-manifest.json')]);
          const ids=['UC-678','UC-679'];
          const rows=[];
          for(const id of ids){
            const specimen=specimens.find(row=>row.id===id);
            const source=sources.find(row=>row.id===id);
            const assets={};
            for(const side of ['still','portrait']){
              const ref=specimen?.[side];
              const bytes=ref?.src?await readFile(ref.src):null;
              assets[side]=ref?{...ref,sha256:createHash('sha256').update(bytes).digest('hex'),bytes:bytes.length,manifest:manifest.assets?.[ref.src]||null}:null;
            }
            rows.push({id,specimen,source,assets});
          }
          await writeFile('ferengi-physical-media/context.json',JSON.stringify({version:1,rows},null,2)+'\n');
          console.log(JSON.stringify(rows.map(row=>({id:row.id,character:row.specimen.character,actor:row.specimen.actor,still:row.assets.still,portrait:row.assets.portrait})),null,2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: ferengi-physical-media
          path: ferengi-physical-media
          if-no-files-found: error
          retention-days: 14
