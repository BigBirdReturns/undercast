name: close-tosk-cycle-v2

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: close-tosk-cycle-v2
  cancel-in-progress: false

jobs:
  close:
    if: github.event_name != 'pull_request' || github.event.pull_request.number == 78
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/star-trek-gold-completion
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Apply, resolve, rebuild and gate Tosk
        run: node scripts/close-tosk-cycle-v2.mjs
      - name: Retain exact closure evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trek-cycle-002-tosk-closure-v2
          path: cycle-closure
          if-no-files-found: ignore
          retention-days: 30
      - name: Publish resolved restart-safe candidate
        run: |
          set -euo pipefail
          rm -rf .luna cycle-closure
          rm -f \
            scripts/close-tosk-cycle-v2.mjs \
            .github/workflows/close-tosk-cycle-v2.yml \
            .github/workflows/close-tosk-cycle.yml \
            .github/workflows/evidence-tosk-media.yml \
            .github/workflows/export-star-trek-gold.yml \
            .github/workflows/patch-tosk-preflight.yml
          git config user.name 'undercast-cycle-operator'
          git config user.email 'undercast-cycle-operator@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Cycle 2: resolve Tosk with exact-subject media'
          git push origin HEAD:agent/star-trek-gold-completion
