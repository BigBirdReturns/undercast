name: archive-contract

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install rendered-test runtime
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Rebuild every deterministic projection
        run: node scripts/shard.mjs
      - name: Refuse generated drift
        run: git diff --exit-code
      - name: Capture projection drift diagnostics
        if: failure()
        run: |
          mkdir -p .ci/projection-drift/generated
          git status --short > .ci/projection-drift/status.txt
          git diff --stat > .ci/projection-drift/stat.txt
          git diff --binary > .ci/projection-drift/projection-drift.patch
          cp data/CENSUS-FERENGI-TEST.json data/quality.json data/species.json .ci/projection-drift/generated/
      - name: Upload projection drift diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: projection-drift
          path: .ci/projection-drift
          if-no-files-found: error
          retention-days: 14
      - name: Validate archive invariants
        run: node scripts/validate.mjs
      - name: Validate Luna autopilot queue contract
        run: node scripts/autopilot.mjs validate && npm run autopilot:fixtures
      - name: Compile the current census into an isolated Luna queue
        run: |
          work="$(mktemp -d)"
          node scripts/autopilot.mjs sync \
            --state "$work/AUTOPILOT.json" \
            --journal "$work/autopilot.jsonl" \
            --lock "$work/AUTOPILOT.lock" \
            --json > "$work/status.json"
          node scripts/autopilot.mjs validate --state "$work/AUTOPILOT.json"
          node -e 'const fs=require("fs"); const s=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); const trek=s.scopes?.["star-trek"]; if (!trek?.total) throw new Error("actual census produced no Star Trek tasks"); console.log(`actual census queue: Star Trek ${trek.total}; claimable ${trek.statuses?.queued||0}; attention ${trek.statuses?.attention||0}; resolved ${trek.statuses?.resolved||0}`);' "$work/status.json"
      - name: Validate semantic corpus invariants
        run: npm run audit:corpus
      - name: Validate public site seams
        run: npm run test:site-seams
      - name: Build permanent routes
        run: node scripts/build-record-pages.mjs
      - name: Exercise rendered interactions
        run: npm run test:rendered
      - name: Verify route count
        run: test "$(find records -mindepth 1 -maxdepth 1 -type d | wc -l)" = "$(node -p "require('./data/specimens.json').length + require('./data/tombstones.json').records.length")"
      - name: Rebuild DS9 projections offline
        run: node scripts/ds9-census.mjs --project-only && node scripts/ds9-graph.mjs --project-only && node scripts/ds9-eligibility-queue.mjs && node scripts/ds9-maker-queue.mjs
      - name: Refuse DS9 projection drift
        run: git diff --exit-code data/ds9
      - name: DS9 census regression fixtures
        run: npm run ds9:fixtures
      - name: DS9 eligibility review-queue contract fixtures
        run: npm run ds9:eligibility:fixtures
      - name: DS9 maker-attribution review-queue contract fixtures
        run: npm run ds9:maker:fixtures
