name: archive-contract

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install rendered-test runtime
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run canonical gate
        run: npm run gate
      - name: Upload projection drift diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: projection-drift
          path: .ci/projection-drift
          if-no-files-found: ignore
          retention-days: 14
