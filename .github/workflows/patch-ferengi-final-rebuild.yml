name: patch-ferengi-final-rebuild

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: patch-ferengi-final-rebuild
  cancel-in-progress: true

jobs:
  patch:
    if: github.event.pull_request.number == 72
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ferengi-role-filter
          fetch-depth: 1
      - name: Rebuild every deterministic projection immediately before commit
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('.github/workflows/apply-ferengi-role-filter.yml')
          text=path.read_text()
          old='''      - name: Prove exact Ferengi semantics before publication
        run: |
          npm run species:fixtures
'''
          new='''      - name: Prove exact Ferengi semantics before publication
        run: |
          node scripts/shard.mjs
          npm run species:fixtures
'''
          if text.count(old)!=1:
              raise SystemExit(f'proof insertion count {text.count(old)}')
          path.write_text(text.replace(old,new,1))
          PY
          rm -f .github/workflows/patch-ferengi-final-rebuild.yml
          git config user.name 'undercast-taxonomy'
          git config user.email 'undercast-taxonomy@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Fix: rebuild projections immediately before taxonomy commit'
          git push origin HEAD:agent/fix-ferengi-role-filter
