name: export-site-sweep

on:
  push:
    branches: [agent/full-site-integrity-design-sweep]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: export-site-sweep
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Package source, generated contracts, and visual inventory
        run: |
          set -euo pipefail
          mkdir -p site-sweep-export/media-candidates
          find . -path './.git' -prune -o -type f -printf '%p\t%s bytes\n' | sort > site-sweep-export/repo-inventory.txt
          find images -type f 2>/dev/null | sort > site-sweep-export/image-files.txt
          find assets -type f 2>/dev/null | sort > site-sweep-export/asset-files.txt
          find images -type f 2>/dev/null \
            | grep -Ei '(unknown|blank|placeholder|relief|cast|mask|fallback|missing|silhouette|default|no[-_]?cast)' \
            | head -200 \
            | while IFS= read -r file; do
                mkdir -p "site-sweep-export/media-candidates/$(dirname "$file")"
                cp "$file" "site-sweep-export/media-candidates/$file"
              done || true
          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./images' \
            --exclude='./records' \
            --exclude='./site-sweep-export' \
            -czf site-sweep-export/source-without-heavy-media.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: full-site-sweep-workspace
          path: site-sweep-export
          if-no-files-found: error
          retention-days: 7
