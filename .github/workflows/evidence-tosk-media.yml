name: evidence-tosk-media

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: evidence-tosk-media
  cancel-in-progress: true

jobs:
  evidence:
    if: github.event_name != 'pull_request' || github.event.pull_request.number == 78
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/star-trek-gold-completion
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pillow
      - name: Bind local bytes to exact MediaWiki revisions
        env:
          CONTACT: bigbirdreturns@proton.me
        run: |
          set -euo pipefail
          mkdir -p tosk-evidence
          python - <<'PY'
          from __future__ import annotations
          import hashlib, io, json, os, urllib.parse, urllib.request
          from pathlib import Path
          from PIL import Image, ImageDraw

          ROOT=Path('.')
          OUT=Path('tosk-evidence')
          API='https://memory-alpha.fandom.com/api.php'
          UA=f"undercast/0.1 (+https://github.com/BigBirdReturns/undercast; {os.environ.get('CONTACT','maintainer')})"

          def get(params):
              url=API+'?'+urllib.parse.urlencode({'format':'json','formatversion':'2','origin':'*',**params})
              req=urllib.request.Request(url,headers={'User-Agent':UA,'Accept':'application/json'})
              with urllib.request.urlopen(req,timeout=45) as r:
                  return json.load(r)

          def download(url):
              req=urllib.request.Request(url,headers={'User-Agent':UA,'Accept':'image/*'})
              with urllib.request.urlopen(req,timeout=60) as r:
                  return r.read()

          def dhash(data):
              image=Image.open(io.BytesIO(data)).convert('L').resize((9,8))
              px=list(image.getdata())
              bits=[]
              for y in range(8):
                  row=px[y*9:(y+1)*9]
                  bits.extend(row[x]>row[x+1] for x in range(8))
              value=0
              for bit in bits:value=(value<<1)|int(bit)
              return f'{value:016x}'

          def distance(a,b):
              return (int(a,16)^int(b,16)).bit_count()

          def page(title):
              article=get({'action':'query','prop':'pageimages|revisions|categories|links','piprop':'name|thumbnail','pithumbsize':'640','rvprop':'ids|timestamp|sha1','cllimit':'max','pllimit':'max','titles':title})['query']['pages'][0]
              file_name=article.get('pageimage')
              if not file_name: raise RuntimeError(f'{title} has no pageimage')
              file_page=get({'action':'query','prop':'imageinfo|revisions|categories|links','iiprop':'url|sha1|size|extmetadata','iiurlwidth':'640','rvprop':'ids|timestamp|sha1','cllimit':'max','pllimit':'max','titles':'File:'+file_name})['query']['pages'][0]
              info=file_page['imageinfo'][0]
              remote_url=info.get('thumburl') or info['url']
              data=download(remote_url)
              return {
                  'article':{
                      'title':article['title'],'pageid':article['pageid'],'revision':article.get('revisions',[{}])[0].get('revid'),'timestamp':article.get('revisions',[{}])[0].get('timestamp'),'sha1':article.get('revisions',[{}])[0].get('sha1'),'pageimage':file_name,
                      'categories':[row['title'] for row in article.get('categories',[])],
                      'links':[row['title'] for row in article.get('links',[])],
                  },
                  'file':{
                      'title':file_page['title'],'pageid':file_page['pageid'],'revision':file_page.get('revisions',[{}])[0].get('revid'),'timestamp':file_page.get('revisions',[{}])[0].get('timestamp'),'revision_sha1':file_page.get('revisions',[{}])[0].get('sha1'),'image_sha1':info.get('sha1'),'url':info.get('url'),'descriptionurl':info.get('descriptionurl'),'thumburl':info.get('thumburl'),'width':info.get('width'),'height':info.get('height'),
                      'categories':[row['title'] for row in file_page.get('categories',[])],
                      'links':[row['title'] for row in file_page.get('links',[])],
                      'extmetadata':{k:v.get('value') for k,v in info.get('extmetadata',{}).items() if k in ['ImageDescription','ObjectName','Artist','Credit','LicenseShortName','UsageTerms']},
                  },
                  'remote':{'sha256':hashlib.sha256(data).hexdigest(),'bytes':len(data),'dhash':dhash(data)},
                  '_bytes':data,
              }

          local={}
          for side in ['still','portrait']:
              path=ROOT/f'images/uc-1279-{side}.jpg'
              data=path.read_bytes()
              local[side]={'path':str(path),'sha256':hashlib.sha256(data).hexdigest(),'bytes':len(data),'dhash':dhash(data),'_bytes':data}

          sources={'Tosk':page('Tosk'),'Scott MacDonald':page('Scott MacDonald')}
          comparisons=[]
          for side in ['still','portrait']:
              for source_name,source in sources.items():
                  comparisons.append({'local_side':side,'source_page':source_name,'local_sha256':local[side]['sha256'],'remote_sha256':source['remote']['sha256'],'exact_bytes':local[side]['_bytes']==source['_bytes'],'dhash_distance':distance(local[side]['dhash'],source['remote']['dhash'])})

          report={
              'version':1,
              'wall_id':'UC-1279',
              'task_id':'ap_525b90d304dca267e9231889',
              'semantics':'Identity is established from revision-bound article/file metadata and source-image comparison, never appearance inference. Presentation is reserved for independent review of the exact local bytes.',
              'local':{k:{kk:vv for kk,vv in v.items() if kk!='_bytes'} for k,v in local.items()},
              'sources':{k:{kk:vv for kk,vv in v.items() if kk!='_bytes'} for k,v in sources.items()},
              'comparisons':comparisons,
          }
          (OUT/'source-evidence.json').write_text(json.dumps(report,indent=2,ensure_ascii=False)+'\n')

          panels=[]
          for label,data in [('LOCAL STILL',local['still']['_bytes']),('LOCAL PORTRAIT',local['portrait']['_bytes']),('TOSK PAGEIMAGE',sources['Tosk']['_bytes']),('SCOTT PAGEIMAGE',sources['Scott MacDonald']['_bytes'])]:
              image=Image.open(io.BytesIO(data)).convert('RGB')
              image.thumbnail((420,420))
              canvas=Image.new('RGB',(440,470),'white')
              canvas.paste(image,((440-image.width)//2,32))
              ImageDraw.Draw(canvas).text((12,8),label,fill='black')
              panels.append(canvas)
          sheet=Image.new('RGB',(880,940),'#ddd')
          for i,panel in enumerate(panels): sheet.paste(panel,((i%2)*440,(i//2)*470))
          sheet.save(OUT/'contact-sheet.jpg',quality=92)
          for source_name,source in sources.items():
              safe=source_name.lower().replace(' ','-')
              (OUT/f'{safe}-remote.jpg').write_bytes(source['_bytes'])
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: trek-cycle-002-tosk-source-evidence
          path: tosk-evidence
          if-no-files-found: error
          retention-days: 30
