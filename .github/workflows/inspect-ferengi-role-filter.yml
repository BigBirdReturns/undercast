name: inspect-ferengi-role-filter

on:
  push:
    branches: [agent/fix-ferengi-role-filter]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: inspect-ferengi-role-filter
  cancel-in-progress: true

jobs:
  inspect:
    if: github.event_name != 'pull_request' || github.event.pull_request.number == 72
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ferengi-role-filter
          fetch-depth: 1

      - name: Reconcile exact Ferengi credits with visible wall cards
        run: |
          mkdir -p ferengi-diagnostics
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          import { createHash } from 'node:crypto';

          const read = async path => JSON.parse(await readFile(path, 'utf8'));
          const [specimens, coverage, species, index] = await Promise.all([
            read('data/specimens.json'),
            read('data/CENSUS-COVERAGE.json'),
            read('data/species.json'),
            read('data/index.json'),
          ]);
          const normalize = value => String(value ?? '')
            .normalize('NFKD').replace(/[\u0300-\u036f]/g, '')
            .replace(/[’‘]/g, "'").replace(/[^a-zA-Z0-9']+/g, ' ')
            .trim().toLowerCase();
          const exact = (a, b) => normalize(a) === normalize(b);
          const byId = new Map(specimens.map(row => [row.id, row]));
          const indexById = new Map(index.map(row => [row.id, row]));
          const taxon = species.taxa.find(row => row.key === 'species:star-trek:ferengi');
          if (!taxon) throw new Error('Ferengi taxon missing');

          const visibleCards = taxon.records.map(row => {
            const specimen = byId.get(row.id);
            const indexEntry = indexById.get(row.id);
            const primaryCredits = row.credits.filter(credit => exact(credit.performer, specimen?.actor) && exact(credit.character, specimen?.character));
            const alternateCredits = row.credits.filter(credit => !primaryCredits.includes(credit));
            return {
              id: row.id,
              primary_character: specimen?.character || null,
              primary_performer: specimen?.actor || null,
              universe: specimen?.universe || null,
              species_labels: indexEntry?.sp || [],
              primary_ferengi_credit: primaryCredits,
              alternate_ferengi_credits: alternateCredits,
              false_positive_visible_card: primaryCredits.length === 0,
            };
          });

          const credits = coverage
            .filter(row => row.franchise === 'Star Trek' && row.category === 'Ferengi')
            .map(row => {
              const ids = row.wall_ids || [];
              const bindings = ids.map(id => {
                const specimen = byId.get(id);
                return {
                  id,
                  primary_character: specimen?.character || null,
                  primary_performer: specimen?.actor || null,
                  primary_match: Boolean(specimen && exact(specimen.actor, row.performer) && exact(specimen.character, row.character)),
                  additional_performance_match: Boolean(specimen && (specimen.performances || []).some(performance => exact(specimen.actor, row.performer) && exact(performance.character, row.character))),
                };
              });
              return {
                character: row.character,
                performer: row.performer,
                performance_mode: row.performance_mode,
                source: row.source,
                role_on_wall: row.role_on_wall,
                wall_ids: ids,
                bindings,
              };
            });

          const report = {
            version: 1,
            generated_at: new Date().toISOString(),
            source_sha256: Object.fromEntries(await Promise.all([
              'data/specimens.json', 'data/CENSUS-COVERAGE.json', 'data/species.json', 'data/index.json'
            ].map(async path => [path, createHash('sha256').update(await readFile(path)).digest('hex')]))),
            counts: {
              named_credits: credits.length,
              filed_role_credits: credits.filter(row => row.role_on_wall).length,
              unfiled_named_credits: credits.filter(row => !row.role_on_wall).length,
              visible_wall_cards: visibleCards.length,
              visible_primary_ferengi_cards: visibleCards.filter(row => !row.false_positive_visible_card).length,
              false_positive_visible_cards: visibleCards.filter(row => row.false_positive_visible_card).length,
              filed_credits_collapsed_into_secondary_performances: credits.filter(row => row.role_on_wall && row.bindings.some(binding => !binding.primary_match && binding.additional_performance_match)).length,
            },
            false_positive_visible_cards: visibleCards.filter(row => row.false_positive_visible_card),
            visible_cards: visibleCards,
            filed_credits_not_visible_as_primary_cards: credits.filter(row => row.role_on_wall && !row.bindings.some(binding => binding.primary_match)),
            unfiled_named_credits: credits.filter(row => !row.role_on_wall),
            all_credits: credits,
          };
          await writeFile('ferengi-diagnostics/report.json', JSON.stringify(report, null, 2) + '\n');
          const lines = [
            `Ferengi named credits: ${report.counts.named_credits}`,
            `Filed exact role credits: ${report.counts.filed_role_credits}`,
            `Visible wall cards tagged Ferengi: ${report.counts.visible_wall_cards}`,
            `Visible cards whose displayed role is Ferengi: ${report.counts.visible_primary_ferengi_cards}`,
            `False-positive displayed cards: ${report.counts.false_positive_visible_cards}`,
            `Filed Ferengi credits hidden as secondary performances: ${report.counts.filed_credits_collapsed_into_secondary_performances}`,
            '',
            'False-positive visible cards:',
            ...report.false_positive_visible_cards.map(row => `- ${row.id}: ${row.primary_performer} — ${row.primary_character}; hidden Ferengi roles: ${row.alternate_ferengi_credits.map(credit => credit.character).join(', ')}`),
            '',
            'Filed credits not visible as their own primary cards:',
            ...report.filed_credits_not_visible_as_primary_cards.map(row => `- ${row.performer} — ${row.character}; bound to ${row.bindings.map(binding => `${binding.id} (${binding.primary_character})`).join(', ')}`),
          ];
          await writeFile('ferengi-diagnostics/report.txt', lines.join('\n') + '\n');
          console.log(lines.join('\n'));
          NODE

      - uses: actions/upload-artifact@v4
        with:
          name: ferengi-role-filter-diagnostics
          path: ferengi-diagnostics
          if-no-files-found: error
          retention-days: 7
