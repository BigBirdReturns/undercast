name: verify-ferengi-physical-media

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: verify-ferengi-physical-media
  cancel-in-progress: true

jobs:
  verify:
    if: github.event.pull_request.number == 72
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ferengi-role-filter
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install image comparison runtime
        run: pip install pillow requests
      - name: Fetch exact source metadata and compare bytes
        run: |
          mkdir -p ferengi-media-evidence/remote
          python - <<'PY'
          import hashlib, json, pathlib, requests
          from PIL import Image

          out=pathlib.Path('ferengi-media-evidence')
          headers={'User-Agent':'undercast/0.1 taxonomy audit (+https://github.com/BigBirdReturns/undercast)'}
          session=requests.Session();session.headers.update(headers)

          def dhash(path):
              with Image.open(path) as im:
                  im=im.convert('L').resize((9,8))
                  px=list(im.getdata())
              bits=[]
              for y in range(8):
                  row=px[y*9:(y+1)*9]
                  bits.extend(row[x]>row[x+1] for x in range(8))
              value=0
              for bit in bits:value=(value<<1)|int(bit)
              return value
          def distance(a,b):return (a^b).bit_count()
          def get_json(url,params):
              r=session.get(url,params=params,timeout=30);r.raise_for_status();return r.json(),r.url
          def fetch(url,path):
              r=session.get(url,timeout=60);r.raise_for_status();path.write_bytes(r.content);return {'url':r.url,'bytes':len(r.content),'sha256':hashlib.sha256(r.content).hexdigest()}

          cases=[
            {'id':'UC-678','side':'still','local':'images/uc-678-still.jpg','api':'https://memory-alpha.fandom.com/api.php','title':'Grimp','kind':'pageimage'},
            {'id':'UC-679','side':'still','local':'images/uc-679-still.jpg','api':'https://memory-alpha.fandom.com/api.php','title':'Leck','kind':'pageimage'},
            {'id':'UC-678','side':'portrait','local':'images/uc-678-portrait.jpg','api':'https://commons.wikimedia.org/w/api.php','title':'File:Jason Marsden (43904363590).jpg','kind':'file'},
            {'id':'UC-679','side':'portrait','local':'images/uc-679-portrait.jpg','api':'https://en.wikipedia.org/w/api.php','title':'File:Hamilton Camp Sweet Joy Cropped.jpg','kind':'file'},
          ]
          rows=[]
          for case in cases:
              params={'action':'query','format':'json','formatversion':'2','redirects':'1','titles':case['title']}
              if case['kind']=='pageimage':
                  params.update({'prop':'pageimages|revisions','piprop':'name|original','rvprop':'ids|timestamp','pithumbsize':'1200'})
              else:
                  params.update({'prop':'imageinfo|revisions','iiprop':'url|sha1|size|mime|extmetadata','rvprop':'ids|timestamp'})
              data,query_url=get_json(case['api'],params)
              page=(data.get('query',{}).get('pages') or [{}])[0]
              if case['kind']=='pageimage':
                  source_url=(page.get('original') or page.get('thumbnail') or {}).get('source')
                  file_title=page.get('pageimage')
                  source_meta={'pageid':page.get('pageid'),'title':page.get('title'),'file_title':file_title,'revision':(page.get('revisions') or [{}])[0]}
                  if file_title:
                      file_data,file_query=get_json(case['api'],{'action':'query','format':'json','formatversion':'2','redirects':'1','prop':'imageinfo|revisions','iiprop':'url|sha1|size|mime|extmetadata','rvprop':'ids|timestamp','titles':'File:'+file_title})
                      file_page=(file_data.get('query',{}).get('pages') or [{}])[0]
                      info=(file_page.get('imageinfo') or [{}])[0]
                      source_url=info.get('url') or source_url
                      source_meta['file_page']={'pageid':file_page.get('pageid'),'title':file_page.get('title'),'revision':(file_page.get('revisions') or [{}])[0],'imageinfo':info,'query_url':file_query}
              else:
                  info=(page.get('imageinfo') or [{}])[0]
                  source_url=info.get('url')
                  source_meta={'pageid':page.get('pageid'),'title':page.get('title'),'revision':(page.get('revisions') or [{}])[0],'imageinfo':info}
              if not source_url:raise RuntimeError(f'no source image URL for {case}')
              remote=out/'remote'/f"{case['id']}-{case['side']}{pathlib.Path(source_url.split('?')[0]).suffix or '.jpg'}"
              download=fetch(source_url,remote)
              local=pathlib.Path(case['local'])
              row={**case,'query_url':query_url,'metadata':source_meta,'local':{'bytes':local.stat().st_size,'sha256':hashlib.sha256(local.read_bytes()).hexdigest()},'remote':download,'dhash_distance':distance(dhash(local),dhash(remote))}
              rows.append(row)
              print(case['id'],case['side'],'distance',row['dhash_distance'],'remote',download['url'])
          (out/'report.json').write_text(json.dumps({'version':1,'rows':rows},indent=2,ensure_ascii=False)+'\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: ferengi-media-evidence
          path: ferengi-media-evidence
          if-no-files-found: error
          retention-days: 14
