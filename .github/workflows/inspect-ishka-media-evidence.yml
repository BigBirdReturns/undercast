name: inspect-ishka-media-evidence

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: inspect-ishka-media-evidence
  cancel-in-progress: true

jobs:
  inspect:
    if: github.head_ref == 'agent/trek-cycle-001-success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-cycle-001-success
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image-comparison runtime
        run: python -m pip install --disable-pip-version-check pillow

      - name: Harvest exact source revisions and compare source images
        run: |
          python - <<'PY'
          import hashlib
          import html
          import io
          import json
          import re
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path
          from PIL import Image, ImageOps

          UA = 'UNDERCAST exact-subject cycle audit/1.0'
          out = Path('ishka-media-evidence')
          out.mkdir(exist_ok=True)
          specimens = [row for row in json.loads(Path('data/specimens.json').read_text()) if row.get('actor') == 'Andrea Martin' and row.get('character') == 'Ishka']
          if len(specimens) != 1:
              raise SystemExit(f'expected one Andrea Martin / Ishka specimen, found {len(specimens)}')
          specimen = specimens[0]
          audit = json.loads(Path('data/MEDIA-AUDIT.json').read_text())
          items = {row['side']: row for row in audit['items'] if row['wall_id'] == specimen['id']}
          if set(items) != {'still', 'portrait'}:
              raise SystemExit(f'expected two Ishka media facets, found {list(items)}')

          def request_json(base, params, attempts=5):
              url = base + '?' + urllib.parse.urlencode(params)
              last = None
              for attempt in range(attempts):
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': UA, 'Accept': 'application/json'})
                      with urllib.request.urlopen(req, timeout=60) as response:
                          return json.load(response), url
                  except Exception as exc:
                      last = exc
                      time.sleep(min(16, 2 ** attempt))
              raise RuntimeError(f'GET failed after {attempts} attempts: {url}: {last}')

          def download(url, attempts=4):
              last = None
              for attempt in range(attempts):
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': UA})
                      with urllib.request.urlopen(req, timeout=90) as response:
                          return response.read()
                  except Exception as exc:
                      last = exc
                      time.sleep(min(16, 2 ** attempt))
              raise RuntimeError(f'download failed: {url}: {last}')

          def clean(value):
              value = html.unescape(str(value or ''))
              value = re.sub(r'<[^>]+>', ' ', value)
              return re.sub(r'\s+', ' ', value).strip()

          def dhash_bytes(data, size=16):
              with Image.open(io.BytesIO(data)) as image:
                  image = ImageOps.exif_transpose(image).convert('L').resize((size + 1, size), Image.Resampling.LANCZOS)
                  pixels = list(image.getdata())
              bits = []
              for y in range(size):
                  row = pixels[y * (size + 1):(y + 1) * (size + 1)]
                  bits.extend(1 if row[x] > row[x + 1] else 0 for x in range(size))
              return ''.join(map(str, bits))

          def distance(a, b):
              return sum(x != y for x, y in zip(a, b))

          portrait_item = items['portrait']
          portrait_title = 'File:AndreaMartin-byPhilipRomano.jpg'
          commons_doc, commons_query = request_json('https://commons.wikimedia.org/w/api.php', {
              'action': 'query', 'format': 'json', 'formatversion': 2,
              'redirects': 1, 'prop': 'info|revisions|pageprops|categories|links|imageinfo',
              'rvprop': 'ids|timestamp|sha1', 'cllimit': 'max', 'pllimit': 'max',
              'iiprop': 'extmetadata|url|mime|size|sha1', 'iiurlwidth': 1200,
              'titles': portrait_title,
          })
          commons_page = commons_doc['query']['pages'][0]
          commons_ii = (commons_page.get('imageinfo') or [{}])[0]
          commons_ext = {key: clean(value.get('value')) for key, value in (commons_ii.get('extmetadata') or {}).items()}
          commons_entity, commons_entity_query = request_json('https://commons.wikimedia.org/w/api.php', {
              'action': 'wbgetentities', 'format': 'json', 'sites': 'commonswiki',
              'titles': portrait_title, 'props': 'claims|sitelinks',
          })
          enwiki_doc, enwiki_query = request_json('https://en.wikipedia.org/w/api.php', {
              'action': 'query', 'format': 'json', 'formatversion': 2,
              'redirects': 1, 'prop': 'pageprops|revisions', 'rvprop': 'ids|timestamp|sha1',
              'titles': 'Andrea Martin',
          })
          enwiki_page = enwiki_doc['query']['pages'][0]
          expected_qid = (enwiki_page.get('pageprops') or {}).get('wikibase_item')
          depicts = []
          for entity in commons_entity.get('entities', {}).values():
              for claim in (entity.get('claims') or {}).get('P180', []):
                  value = (((claim.get('mainsnak') or {}).get('datavalue') or {}).get('value') or {})
                  if isinstance(value, dict) and value.get('id'):
                      depicts.append(value['id'])
          portrait_remote_url = commons_ii.get('thumburl') or commons_ii.get('url')
          portrait_remote = download(portrait_remote_url)
          portrait_local = Path(portrait_item['asset']['src']).read_bytes()
          (out / 'portrait-source.jpg').write_bytes(portrait_remote)

          still_item = items['still']
          fandom_doc, fandom_query = request_json('https://memory-alpha.fandom.com/api.php', {
              'action': 'query', 'format': 'json', 'formatversion': 2,
              'redirects': 1, 'prop': 'revisions|pageimages|images|links',
              'rvprop': 'ids|timestamp|sha1|content', 'rvslots': 'main',
              'piprop': 'name|thumbnail|original', 'pithumbsize': 1000,
              'imlimit': 'max', 'pllimit': 'max', 'titles': 'Ishka',
          })
          fandom_page = fandom_doc['query']['pages'][0]
          pageimage = fandom_page.get('pageimage')
          image_titles = [row.get('title') for row in fandom_page.get('images', []) if row.get('title')]
          image_docs = []
          for index in range(0, len(image_titles), 40):
              batch = image_titles[index:index + 40]
              doc, query = request_json('https://memory-alpha.fandom.com/api.php', {
                  'action': 'query', 'format': 'json', 'formatversion': 2,
                  'redirects': 1, 'prop': 'info|revisions|categories|links|imageinfo',
                  'rvprop': 'ids|timestamp|sha1', 'cllimit': 'max', 'pllimit': 'max',
                  'iiprop': 'extmetadata|url|mime|size|sha1', 'iiurlwidth': 1000,
                  'titles': '|'.join(batch),
              })
              image_docs.extend(doc.get('query', {}).get('pages', []))
          candidates = []
          still_local = Path(still_item['asset']['src']).read_bytes()
          still_local_hash = dhash_bytes(still_local)
          for page in image_docs:
              ii = (page.get('imageinfo') or [{}])[0]
              remote_url = ii.get('thumburl') or ii.get('url')
              if not remote_url:
                  continue
              try:
                  remote = download(remote_url)
                  score = distance(still_local_hash, dhash_bytes(remote))
              except Exception as exc:
                  candidates.append({'title': page.get('title'), 'error': str(exc)})
                  continue
              ext = {key: clean(value.get('value')) for key, value in (ii.get('extmetadata') or {}).items()}
              candidates.append({
                  'title': page.get('title'), 'pageid': page.get('pageid'),
                  'revision': (page.get('revisions') or [{}])[0],
                  'categories': [row.get('title') for row in page.get('categories', [])],
                  'links': [row.get('title') for row in page.get('links', [])],
                  'imageinfo': {'url': ii.get('url'), 'thumburl': ii.get('thumburl'), 'sha1': ii.get('sha1'), 'width': ii.get('width'), 'height': ii.get('height'), 'extmetadata': ext},
                  'dhash_distance': score,
              })
          candidates.sort(key=lambda row: row.get('dhash_distance', 9999))
          best = candidates[0] if candidates else None
          if best and best.get('imageinfo', {}).get('thumburl'):
              (out / 'still-best-source.jpg').write_bytes(download(best['imageinfo']['thumburl']))

          report = {
              'version': 1,
              'wall_id': specimen['id'],
              'media_item_set_sha256': audit['source']['item_set_sha256'],
              'portrait': {
                  'item_id': portrait_item['id'], 'asset_sha256': portrait_item['asset']['sha256'],
                  'origin': portrait_item['asset']['origin'],
                  'commons_query': commons_query, 'commons_entity_query': commons_entity_query,
                  'file_page': {
                      'title': commons_page.get('title'), 'pageid': commons_page.get('pageid'),
                      'revision': (commons_page.get('revisions') or [{}])[0],
                      'categories': [row.get('title') for row in commons_page.get('categories', [])],
                      'links': [row.get('title') for row in commons_page.get('links', [])],
                      'imageinfo': {'url': commons_ii.get('url'), 'thumburl': commons_ii.get('thumburl'), 'sha1': commons_ii.get('sha1'), 'width': commons_ii.get('width'), 'height': commons_ii.get('height'), 'extmetadata': commons_ext},
                  },
                  'expected_article_query': enwiki_query,
                  'expected_article': {'title': enwiki_page.get('title'), 'pageid': enwiki_page.get('pageid'), 'revision': (enwiki_page.get('revisions') or [{}])[0], 'wikibase_item': expected_qid},
                  'depicts_qids': sorted(set(depicts)),
                  'source_comparison': {
                      'local_sha256': hashlib.sha256(portrait_local).hexdigest(),
                      'remote_sha256': hashlib.sha256(portrait_remote).hexdigest(),
                      'dhash_distance': distance(dhash_bytes(portrait_local), dhash_bytes(portrait_remote)),
                  },
              },
              'still': {
                  'item_id': still_item['id'], 'asset_sha256': still_item['asset']['sha256'],
                  'origin': still_item['asset']['origin'], 'page_query': fandom_query,
                  'page': {
                      'title': fandom_page.get('title'), 'pageid': fandom_page.get('pageid'),
                      'revision': (fandom_page.get('revisions') or [{}])[0],
                      'pageimage': pageimage,
                      'thumbnail': fandom_page.get('thumbnail'),
                      'original': fandom_page.get('original'),
                      'wikitext': (((fandom_page.get('revisions') or [{}])[0].get('slots') or {}).get('main') or {}).get('content'),
                  },
                  'candidate_files': candidates[:20],
                  'best_match': best,
              },
          }
          Path(out / 'evidence.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n')
          print(json.dumps({
              'wall_id': specimen['id'],
              'portrait_title': commons_page.get('title'),
              'portrait_expected_qid': expected_qid,
              'portrait_depicts_qids': sorted(set(depicts)),
              'portrait_dhash_distance': report['portrait']['source_comparison']['dhash_distance'],
              'ishka_pageimage': pageimage,
              'still_best_match': {'title': best.get('title'), 'distance': best.get('dhash_distance'), 'links': best.get('links', [])[:10]} if best else None,
          }, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: ishka-media-evidence
          path: ishka-media-evidence
          if-no-files-found: error
          retention-days: 14
