name: diagnose-trek-finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read

concurrency:
  group: diagnose-trek-finalizer
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.head_ref == 'agent/trek-media-baseline-closure'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-media-baseline-closure
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Correct receipt-field assertions
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/finalize-trek-baseline.sh')
          text = path.read_text()
          for old, new in {
              "row['source_signal']": "row['identity_signal']",
              "row['source_metadata']": "row['origin_receipt']",
          }.items():
              if old not in text:
                  raise SystemExit(f'missing expected finalizer assertion field {old}')
              text = text.replace(old, new)
          path.write_text(text)
          PY

      - name: Replay finalizer with complete trace
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          bash -x scripts/finalize-trek-baseline.sh > /tmp/finalizer.log 2>&1
          code=$?
          set -e
          mkdir -p finalizer-diagnostics
          cp /tmp/finalizer.log finalizer-diagnostics/finalizer.log
          tail -n 400 /tmp/finalizer.log > finalizer-diagnostics/tail.txt
          printf '%s\n' "$code" > finalizer-diagnostics/exit-code.txt
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: trek-finalizer-diagnostics
          path: finalizer-diagnostics
          if-no-files-found: error
          retention-days: 7
