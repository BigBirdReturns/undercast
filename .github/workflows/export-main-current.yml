name: export-main-current

on:
  pull_request:

permissions:
  contents: read

jobs:
  export:
    if: github.event.pull_request.number == 58
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Pack current main
        run: |
          git rev-parse HEAD > /tmp/MAIN-SHA
          tar --exclude=.git --exclude=node_modules -czf /tmp/main-current.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: main-current
          path: |
            /tmp/main-current.tar.gz
            /tmp/MAIN-SHA
          if-no-files-found: error
          retention-days: 2
