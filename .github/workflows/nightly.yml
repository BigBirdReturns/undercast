name: harvest-leads

# Collection-only input lane. This workflow may discover sourced leads, but it
# cannot draft or merge specimens. Canonical growth belongs to a certified,
# capability-aware Autopilot lease and the rolling waterline.

on:
  schedule:
    - cron: "41 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: lead-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate collection-only operating mode
        run: npm run corpus:ops -- validate

      - name: Top up the sourced lead queue
        env:
          INGEST_MAX: "300"
          CONTACT: "bigbirdreturns@proton.me"
        run: node scripts/ingest.mjs

      - name: Report the governed next operation
        run: npm run corpus:ops -- plan --json

      - name: Commit lead inputs only
        run: |
          git config user.name "undercast-bot"
          git config user.email "undercast-bot@users.noreply.github.com"
          git add data/CANDIDATES.json data/journal 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "ingest: harvest sourced leads ($(date -u +%F))"
          for i in 1 2 3; do git pull --rebase --autostash origin main && git push && exit 0 || sleep $((i*3)); done
          echo "push failed after retries"; exit 1
