name: harvest-leads

on:
  schedule:
    - cron: '41 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: harvest-leads
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Harvest evidence leads only
        env:
          INGEST_MAX: '300'
          CONTACT: 'bigbirdreturns@proton.me'
        run: |
          node scripts/ingest.mjs
          node scripts/corpus-ops.mjs validate

      - name: Commit lead and journal updates, never canonical records
        run: |
          git config user.name 'undercast-harvester'
          git config user.email 'undercast-harvester@users.noreply.github.com'
          git add data/CANDIDATES.json
          git add data/journal 2>/dev/null || true
          git diff --cached --check
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Harvest: refresh evidence leads ($(date -u +%F))"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            sleep $((attempt * 3))
          done
          echo 'lead-harvest push failed after retries'
          exit 1
