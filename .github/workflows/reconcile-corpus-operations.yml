name: reconcile-corpus-operations

on:
  push:
    branches: [agent/corpus-operations-mode]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: reconcile-corpus-operations
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/corpus-operations-mode
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install deterministic and browser runtime
        run: npm ci

      - name: Rebuild canonical projections and archive contract
        run: |
          node scripts/shard.mjs
          node scripts/build-record-pages.mjs
          node scripts/build-contract.mjs

      - name: Prove the collection-only boundary before publication
        run: |
          npm run corpus:ops:fixtures
          npm run media:search:fixtures
          npm run media:search -- validate
          npm run corpus:ops -- validate
          npm run corpus:ops -- status --json
          npm run corpus:ops -- plan --json
          git diff --check

      - name: Remove one-shot reconciliation machinery and commit the permanent candidate
        run: |
          rm -f .github/workflows/reconcile-corpus-operations.yml
          git config user.name "undercast-operations"
          git config user.email "undercast-operations@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Operations: enter collection-only steady state"

      - name: Gate the exact permanent candidate
        run: |
          npx playwright install --with-deps chromium
          npm run gate
          npm run preserve:status -- --json

      - name: Publish the exact gated candidate
        run: git push origin HEAD:agent/corpus-operations-mode
