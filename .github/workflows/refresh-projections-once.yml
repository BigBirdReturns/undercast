name: refresh-projections-once

on:
  push:
    branches:
      - agent/luna-autopilot

permissions:
  contents: write

concurrency:
  group: refresh-projections-once
  cancel-in-progress: false

jobs:
  refresh:
    if: github.repository == 'BigBirdReturns/undercast'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/luna-autopilot
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Rebuild deterministic projections
        run: node scripts/shard.mjs
      - name: Commit exact generator output and remove this one-shot workflow
        run: |
          git config user.name "undercast-bot"
          git config user.email "undercast-bot@users.noreply.github.com"
          git add data/CENSUS-FERENGI-TEST.json data/quality.json data/species.json
          git rm .github/workflows/refresh-projections-once.yml
          git commit -m "build: refresh deterministic projections"
          git push origin HEAD:agent/luna-autopilot
