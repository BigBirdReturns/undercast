name: diagnose-ferengi-installer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: diagnose-ferengi-installer
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.event.pull_request.number == 72
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ferengi-role-filter
          fetch-depth: 1
      - name: Replay installer and retain exact output
        run: |
          mkdir -p ferengi-installer-diagnostics
          cat .github/ferengi-fix/part-*.py > ferengi-installer-diagnostics/apply.py
          set +e
          python ferengi-installer-diagnostics/apply.py > ferengi-installer-diagnostics/log.txt 2>&1
          code=$?
          set -e
          printf '%s\n' "$code" > ferengi-installer-diagnostics/exit-code.txt
          cat ferengi-installer-diagnostics/log.txt
      - uses: actions/upload-artifact@v4
        with:
          name: ferengi-installer-diagnostics
          path: ferengi-installer-diagnostics
          if-no-files-found: error
          retention-days: 7
