name: claim-trek-cycle-001

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: claim-trek-cycle-001
  cancel-in-progress: true

jobs:
  claim:
    if: github.head_ref == 'agent/trek-cycle-001'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-cycle-001
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install deterministic runtime
        run: npm ci

      - name: Prove the post-baseline waterline
        run: |
          mkdir -p cycle-export .luna
          npm run waterline -- validate
          npm run waterline -- status --scope star-trek | tee cycle-export/waterline-before.txt
          npm run waterline -- gate --scope star-trek --operation claim --requested 1
          npm run autopilot -- readiness --scope star-trek --require-active | tee cycle-export/readiness.txt

      - name: Claim exactly one durable task
        run: |
          npm run autopilot -- next \
            --agent luna \
            --scope star-trek \
            --limit 1 \
            --lease-minutes 1440 \
            --out .luna/batch.json \
            --prompt .luna/PROMPT.md
          cp .luna/batch.json cycle-export/batch.json
          cp .luna/PROMPT.md cycle-export/PROMPT.md
          npm run autopilot -- status --scope star-trek --json > cycle-export/autopilot-after.json

      - name: Commit the durable lease receipt
        run: |
          git config user.name 'undercast-cycle-bot'
          git config user.email 'undercast-cycle-bot@users.noreply.github.com'
          git add data/AUTOPILOT.json data/journal/autopilot.jsonl
          git diff --cached --check
          git commit -m 'Cycle: lease first bounded Star Trek task'
          git push origin HEAD:agent/trek-cycle-001

      - uses: actions/upload-artifact@v4
        with:
          name: trek-cycle-001-lease
          path: cycle-export
          if-no-files-found: error
          retention-days: 14
