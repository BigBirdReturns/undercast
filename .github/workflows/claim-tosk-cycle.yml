name: claim-tosk-cycle

on:
  push:
    branches: [agent/star-trek-gold-completion]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: claim-tosk-cycle
  cancel-in-progress: false

jobs:
  claim:
    if: github.ref == 'refs/heads/agent/star-trek-gold-completion'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/star-trek-gold-completion
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Claim one exact compatible task
        run: |
          set -euo pipefail
          mkdir -p .luna data/review cycle-artifact
          node scripts/corpus-ops.mjs validate
          node scripts/waterline.mjs gate --scope star-trek --operation claim --requested 1
          node scripts/autopilot.mjs next \
            --agent luna \
            --scope star-trek \
            --capability-profile text-vision \
            --task-id ap_525b90d304dca267e9231889 \
            --limit 1 \
            --selection-basis 'Second-desk gold-shard cycle 2: Tosk is a source-reviewed physical-prosthetic role compatible with text and exact-image review.' \
            --lease-minutes 10080 \
            --now 2026-07-24T08:25:00.000Z \
            --out .luna/batch.json \
            --prompt .luna/PROMPT.md
          node --input-type=module <<'NODE'
          import {readFile,writeFile} from 'node:fs/promises';
          const batch=JSON.parse(await readFile('.luna/batch.json','utf8'));
          if(batch.tasks?.length!==1||batch.tasks[0].id!=='ap_525b90d304dca267e9231889') throw new Error('unexpected task leased');
          await writeFile('data/review/trek-cycle-002-tosk-lease.json',JSON.stringify(batch,null,2)+'\n');
          await writeFile('cycle-artifact/batch.json',JSON.stringify(batch,null,2)+'\n');
          await writeFile('cycle-artifact/PROMPT.md',await readFile('.luna/PROMPT.md','utf8'));
          NODE
          node scripts/autopilot.mjs validate
          node scripts/waterline.mjs status --scope star-trek --json > cycle-artifact/waterline-after-claim.json
      - uses: actions/upload-artifact@v4
        with:
          name: trek-cycle-002-tosk-lease
          path: cycle-artifact
          if-no-files-found: error
          retention-days: 30
      - name: Commit the durable lease and remove this one-shot workflow
        run: |
          set -euo pipefail
          rm -f .github/workflows/claim-tosk-cycle.yml
          git config user.name 'undercast-cycle-operator'
          git config user.email 'undercast-cycle-operator@users.noreply.github.com'
          git add data/AUTOPILOT.json data/journal/autopilot.jsonl data/review/trek-cycle-002-tosk-lease.json .github/workflows/claim-tosk-cycle.yml
          git diff --cached --check
          git commit -m 'Cycle 2: persist the Tosk lease'
          git push origin HEAD:agent/star-trek-gold-completion
