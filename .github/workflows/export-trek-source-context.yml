name: export-trek-source-context

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: export-trek-source-context
  cancel-in-progress: true

jobs:
  export:
    if: github.head_ref == 'agent/trek-media-baseline-closure'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-media-baseline-closure
          fetch-depth: 1

      - name: Export canonical context for every open facet
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const state = JSON.parse(fs.readFileSync('data/MEDIA-AUDIT.json', 'utf8'));
          const specimensBytes = fs.readFileSync('data/specimens.json');
          const sourcesBytes = fs.readFileSync('data/SOURCES.json');
          const manifestBytes = fs.readFileSync('data/media-manifest.json');
          const specimens = JSON.parse(specimensBytes);
          const sources = JSON.parse(sourcesBytes);
          const bySpecimen = new Map(specimens.map((row) => [row.id, row]));
          const bySource = new Map(sources.map((row) => [row.id, row]));
          const sha = (bytes) => crypto.createHash('sha256').update(bytes).digest('hex');
          const rows = state.items
            .filter((item) => item.scope === 'star-trek' && item.asset && !['verified','absent'].includes(item.status))
            .map((item) => ({
              item,
              specimen: bySpecimen.get(item.wall_id) || null,
              source_ledger: bySource.get(item.wall_id) || null,
            }));
          for (const row of rows) {
            if (!row.specimen) throw new Error(`missing specimen ${row.item.wall_id}`);
            if (!row.source_ledger) throw new Error(`missing source ledger ${row.item.wall_id}`);
          }
          const output = {
            version: 1,
            count: rows.length,
            media_audit_item_set_sha256: state.source.item_set_sha256,
            specimens_sha256: sha(specimensBytes),
            sources_sha256: sha(sourcesBytes),
            media_manifest_sha256: sha(manifestBytes),
            rows,
          };
          fs.mkdirSync('source-context', { recursive: true });
          fs.writeFileSync('source-context/context.json', JSON.stringify(output, null, 2) + '\n');
          console.log(`exported ${rows.length} canonical context rows`);
          NODE

      - uses: actions/upload-artifact@v4
        with:
          name: trek-media-source-context
          path: source-context
          if-no-files-found: error
          retention-days: 14
