name: diagnose-capability-integration-v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: diagnose-capability-integration-v2
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.event.pull_request.number == 70 && github.head_ref == 'agent/capability-aware-autopilot'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/capability-aware-autopilot
          fetch-depth: 1

      - name: Replay aligned patch and capture exact failure
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip, re
          workflow = Path('.github/workflows/apply-capability-aware-autopilot.yml').read_text()
          match = re.search(r'^          PAYLOAD: (\S+)$', workflow, re.M)
          if not match:
              raise SystemExit('embedded installer payload not found')
          source = gzip.decompress(base64.b64decode(match.group(1))).decode()
          old = '''    ''' + "'''also read [LUNA.md](LUNA.md) and [docs/AUTOPILOT.md](docs/AUTOPILOT.md), then\nclaim a bounded lease instead of choosing free-form work. A scope must pass\n'''"
          new = '''    ''' + "'''also read [LUNA.md](LUNA.md), [docs/AUTOPILOT.md](docs/AUTOPILOT.md), and\n[docs/WATERLINE.md](docs/WATERLINE.md), then claim a bounded lease instead of\nchoosing free-form work. A scope must pass\n'''"
          replacement = '''    ''' + "'''also read [LUNA.md](LUNA.md), [docs/AUTOPILOT.md](docs/AUTOPILOT.md),\n[docs/AUTOPILOT-CAPABILITIES.md](docs/AUTOPILOT-CAPABILITIES.md), and\n[docs/WATERLINE.md](docs/WATERLINE.md), then claim a bounded lease under an\nexplicit reviewed capability profile instead of choosing free-form work. A scope\nmust pass\n'''"
          target = "replace_once(\n    'AGENTS.md',\n" + old + ",\n" + "    '''also read [LUNA.md](LUNA.md), [docs/AUTOPILOT.md](docs/AUTOPILOT.md), and\n[docs/AUTOPILOT-CAPABILITIES.md](docs/AUTOPILOT-CAPABILITIES.md), then claim a\nbounded lease under an explicit reviewed capability profile instead of choosing\nfree-form work. A scope must pass\n''',\n)"
          aligned = "replace_once(\n    'AGENTS.md',\n" + new + ",\n" + replacement + ",\n)"
          if source.count(target) != 1:
              raise SystemExit(f'AGENTS installer target count {source.count(target)}')
          Path('/tmp/apply.py').write_text(source.replace(target, aligned))
          PY
          set +e
          python /tmp/apply.py > /tmp/apply.log 2>&1
          code=$?
          set -e
          mkdir -p capability-diagnostics-v2
          cp /tmp/apply.log capability-diagnostics-v2/apply.log
          printf '%s\n' "$code" > capability-diagnostics-v2/exit-code.txt
          tail -n 100 /tmp/apply.log

      - uses: actions/upload-artifact@v4
        with:
          name: capability-integration-diagnostics-v2
          path: capability-diagnostics-v2
          if-no-files-found: error
          retention-days: 7
