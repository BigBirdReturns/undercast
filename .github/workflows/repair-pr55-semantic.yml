name: repair-pr55-semantic

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: repair-pr55-semantic
  cancel-in-progress: false

jobs:
  repair:
    if: github.event.pull_request.number == 58
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/full-canon-census
          fetch-depth: 0

      - name: Verify exact repair base
        run: test "$(git rev-parse HEAD)" = "fda67ed3cb808fa48e1ebf7dc086cabd9242bafe"

      - name: Wire semantic demotion and corpus fixtures
        run: |
          python - <<'PY'
          from pathlib import Path

          census = Path('scripts/census.mjs')
          text = census.read_text()
          old = 'import { performerFieldValues, namesFrom, PERSONISH, loadScope } from "./lib/census-core.mjs";'
          new = '''import {
            performerFieldValues, namesFrom, PERSONISH, loadScope, demoteCharacterOnlyPerformers,
          } from "./lib/census-core.mjs";'''
          assert old in text
          text = text.replace(old, new, 1)

          old = '''  "muppets": {
              label: "Muppets & Henson", api: "https://muppet.fandom.com/api.php",
              categories: ["Muppet Show Characters", "Sesame Street Characters", "Fraggle Rock Characters",'''
          new = '''  "muppets": {
              label: "Muppets & Henson", api: "https://muppet.fandom.com/api.php",
              // Alter-ego pages sometimes name another Muppet in PERFORMER rather than a
              // human puppeteer. Demote only all-character fields; mixed fields fail closed.
              demoteCharacterPerformers: true,
              categories: ["Muppet Show Characters", "Sesame Street Characters", "Fraggle Rock Characters",'''
          assert old in text
          text = text.replace(old, new, 1)

          old = '''const freshRows = [];
          const freshUnresolved = [];
          if (!PROJECT_ONLY) {
          for (const k of keys) {
            const cfg = FRANCHISES[k];
            if (!cfg) { console.log("unknown franchise:", k, "— known:", Object.keys(FRANCHISES).join(", ")); continue; }
            await censusFranchise(k, cfg, freshRows, freshUnresolved, onlyCategory);
          }
          }
          '''
          new = '''const freshRows = [];
          const freshUnresolved = [];
          if (!PROJECT_ONLY) {
          for (const k of keys) {
            const cfg = FRANCHISES[k];
            if (!cfg) { console.log("unknown franchise:", k, "— known:", Object.keys(FRANCHISES).join(", ")); continue; }
            const rowStart = freshRows.length, unresolvedStart = freshUnresolved.length;
            await censusFranchise(k, cfg, freshRows, freshUnresolved, onlyCategory);
            if (cfg.demoteCharacterPerformers) {
              const result = demoteCharacterOnlyPerformers(
                freshRows.slice(rowStart), freshUnresolved.slice(unresolvedStart), cfg.label);
              freshRows.splice(rowStart, freshRows.length - rowStart, ...result.rows);
              freshUnresolved.splice(unresolvedStart, freshUnresolved.length - unresolvedStart, ...result.unresolved);
              for (const demoted of result.demoted) {
                for (const observation of observations) {
                  if (observation.franchise === demoted.franchise && observation.category === demoted.category
                    && observation.title === demoted.character && observation.source === demoted.source) {
                    observation.disposition = "unresolved";
                  }
                }
              }
              if (result.demoted.length) console.log(`  semantic demotion: ${result.demoted.length} character-as-performer row(s) -> unresolved`);
            }
          }
          }
          '''
          assert old in text
          census.write_text(text.replace(old, new, 1))

          fixtures = Path('scripts/census-fixtures.mjs')
          text = fixtures.read_text()
          old = 'import { performerFieldValues, namesFrom, loadScope } from "./lib/census-core.mjs";'
          new = '''import { readFile } from "node:fs/promises";
          import { performerFieldValues, namesFrom, loadScope, demoteCharacterOnlyPerformers } from "./lib/census-core.mjs";'''
          assert old in text
          text = text.replace(old, new, 1)

          marker = '''expect("nested template inside the value is part of the value",
            extract(`|portrayed_by={{small|[[Andrew Robinson]]}}|affiliation=[[Obsidian Order]]`),
            ["Andrew Robinson"]);
          '''
          addition = marker + '''
          expect("parenthetical disguise links are annotations, not performers",
            extract(`|played by=[[Garth Kemp]] (as [[The Face]]), [[Kate Mulgrew]] (posing as [[Kathryn Janeway]])`),
            ["Garth Kemp", "Kate Mulgrew"]);

          expect("parenthesized performer at a new segment remains a performer",
            extract(`|played by=[[Jane Actor]] (adult), ([[June Actor]] as a child)`),
            ["Jane Actor", "June Actor"]);
          '''
          assert marker in text
          text = text.replace(marker, addition, 1)

          marker = '// 6. Scope loading: ENOENT falls back, everything else aborts.'
          addition = '''// 6. Character-on-character performer fields are not human credits.
          const demoted = demoteCharacterOnlyPerformers(
            [{ franchise: "Muppets & Henson", category: "Sesame Street Characters", character: "Alistair Cookie",
              performers: ["Cookie Monster"], performance_mode: "unresolved", source: "https://example.test/alistair" }],
            [{ franchise: "Muppets & Henson", category: "Sesame Street Characters", character: "Cookie Monster",
              performance_mode: "unresolved", source: "https://example.test/cookie", reason: "fixture" }],
            "Muppets & Henson");
          expect("character-only performer field is demoted", demoted.rows.length, 0);
          expect("character-only performer field becomes unresolved", demoted.unresolved.at(-1).character, "Alistair Cookie");

          let mixedThrew = false;
          try {
            demoteCharacterOnlyPerformers(
              [{ franchise: "Muppets & Henson", category: "Sesame Street Characters", character: "Alistair Cookie",
                performers: ["Frank Oz", "Cookie Monster"], source: "https://example.test/alistair" }],
              [{ franchise: "Muppets & Henson", category: "Sesame Street Characters", character: "Cookie Monster",
                source: "https://example.test/cookie", reason: "fixture" }],
              "Muppets & Henson");
          } catch { mixedThrew = true; }
          expect("mixed human/character performer field fails closed", mixedThrew, true);

          // 7. Scope loading: ENOENT falls back, everything else aborts.'''
          assert marker in text
          text = text.replace(marker, addition, 1)

          marker = '''console.log(failures ? `\n${failures} fixture(s) FAILED` : "\nall census fixtures pass");'''
          addition = '''// 8. The committed regenerated corpus must not carry the exact semantic leaks
          // that motivated the second-desk review, and Muppet performers may not resolve
          // to another captured Muppet character page.
          const committed = JSON.parse(await readFile("data/CENSUS.json", "utf8"));
          const forbidden = new Set(["The Face", "Ocam Sadal", "Kathryn Janeway", "B'Elanna Torres",
            "Fourth Cyber Legion", "New Dalek Paradigm", "Reality Virus", "Papal Mainframe",
            "Rutan Host", "Large Lavender Live Hand", "Orange Gold"]);
          const leaked = committed.flatMap((row) => row.performers
            .filter((name) => forbidden.has(name)).map((name) => `${row.franchise}/${row.character}/${name}`));
          expect("known fictional performer leaks are absent from committed census", leaked, []);

          const norm = (value) => String(value || "").normalize("NFKD").replace(/[\\u0300-\\u036f]/g, "")
            .replace(/[’‘]/g, "'").replace(/[^a-zA-Z0-9']+/g, " ").trim().toLowerCase();
          const unresolvedCorpus = JSON.parse(await readFile("data/CENSUS-UNRESOLVED.json", "utf8"));
          const muppetTitles = new Set([...committed, ...unresolvedCorpus]
            .filter((row) => row.franchise === "Muppets & Henson").map((row) => norm(row.character)));
          const muppetCharacterCredits = committed.filter((row) => row.franchise === "Muppets & Henson")
            .flatMap((row) => row.performers.filter((name) => muppetTitles.has(norm(name)))
              .map((name) => `${row.character}/${name}`));
          expect("Muppet character pages are not promoted as human performers", muppetCharacterCredits, []);

          ''' + marker
          assert marker in text
          fixtures.write_text(text.replace(marker, addition, 1))
          PY
          node --check scripts/census.mjs
          node --check scripts/census-fixtures.mjs
          node --check scripts/lib/census-core.mjs
          git diff --check

      - name: Capture pre-repair census identity set
        run: |
          mkdir -p /tmp/pr55-review
          cp data/CENSUS.json /tmp/pr55-review/CENSUS.before.json
          cp data/CENSUS-UNRESOLVED.json /tmp/pr55-review/CENSUS-UNRESOLVED.before.json

      - name: Regenerate every affected extractor-backed franchise
        env:
          CONTACT: bigbirdreturns@proton.me
        run: node scripts/census.mjs star-trek doctor-who muppets power-rangers

      - name: Build semantic diff and assert reviewed identities
        run: |
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          before = json.loads(Path('/tmp/pr55-review/CENSUS.before.json').read_text())
          after = json.loads(Path('data/CENSUS.json').read_text())
          unresolved = json.loads(Path('data/CENSUS-UNRESOLVED.json').read_text())
          key = lambda r, p: (r.get('franchise'), r.get('category'), r.get('character'), p)
          b = {key(r,p) for r in before for p in r.get('performers',[])}
          a = {key(r,p) for r in after for p in r.get('performers',[])}
          removed = sorted(b-a)
          added = sorted(a-b)
          forbidden = {"The Face", "Ocam Sadal", "Kathryn Janeway", "B'Elanna Torres",
            "Fourth Cyber Legion", "New Dalek Paradigm", "Reality Virus", "Papal Mainframe",
            "Rutan Host", "Large Lavender Live Hand", "Orange Gold"}
          leaks = sorted(x for x in a if x[3] in forbidden)
          if leaks: raise SystemExit(f'known semantic leaks remain: {leaks}')
          norm = lambda s: ''.join(ch.lower() if ch.isalnum() or ch == "'" else ' ' for ch in str(s)).split()
          norm = lambda s: ' '.join(norm(s))
          titles = {norm(r['character']) for r in after+unresolved if r['franchise']=='Muppets & Henson'}
          collisions = sorted((r['character'],p) for r in after if r['franchise']=='Muppets & Henson' for p in r['performers'] if norm(p) in titles)
          if collisions: raise SystemExit(f'Muppet character-as-performer rows remain: {collisions}')
          counts = Counter(x[0] for x in a)
          report = {
            'reviewed_head_base':'053ff0866939016216223051622be42553f0b00d',
            'producer_repair_base':'fda67ed3cb808fa48e1ebf7dc086cabd9242bafe',
            'credits_by_franchise':dict(sorted(counts.items())),
            'star_trek_credits':counts['Star Trek'],
            'removed_credits':[list(x) for x in removed],
            'added_credits':[list(x) for x in added],
            'known_false_performers_remaining':[],
            'muppet_character_as_performer_remaining':[],
          }
          Path('/tmp/pr55-review/semantic-report.json').write_text(json.dumps(report,indent=2)+'\n')
          print(json.dumps(report,indent=2))
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install deterministic and rendered test runtime
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run repaired producer and archive gates
        run: |
          npm run test:census
          node scripts/shard.mjs
          git diff --check
          node scripts/validate.mjs
          npm run audit:corpus
          npm run test:site-seams
          node scripts/build-record-pages.mjs
          npm run test:rendered
          test "$(find records -mindepth 1 -maxdepth 1 -type d | wc -l)" = "$(node -p "require('./data/specimens.json').length + require('./data/tombstones.json').records.length")"
          node scripts/ds9-census.mjs --project-only
          node scripts/ds9-graph.mjs --project-only
          node scripts/ds9-eligibility-queue.mjs
          node scripts/ds9-maker-queue.mjs
          git diff --exit-code data/ds9
          npm run ds9:fixtures
          npm run ds9:eligibility:fixtures
          npm run ds9:maker:fixtures

      - name: Package exact semantically reviewed checkout
        run: |
          tar --exclude=.git --exclude=node_modules --exclude=records --exclude=test-results --exclude=playwright-report -czf /tmp/pr55-review/undercast-pr55-reviewed.tar.gz .
          git status --short > /tmp/pr55-review/status.txt
          git diff --stat > /tmp/pr55-review/stat.txt
          sha256sum /tmp/pr55-review/* > /tmp/pr55-review/SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: pr55-semantic-review-result
          path: /tmp/pr55-review
          if-no-files-found: error
          retention-days: 3

      - name: Commit and push repaired regenerated corpus
        run: |
          git config user.name "undercast-bot"
          git config user.email "undercast-bot@users.noreply.github.com"
          git add scripts/lib/census-core.mjs scripts/census.mjs scripts/census-fixtures.mjs
          git add data/CENSUS.json data/CENSUS-COVERAGE.json data/CENSUS-GAPS.json data/CENSUS-MANIFEST.json data/CENSUS-SUMMARY.json data/CENSUS-UNRESOLVED.json
          git add data/CENSUS-FERENGI-TEST.json data/constellations.json data/species.json data/index.json data/shard-manifest.json data/shards data/archive.json data/entities.json data/search sitemap.xml
          git diff --cached --quiet && exit 0
          git commit -m "Census: remove semantic role leaks and regenerate reviewed scopes"
          git push origin HEAD:claude/full-canon-census
