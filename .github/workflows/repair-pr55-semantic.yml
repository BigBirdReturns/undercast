name: resume-pr55-semantic-review

on:
  pull_request:

permissions:
  contents: write
  actions: read

concurrency:
  group: resume-pr55-semantic-review
  cancel-in-progress: true

jobs:
  resume:
    if: github.event.pull_request.number == 58
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/full-canon-census
          fetch-depth: 0

      - name: Restore the authoritative regenerated corpus artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(git rev-parse HEAD)" = "fda67ed3cb808fa48e1ebf7dc086cabd9242bafe"
          mkdir -p /tmp/pr55-regen
          gh run download 29849723940 --repo "${{ github.repository }}" \
            --name pr55-regenerated-corpus --dir /tmp/pr55-regen
          test -f /tmp/pr55-regen/pr55-regenerated-corpus.tar.gz
          test -f /tmp/pr55-regen/semantic-report.json
          tar -xzf /tmp/pr55-regen/pr55-regenerated-corpus.tar.gz -C .
          node -e 'const r=require("/tmp/pr55-regen/semantic-report.json"); if(r.known_false_performers_remaining.length || r.muppet_character_as_performer_remaining.length || r.star_trek_credits!==2295) throw new Error(JSON.stringify(r)); console.log(`semantic report: Star Trek ${r.star_trek_credits}; known leaks 0; Muppet character credits 0`);'
          node --check scripts/census.mjs
          node --check scripts/census-fixtures.mjs
          node --check scripts/lib/census-core.mjs
          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install deterministic and rendered test runtime
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Validate repaired producer and deterministic archive
        run: |
          npm run test:census
          node scripts/shard.mjs
          node scripts/validate.mjs
          npm run audit:corpus
          npm run test:site-seams
          git diff --check

      - name: Build permanent routes
        run: node scripts/build-record-pages.mjs

      - name: Exercise rendered interactions
        run: npm run test:rendered -- --reporter=line

      - name: Verify route count
        run: test "$(find records -mindepth 1 -maxdepth 1 -type d | wc -l)" = "$(node -p "require('./data/specimens.json').length + require('./data/tombstones.json').records.length")"

      - name: Validate DS9 evidence projections
        run: |
          node scripts/ds9-census.mjs --project-only
          node scripts/ds9-graph.mjs --project-only
          node scripts/ds9-eligibility-queue.mjs
          node scripts/ds9-maker-queue.mjs
          git diff --exit-code data/ds9
          npm run ds9:fixtures
          npm run ds9:eligibility:fixtures
          npm run ds9:maker:fixtures

      - name: Package exact reviewed checkout
        run: |
          mkdir -p /tmp/pr55-reviewed
          cp /tmp/pr55-regen/semantic-report.json /tmp/pr55-reviewed/
          tar --exclude=.git --exclude=node_modules --exclude=records --exclude=test-results --exclude=playwright-report \
            -czf /tmp/pr55-reviewed/undercast-pr55-reviewed.tar.gz .
          git status --short > /tmp/pr55-reviewed/status.txt
          git diff --stat > /tmp/pr55-reviewed/stat.txt
          sha256sum /tmp/pr55-reviewed/* > /tmp/pr55-reviewed/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: pr55-semantic-review-result
          path: /tmp/pr55-reviewed
          if-no-files-found: error
          retention-days: 3

      - name: Commit and push the semantically reviewed corpus
        run: |
          git config user.name "undercast-bot"
          git config user.email "undercast-bot@users.noreply.github.com"
          git add scripts/lib/census-core.mjs scripts/census.mjs scripts/census-fixtures.mjs
          git add data sitemap.xml
          git diff --cached --quiet && exit 0
          git commit -m "Census: remove semantic role leaks and regenerate reviewed scopes"
          git push origin HEAD:claude/full-canon-census

      - name: Upload rendered diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr55-rendered-diagnostics
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 3
