name: integrate-pr57-roadmap

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: integrate-pr57-roadmap
  cancel-in-progress: true

jobs:
  integrate:
    if: github.event.pull_request.number == 58
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/five-year-operating-system
          fetch-depth: 0

      - name: Merge certified main with reviewed layer policy
        run: |
          test "$(git rev-parse HEAD)" = "8c52e704f56e7a193dc249176cd3d9bf2c09a0f5"
          git config user.name "undercast-integration"
          git config user.email "undercast-integration@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            actual="$(git diff --name-only --diff-filter=U | sort)"
            expected="$(printf '%s\n' \
              .github/workflows/autopilot.yml \
              .github/workflows/validate.yml \
              AGENTS.md \
              LUNA.md \
              data/AUTOPILOT-SCOPES.json \
              data/AUTOPILOT.json \
              data/CENSUS-FERENGI-TEST.json \
              data/quality.json \
              data/species.json \
              docs/AUTOPILOT.md \
              package.json \
              scripts/autopilot-fixtures.mjs \
              scripts/autopilot.mjs \
              scripts/lib/autopilot-actions.mjs \
              scripts/lib/autopilot-model.mjs \
              scripts/lib/autopilot-sync.mjs \
              scripts/lib/autopilot.mjs | sort)"
            test "$actual" = "$expected" || { echo "unexpected merge conflicts:"; printf '%s\n' "$actual"; exit 1; }

            # Keep workflow paths byte-identical to the first parent for this push;
            # GitHub API applies their reviewed final forms after the merge commit.
            git checkout --ours -- .github/workflows/autopilot.yml .github/workflows/validate.yml

            # Certified implementation and state are authoritative from merged main.
            git checkout --theirs -- \
              data/AUTOPILOT-SCOPES.json data/AUTOPILOT.json \
              data/CENSUS-FERENGI-TEST.json data/quality.json data/species.json \
              scripts/autopilot-fixtures.mjs scripts/autopilot.mjs \
              scripts/lib/autopilot-actions.mjs scripts/lib/autopilot-model.mjs \
              scripts/lib/autopilot-sync.mjs scripts/lib/autopilot.mjs

            # Start shared operator documents from the certified main versions.
            git checkout --theirs -- AGENTS.md LUNA.md docs/AUTOPILOT.md package.json
          fi

          cat > AGENTS.md <<'EOF'
          # For any agent working on UNDERCAST

          UNDERCAST is a field index of performers who vanish under a designed face
          (prosthetics, masks, creature suits, motion capture, or an unseen voice). Every
          card flips: the character on the front, the human underneath on the back. It's a
          static site (index.html reads data/specimens.json) deployed to GitHub Pages by
          Actions; keyless crawlers fill images and harvest leads. No servers, no keys.

          **To grow the roster, read [GROW.md](GROW.md).** A Luna/autonomous worker must
          also read [LUNA.md](LUNA.md) and [docs/AUTOPILOT.md](docs/AUTOPILOT.md), then
          claim a bounded lease instead of choosing free-form work. A scope must pass
          `autopilot readiness`; Luna never certifies or activates its own producer. To
          consume or extend the machine-facing archive, read [CRAWLERS.md](CRAWLERS.md)
          and `data/archive.json`. The drafting model is the compute — you draft verified
          specimens, a keyless script merges them. Accuracy over volume, always: never
          invent a person or a fact. The provenance is the point.

          ## Before non-emergency work — sequence it

          Read `docs/FIVE-YEAR-PLAN.md` and run:

          ```bash
          npm run roadmap -- validate
          npm run roadmap -- status
          npm run roadmap -- next --limit 1
          ```

          Work only on a milestone reported `ready`, then follow its exact section in
          `docs/ROADMAP-PLAYBOOKS.md`. Forecast dates do not authorize work; dependencies,
          measured triggers, owner decisions, and reviewed completion receipts do. A later
          or more interesting milestone is out of scope until the dependency graph unlocks
          it.

          Hotfixes for active correctness, rights, security, or publication incidents may
          interrupt the roadmap, but they must stay narrowly scoped, leave an incident or
          journal receipt, and return the system to the same roadmap state. The roadmap
          never supersedes Active product law.

          `data/ROADMAP-STATE.json` changes only through a reviewed pull request. A machine
          or Luna may prepare evidence, but may not mark a second-desk or owner milestone
          complete, invent an owner decision, or replace an unknown metric with zero.

          ## Before you touch HTML, CSS, or the experience — STOP and read the law

          The data, provenance, and crawl are heavily protected; the **experience** is
          governed too, and that governance is **binding, not advisory**. Prior essays and
          existing code are *not* authority — these documents are:

          1. **[docs/PRODUCT-CONSTITUTION.md](docs/PRODUCT-CONSTITUTION.md)** — what the site
             is, the emotional sequence, the reveal rules, the non-negotiables and anti-goals.
          2. **[docs/DESIGN-SYSTEM.md](docs/DESIGN-SYSTEM.md)** — how to build it (type, color,
             card anatomy, crop, accessibility, approved components).
          3. **[docs/DECISIONS.md](docs/DECISIONS.md)** — the append-only decision log. **A UI
             change that contradicts an Active decision and does not supersede it is out of
             bounds.**
          4. **[docs/UI-REVIEW-CHECKLIST.md](docs/UI-REVIEW-CHECKLIST.md)** — run this and put
             it in every UI PR.

          **The rules that would have prevented the last excursion:** the trading-card flip is
          the signature *character→performer* reveal (DEC-0001) — do not add a second one (no
          seams, sliders, dissolves, wipes) without superseding it in words first; unrelated
          interactions elsewhere are fine. The homepage's default opening must not be
          dominated by performer imagery (DEC-0005) — character or archive artwork first, the
          performer only after deliberate action. Every UI PR **cites the decision number(s)**
          it serves. And no one claims the gate is "green" without running all of
          `docs/UI-REVIEW-CHECKLIST.md` — the whole gate, not most of it. Never attribute a
          decision or a "ruling" to the owner they did not actually make.

          Key files: `GROW.md` (how to add cards), `LUNA.md` / `docs/AUTOPILOT.md`
          (certified, bounded autonomous growth), `docs/FIVE-YEAR-PLAN.md` /
          `docs/ROADMAP-PLAYBOOKS.md` / `data/ROADMAP*.json` (authorized strategic
          sequence), `CRAWLERS.md` (crawler/evidence contract), `README.md` (the whole
          system), `scripts/` (retrieve = images, ingest = lead harvest, grow = merge
          model drafts, autopilot = durable work leases, roadmap = milestone dependency
          and authority gate, credits/needs/adopt = helpers).
          EOF
          sed -i 's/^          //' AGENTS.md

          python - <<'PY'
          import json
          from pathlib import Path

          # Merge roadmap authority into the certified Luna contract.
          p = Path('LUNA.md')
          text = p.read_text()
          text = text.replace(
              'cards. Read `AGENTS.md`, `GROW.md`, and `docs/AUTOPILOT.md` before taking a lease.',
              'cards. Read `AGENTS.md`, `GROW.md`, `docs/AUTOPILOT.md`, and the current roadmap\nbefore taking a lease.'
          )
          roadmap = '''## Roadmap boundary

          ```bash
          npm run roadmap -- validate
          npm run roadmap -- status
          npm run roadmap -- next --limit 1
          ```

          The Autopilot queue authorizes **which exact performer-role task** Luna may
          research. The roadmap authorizes **whether that class of work may begin at all**.
          A valid lease does not permit Luna to skip a strategic dependency, activate a
          new scope, build accounts or APIs, change product law, or start a later milestone.

          Luna may take roster-growth leases only when the ready roadmap playbook includes
          that activity and the scope is currently certified and active. Otherwise stop
          and report the blocking dependency, decision, trigger, or certification.

          Luna may collect and propose roadmap evidence or aggregate metrics. Luna may not:

          - add a milestone to `data/ROADMAP-STATE.json` as complete;
          - create or attribute an owner decision;
          - substitute zero for an unknown metric;
          - close a second-desk or owner milestone;
          - treat a forecast date as authorization.

          Milestone state changes land only through a reviewed pull request.

          '''.replace('          ','')
          marker = '## Before Luna may lease\n'
          assert marker in text and '## Roadmap boundary' not in text
          text = text.replace(marker, roadmap + marker, 1)
          text = text.replace(
              'and validator mutually consistent.',
              'validator, and current roadmap milestone mutually consistent.'
          )
          p.write_text(text)

          # Merge roadmap authority into the full certification-aware Autopilot guide.
          p = Path('docs/AUTOPILOT.md')
          text = p.read_text()
          relationship = '''## Relationship to the roadmap

          Autopilot is an operational executor, not strategic authority. Before leasing
          work, read `docs/FIVE-YEAR-PLAN.md` and run:

          ```bash
          npm run roadmap -- validate
          npm run roadmap -- status
          npm run roadmap -- next --limit 1
          ```

          The roadmap determines whether roster growth, a new source adapter, contributor
          work, an API, a product surface, or another class of work is authorized. Autopilot
          determines which exact performer-role Luna may research inside an authorized,
          certified scope. A valid queue lease cannot override a blocked roadmap milestone,
          missing owner decision, unmet demand trigger, inactive scope, or stale producer
          certification.

          Roadmap backpressure is intentional. When media review, corrections, producer
          certification, rights work, or review capacity is behind, the current milestone
          may require drafting to slow or stop even when queueable tasks remain. Autopilot
          state and journals may provide milestone evidence, but no Autopilot command may
          mark a second-desk or owner milestone complete.

          '''.replace('          ','')
          marker = '## Boundaries\n'
          assert marker in text and '## Relationship to the roadmap' not in text
          text = text.replace(marker, relationship + marker, 1)
          text = text.replace(
              '- `.luna/` — local ignored packets and result/review files.',
              '- `data/ROADMAP.json` and `data/ROADMAP-STATE.json` — strategic dependency,\n'
              '  authority, demand-trigger, and completion-receipt contract governing when an\n'
              '  Autopilot class of work may begin.\n'
              '- `docs/FIVE-YEAR-PLAN.md` and `docs/ROADMAP-PLAYBOOKS.md` — strategic rationale\n'
              '  and exact authorized build sequences.\n'
              '- `.luna/` — local ignored packets and result/review files.'
          )
          text = text.replace(
              '```bash\nnpm run autopilot -- readiness',
              '```bash\nnpm run roadmap -- validate\nnpm run roadmap -- status\n'
              'npm run roadmap -- next --limit 1\n\nnpm run autopilot -- readiness',
              1
          )
          text = text.replace(
              '`next` is the safe worker operation:',
              '`next` is the safe worker operation after the current roadmap playbook authorizes roster growth:'
          )
          text = text.replace(
              'Add the paused scope and refresh adapter to\n`AUTOPILOT-SCOPES.json`; review',
              'Add the paused scope and refresh adapter to\n`AUTOPILOT-SCOPES.json`; require the current roadmap milestone, then review'
          )
          p.write_text(text)

          # Add the roadmap commands without dropping any certified Autopilot scripts.
          p = Path('package.json')
          package = json.loads(p.read_text())
          package['scripts']['roadmap'] = 'node scripts/roadmap.mjs'
          package['scripts']['roadmap:fixtures'] = 'node scripts/roadmap-fixtures.mjs'
          p.write_text(json.dumps(package, indent=2) + '\n')
          PY

          git add \
            .github/workflows/autopilot.yml .github/workflows/validate.yml \
            AGENTS.md LUNA.md docs/AUTOPILOT.md package.json \
            data/AUTOPILOT-SCOPES.json data/AUTOPILOT.json \
            data/CENSUS-FERENGI-TEST.json data/quality.json data/species.json \
            scripts/autopilot-fixtures.mjs scripts/autopilot.mjs \
            scripts/lib/autopilot-actions.mjs scripts/lib/autopilot-model.mjs \
            scripts/lib/autopilot-sync.mjs scripts/lib/autopilot.mjs
          test -z "$(git diff --name-only --diff-filter=U)"
          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install deterministic and rendered test runtime
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Rebuild all deterministic projections
        run: |
          node scripts/credits.mjs
          node scripts/sync-sources.mjs
          node scripts/shard.mjs
          node scripts/build-contract.mjs
          node scripts/build-record-pages.mjs
          node scripts/ds9-census.mjs --project-only
          node scripts/ds9-graph.mjs --project-only
          node scripts/ds9-eligibility-queue.mjs
          node scripts/ds9-maker-queue.mjs
          git diff --check

      - name: Validate roadmap authority and certified queue
        run: |
          npm run roadmap -- validate
          npm run roadmap:fixtures
          node scripts/roadmap.mjs status --json > /tmp/roadmap-status.json
          node scripts/roadmap.mjs next --limit 1 --json > /tmp/roadmap-next.json
          node - <<'NODE'
          const fs = require('fs');
          const status = JSON.parse(fs.readFileSync('/tmp/roadmap-status.json','utf8'));
          const next = JSON.parse(fs.readFileSync('/tmp/roadmap-next.json','utf8'));
          if (status.counts.complete !== 0 || status.counts.ready !== 1 || status.counts.total !== 12) throw new Error(JSON.stringify(status.counts));
          if (next.length !== 1 || next[0].id !== 'trusted-foundation') throw new Error(JSON.stringify(next));
          if (typeof next[0].playbook !== 'string' || !next[0].playbook.includes('### Build sequence')) throw new Error('roadmap next did not include the exact playbook');
          NODE
          npm run autopilot -- readiness --scope star-trek --require-active
          npm run autopilot -- validate
          node - <<'NODE'
          const fs = require('fs');
          const state = JSON.parse(fs.readFileSync('data/AUTOPILOT.json','utf8'));
          const inflight = state.jobs.filter(j => ['leased','drafted','merged'].includes(j.status));
          if (inflight.length) throw new Error(`unexpected in-flight work: ${inflight.length}`);
          NODE

      - name: Run exact merged-head archive gate
        run: |
          npm run test:census
          node scripts/validate.mjs
          npm run autopilot:fixtures
          npm run roadmap:fixtures
          npm run audit:corpus
          npm run test:site-seams
          npm run test:rendered -- --reporter=line
          test "$(find records -mindepth 1 -maxdepth 1 -type d | wc -l)" = "$(node -p "require('./data/specimens.json').length + require('./data/tombstones.json').records.length")"
          npm run ds9:fixtures
          npm run ds9:eligibility:fixtures
          npm run ds9:maker:fixtures
          git diff --check

      - name: Package roadmap integration evidence
        run: |
          mkdir -p /tmp/pr57-integrated
          cp data/ROADMAP.json data/ROADMAP-STATE.json /tmp/pr57-integrated/
          cp /tmp/roadmap-status.json /tmp/roadmap-next.json /tmp/pr57-integrated/
          git status --short > /tmp/pr57-integrated/status.txt
          git diff --stat > /tmp/pr57-integrated/stat.txt
          sha256sum /tmp/pr57-integrated/* > /tmp/pr57-integrated/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: pr57-roadmap-integration
          path: /tmp/pr57-integrated
          if-no-files-found: error
          retention-days: 7

      - name: Commit and push integrated roadmap branch
        run: |
          git add -A
          git commit -m "Roadmap: integrate certified Autopilot and strategic sequencing"
          git push origin HEAD:agent/five-year-operating-system
