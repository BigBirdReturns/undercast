name: verify-final-main-state

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-final-main-state
  cancel-in-progress: true

jobs:
  verify:
    if: github.event.pull_request.number == 58
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify exact final main state
        run: |
          test "$(git rev-parse HEAD)" = "67257f92f36f1dd7eb35a585df1c3f96a6003cd7"
          node scripts/roadmap.mjs validate
          node scripts/roadmap-fixtures.mjs
          node scripts/roadmap.mjs status --json > /tmp/roadmap-status.json
          node scripts/roadmap.mjs next --limit 3 --json > /tmp/roadmap-next.json
          node scripts/autopilot.mjs readiness --scope star-trek --require-active
          node scripts/autopilot.mjs validate
          node scripts/validate.mjs
          node scripts/shard.mjs
          git diff --exit-code
          node - <<'NODE'
          const fs = require('fs');
          const status = JSON.parse(fs.readFileSync('/tmp/roadmap-status.json','utf8'));
          const next = JSON.parse(fs.readFileSync('/tmp/roadmap-next.json','utf8'));
          const expectedReady = ['star-trek-gold-shard','operational-reliability'];
          const actualReady = status.milestones.filter(m => m.state === 'ready').map(m => m.id);
          const complete = status.milestones.filter(m => m.state === 'complete').map(m => m.id);
          if (status.counts.complete !== 1 || status.counts.ready !== 2 || status.counts.blocked !== 9 || status.counts.total !== 12) throw new Error(JSON.stringify(status.counts));
          if (JSON.stringify(complete) !== JSON.stringify(['trusted-foundation'])) throw new Error(`complete=${complete}`);
          if (JSON.stringify(actualReady) !== JSON.stringify(expectedReady)) throw new Error(`ready=${actualReady}`);
          if (JSON.stringify(next.map(m => m.id)) !== JSON.stringify(expectedReady)) throw new Error(`next=${next.map(m=>m.id)}`);
          if (status.adoption_stage?.id !== 'operator-proof') throw new Error(`adoption=${status.adoption_stage?.id}`);
          const roadmapState = JSON.parse(fs.readFileSync('data/ROADMAP-STATE.json','utf8'));
          if (roadmapState.metrics.canonical_records !== 1246 || roadmapState.metrics.census_observations !== 17258 || roadmapState.metrics.certified_scopes !== 1) throw new Error(JSON.stringify(roadmapState.metrics));
          if (roadmapState.metrics.verified_records !== null || roadmapState.metrics.media_audit_ratio !== null) throw new Error('unverified media metrics must remain null');
          const scopes = JSON.parse(fs.readFileSync('data/AUTOPILOT-SCOPES.json','utf8')).scopes;
          const active = scopes.filter(s => s.status === 'active').map(s => s.id);
          if (JSON.stringify(active) !== JSON.stringify(['star-trek'])) throw new Error(`active=${active}`);
          const autopilot = JSON.parse(fs.readFileSync('data/AUTOPILOT.json','utf8'));
          const inflight = autopilot.jobs.filter(j => ['leased','drafted','merged'].includes(j.status));
          if (inflight.length) throw new Error(`inflight=${inflight.length}`);
          const trek = autopilot.jobs.filter(j => j.scope === 'star-trek');
          const queued = trek.filter(j => j.status === 'queued').length;
          const resolved = trek.filter(j => j.status === 'resolved').length;
          if (trek.length !== 2226 || queued !== 1904 || resolved !== 322) throw new Error(`trek=${trek.length} queued=${queued} resolved=${resolved}`);
          NODE
          git diff --check

      - name: Package final state evidence
        run: |
          mkdir -p /tmp/final-main
          cp data/ROADMAP-STATE.json /tmp/roadmap-status.json /tmp/roadmap-next.json /tmp/final-main/
          git rev-parse HEAD > /tmp/final-main/MAIN-SHA
          sha256sum /tmp/final-main/* > /tmp/final-main/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: final-main-state-evidence
          path: /tmp/final-main
          if-no-files-found: error
          retention-days: 7
