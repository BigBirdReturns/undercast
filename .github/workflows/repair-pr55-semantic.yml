name: inspect-pr55-main-integration

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: inspect-pr55-main-integration
  cancel-in-progress: true

jobs:
  inspect:
    if: github.event.pull_request.number == 58
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/full-canon-census
          fetch-depth: 0
      - name: Attempt current-main merge and capture exact conflicts
        run: |
          test "$(git rev-parse HEAD)" = "70712fd098548b5cb111bae166e9fbb75cf340ab"
          git config user.name "undercast-integration"
          git config user.email "undercast-integration@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main > /tmp/merge.out 2>&1
          status=$?
          set -e
          mkdir -p /tmp/pr55-main-integration
          cp /tmp/merge.out /tmp/pr55-main-integration/merge.out
          git status --short > /tmp/pr55-main-integration/status.txt
          git diff --name-only --diff-filter=U > /tmp/pr55-main-integration/conflicts.txt
          git diff --cc > /tmp/pr55-main-integration/conflicts.diff || true
          printf '%s\n' "$status" > /tmp/pr55-main-integration/merge-status.txt
          cat /tmp/pr55-main-integration/status.txt
          cat /tmp/pr55-main-integration/conflicts.txt
      - uses: actions/upload-artifact@v4
        with:
          name: pr55-main-integration-diagnostics
          path: /tmp/pr55-main-integration
          if-no-files-found: error
          retention-days: 3
