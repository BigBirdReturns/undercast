name: harden-waterline-final

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: harden-waterline-final
  cancel-in-progress: true

jobs:
  harden:
    if: github.event.pull_request.number == 66 && github.head_ref == 'agent/rolling-gold-waterline'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rolling-gold-waterline
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Apply final authority and path-binding hardening
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new, count=1):
              p = Path(path)
              text = p.read_text()
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f"{path}: expected {count}, found {actual}: {old[:120]!r}")
              p.write_text(text.replace(old, new, count))

          replace(
              'scripts/autopilot.mjs',
              '''async function waterlinePreflight(scopeId, requestedLimit) {
            const root = option("root", ".");
            const configPath = option("waterline-config", "data/WATERLINE.json");
            const gate = spawnSync(process.execPath, [
              "scripts/waterline.mjs", "gate",
              "--scope", scopeId,
              "--operation", "claim",
              "--requested", String(requestedLimit),
              "--config", configPath,
              "--root", root,
            ], { cwd: root, stdio: "inherit" });
            if (gate.error) throw new Error(`rolling waterline preflight could not start: ${gate.error.message}`);
            if (gate.status !== 0) throw new Error(`scope ${scopeId} is below its rolling gold waterline; refusing another roster cycle`);
          }
          ''',
              '''async function waterlinePreflight(scopeId, requestedLimit) {
            const root = option("root", ".");
            const gate = spawnSync(process.execPath, [
              "scripts/waterline.mjs", "gate",
              "--scope", scopeId,
              "--operation", "claim",
              "--requested", String(requestedLimit),
              "--config", option("waterline-config", "data/WATERLINE.json"),
              "--state", option("waterline-state", "data/WATERLINE-STATE.json"),
              "--journal", option("waterline-journal", "data/journal/waterline.jsonl"),
              "--autopilot", option("state", DEFAULT_STATE),
              "--autopilot-journal", option("journal", DEFAULT_JOURNAL),
              "--media-audit", option("media-audit-state", "data/MEDIA-AUDIT.json"),
              "--roadmap-state", option("roadmap-state", "data/ROADMAP-STATE.json"),
              "--preservation", option("preservation", DEFAULT_PRESERVATION),
              "--root", root,
            ], { cwd: root, stdio: "inherit" });
            if (gate.error) throw new Error(`rolling waterline preflight could not start: ${gate.error.message}`);
            if (gate.status !== 0) throw new Error(`scope ${scopeId} is below its rolling gold waterline; refusing another roster cycle`);
          }
          ''')

          replace(
              'scripts/autopilot-cli-fixtures.mjs',
              '''  await put("scripts/waterline.mjs", `
          import { existsSync } from "node:fs";
          if (existsSync("data/WATERLINE-BLOCK")) {
            console.error("synthetic rolling waterline blocker");
            process.exit(2);
          }
          console.log("PASS — synthetic rolling waterline");
          `);
          ''',
              '''  await put("scripts/waterline.mjs", `
          import { existsSync } from "node:fs";
          const required = ["--config", "--state", "--journal", "--autopilot", "--autopilot-journal", "--media-audit", "--roadmap-state", "--preservation", "--root", "--requested"];
          for (const flag of required) if (!process.argv.includes(flag)) {
            console.error(`missing waterline binding ${flag}`);
            process.exit(4);
          }
          if (existsSync("data/WATERLINE-BLOCK")) {
            console.error("synthetic rolling waterline blocker");
            process.exit(2);
          }
          console.log("PASS — synthetic rolling waterline");
          `);
          ''')

          replace(
              'scripts/lib/waterline.mjs',
              'const REVIEW_ROLES = new Set(["second-desk", "owner"]);',
              'const REVIEW_ROLES = new Set(["second-desk", "owner"]);\nconst INCIDENT_ROLES = new Set(["machine", "operator", "reviewer", "second-desk", "owner"]);')
          replace(
              'scripts/lib/waterline.mjs',
              '''function ensureUnique(rows, key, label) {
            const seen = new Set();
            for (const row of rows) {
              const value = row?.[key];
              if (!value || seen.has(value)) throw new Error(`${label} contains a missing or duplicate ${key}: ${value || "<missing>"}`);
              seen.add(value);
            }
          }
          ''',
              '''function ensureUnique(rows, key, label) {
            const seen = new Set();
            for (const row of rows) {
              const value = row?.[key];
              if (!value || seen.has(value)) throw new Error(`${label} contains a missing or duplicate ${key}: ${value || "<missing>"}`);
              seen.add(value);
            }
          }
          function validateIncidentEvents(rows) {
            const previousById = new Map();
            for (const row of rows) {
              const incidentId = requireString(row.incident_id, "incident_id");
              if (!["open", "closed"].includes(row.status)) throw new Error(`incident ${incidentId} status must be open or closed`);
              if (!["low", "medium", "high", "critical"].includes(row.severity)) throw new Error(`incident ${incidentId} severity is invalid`);
              requireDate(row.at, `incident ${incidentId}.at`);
              requireString(row.recorded_by, `incident ${incidentId}.recorded_by`);
              const role = requireString(row.recorded_role, `incident ${incidentId}.recorded_role`);
              if (!INCIDENT_ROLES.has(role)) throw new Error(`incident ${incidentId} recorded_role is invalid`);
              requireEvidence(row.evidence, `incident ${incidentId}.evidence`);
              const previous = previousById.get(incidentId);
              if (previous && Date.parse(row.at) < Date.parse(previous.at)) throw new Error(`incident ${incidentId} events are out of order`);
              if (row.status === "closed") {
                if (!previous || previous.status !== "open") throw new Error(`incident ${incidentId} cannot close without an open event`);
                if (row.severity !== previous.severity) throw new Error(`incident ${incidentId} close severity must match the open event`);
                if (BLOCKING_INCIDENT_SEVERITIES.has(previous.severity) && !REVIEW_ROLES.has(role)) throw new Error(`closing ${previous.severity} incident ${incidentId} requires second-desk or owner authority`);
              }
              if (previous?.status === "open" && BLOCKING_INCIDENT_SEVERITIES.has(previous.severity) && row.status === "open" && !BLOCKING_INCIDENT_SEVERITIES.has(row.severity) && !REVIEW_ROLES.has(role)) {
                throw new Error(`downgrading ${previous.severity} incident ${incidentId} requires second-desk or owner authority`);
              }
              previousById.set(incidentId, row);
            }
            return true;
          }
          ''')
          replace(
              'scripts/lib/waterline.mjs',
              '''  for (const drill of doc.drills) {
              if (!config.operations.required_drills.includes(drill.kind)) throw new Error(`unknown drill kind ${drill.kind}`);
              if (drill.passed !== true && drill.passed !== false) throw new Error(`drill ${drill.id} needs passed boolean`);
              requireReview(drill);
            }
            return true;
          }
          ''',
              '''  for (const drill of doc.drills) {
              if (!config.operations.required_drills.includes(drill.kind)) throw new Error(`unknown drill kind ${drill.kind}`);
              if (drill.passed !== true && drill.passed !== false) throw new Error(`drill ${drill.id} needs passed boolean`);
              requireReview(drill);
            }
            validateIncidentEvents(doc.incidents);
            return true;
          }
          ''')
          replace(
              'scripts/lib/waterline.mjs',
              '''export function makeIncidentEvent(input) {
            const incident_id = requireString(input.incident_id, "incident_id");
            const status = requireString(input.status, "status");
            if (!["open", "closed"].includes(status)) throw new Error("incident status must be open or closed");
            const severity = requireString(input.severity, "severity");
            if (!["low", "medium", "high", "critical"].includes(severity)) throw new Error("incident severity is invalid");
            const at = requireDate(input.at, "at");
            const body = { incident_id, status, severity, at, recorded_by: requireString(input.recorded_by, "recorded_by"), note: requireString(input.note, "note"), evidence: requireEvidence(input.evidence) };
            return { event_id: `incident_${sha256(stableJson(body)).slice(0, 24)}`, ...body };
          }
          ''',
              '''export function makeIncidentEvent(input, existingEvents = []) {
            const incident_id = requireString(input.incident_id, "incident_id");
            const status = requireString(input.status, "status");
            if (!["open", "closed"].includes(status)) throw new Error("incident status must be open or closed");
            const severity = requireString(input.severity, "severity");
            if (!["low", "medium", "high", "critical"].includes(severity)) throw new Error("incident severity is invalid");
            const at = requireDate(input.at, "at");
            const body = {
              incident_id,
              status,
              severity,
              at,
              recorded_by: requireString(input.recorded_by, "recorded_by"),
              recorded_role: requireString(input.recorded_role, "recorded_role"),
              note: requireString(input.note, "note"),
              evidence: requireEvidence(input.evidence),
            };
            const event = { event_id: `incident_${sha256(stableJson(body)).slice(0, 24)}`, ...body };
            validateIncidentEvents([...existingEvents, event]);
            return event;
          }
          ''')

          replace(
              'scripts/waterline.mjs',
              '      const event = makeIncidentEvent(doc);',
              '      const event = makeIncidentEvent(doc, next.incidents);')

          replace(
              'scripts/waterline-fixtures.mjs',
              '''state.incidents.push(makeIncidentEvent({ incident_id: "inc-1", status: "open", severity: "high", at: "2026-07-22T09:00:00Z", recorded_by: "operator", note: "Publication correctness incident under investigation.", evidence: [{ type: "workflow-run", value: "3" }] }));
          status = deriveWaterlineStatus({ config, state, mediaAudit: media(), autopilot: { jobs: allJobs }, roadmapState, preservation, scopeId: "star-trek", requestedTasks: 1 });
          assert.equal(status.phase, "incident-stop");
          assert.equal(status.claim_allowed, false);

          console.log("PASS — rolling gold cycles, receipts, drills, metrics, incident stop, and natural unlocks");
          ''',
              '''state.incidents.push(makeIncidentEvent({ incident_id: "inc-1", status: "open", severity: "high", at: "2026-07-22T09:00:00Z", recorded_by: "operator", recorded_role: "operator", note: "Publication correctness incident under investigation.", evidence: [{ type: "workflow-run", value: "3" }] }, state.incidents));
          status = deriveWaterlineStatus({ config, state, mediaAudit: media(), autopilot: { jobs: allJobs }, roadmapState, preservation, scopeId: "star-trek", requestedTasks: 1 });
          assert.equal(status.phase, "incident-stop");
          assert.equal(status.claim_allowed, false);
          assert.throws(() => makeIncidentEvent({ incident_id: "inc-1", status: "closed", severity: "high", at: "2026-07-22T10:00:00Z", recorded_by: "operator", recorded_role: "operator", note: "Attempted unreviewed closure.", evidence: [{ type: "report", value: "incident.json" }] }, state.incidents), /second-desk or owner/);
          state.incidents.push(makeIncidentEvent({ incident_id: "inc-1", status: "closed", severity: "high", at: "2026-07-22T10:00:00Z", recorded_by: "second-desk", recorded_role: "second-desk", note: "Correctness restored and independently verified.", evidence: [{ type: "workflow-run", value: "4" }] }, state.incidents));
          status = deriveWaterlineStatus({ config, state, mediaAudit: media(), autopilot: { jobs: allJobs }, roadmapState, preservation, scopeId: "star-trek", requestedTasks: 1 });
          assert.equal(status.claim_allowed, true);

          console.log("PASS — rolling gold cycles, receipts, drills, metrics, incident authority, stop/reopen, and natural unlocks");
          ''')

          replace(
              'docs/WATERLINE.md',
              '''High and critical incidents stop new leases until a later `closed` event for the
          same incident ID is recorded.
          ''',
              '''High and critical incidents stop new leases until a later `closed` event for the
          same incident ID is recorded. Any operator or machine may open a stop; closing or
          downgrading a high/critical incident requires `recorded_role: "second-desk"` or
          `"owner"`, keeps the original severity, and leaves independent evidence.
          ''')
          PY
          git diff --check

      - run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Prove path binding and incident authority
        run: |
          npm run waterline:fixtures
          npm run autopilot:fixtures
      - name: Create exact hardened candidate locally
        run: |
          git config user.name "undercast-waterline"
          git config user.email "undercast-waterline@users.noreply.github.com"
          git add scripts/autopilot.mjs scripts/autopilot-cli-fixtures.mjs \
            scripts/lib/waterline.mjs scripts/waterline.mjs scripts/waterline-fixtures.mjs docs/WATERLINE.md
          git commit -m "Waterline: bind lease paths and protect incident closure"
      - name: Gate exact hardened candidate
        run: npm run gate
      - name: Publish exact gated commit
        run: git push origin HEAD:agent/rolling-gold-waterline
