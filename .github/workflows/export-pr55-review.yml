name: export-pr55-semantic-review

on:
  push:
    branches:
      - agent/pr55-semantic-review
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/full-canon-census
          fetch-depth: 1
      - name: Verify exact reviewed head
        run: test "$(git rev-parse HEAD)" = "053ff0866939016216223051622be42553f0b00d"
      - name: Pack exact PR 55 checkout
        run: tar --exclude=.git --exclude=node_modules -czf /tmp/undercast-pr55-review.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: undercast-pr55-semantic-review
          path: /tmp/undercast-pr55-review.tar.gz
          if-no-files-found: error
          retention-days: 2
      - name: Publish artifact run ID to PR 55
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/issues/55/comments -f body="Semantic-review checkout artifact is ready in Actions run ${{ github.run_id }} (undercast-pr55-semantic-review)."
