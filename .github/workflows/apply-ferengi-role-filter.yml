name: apply-ferengi-role-filter

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-ferengi-role-filter
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.number == 72 && github.head_ref == 'agent/fix-ferengi-role-filter'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ferengi-role-filter
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install deterministic runtime
        run: npm ci

      - name: Apply the reviewed role-aware taxonomy fix
        run: |
          cat .github/ferengi-fix/part-*.py > /tmp/apply-ferengi-fix.py
          python /tmp/apply-ferengi-fix.py
          node --check scripts/build-species.mjs
          node --check scripts/species-fixtures.mjs
          node --check scripts/census.mjs
          node --check scripts/shard.mjs
          node --check scripts/gate.mjs
          node --check scripts/validate.mjs
          node --check tests/rendered/site.spec.mjs

      - name: Rebuild exact coverage and serving projections
        run: |
          node scripts/shard.mjs
          npm run species:fixtures

      - name: Close the newly in-scope Grimp and Leck media facets
        run: |
          npm run media:audit -- sync --now 2026-07-24T02:01:00.000Z
          mkdir -p data/review
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { readFile, writeFile } from 'node:fs/promises';
          const sha256=value=>createHash('sha256').update(value).digest('hex');
          const audit=JSON.parse(await readFile('data/MEDIA-AUDIT.json','utf8'));
          const wanted=new Map([
            ['UC-678/still',{hash:'ad83b63f2406acec72aeb2e075c8a0275d2191585d4db90cf66a7a333312ce68',subject:'Grimp',presentation:'character-depiction',identity:'Memory Alpha Grimp page 8872 revision 3444254; File:Grimp.jpg page 34131 revision 2578987, object name Grimp, source-image dHash distance 1.',presentationNote:'Direct review of the exact local asset shows a filmed close-up of the Ferengi character in prosthetic makeup, not artwork, a prop-only image, or a behind-the-scenes substitute.'}],
            ['UC-678/portrait',{hash:'4d7c7691fbb4494569873577c360833aaee52c20c73e75a7d0464882fab088c9',subject:'Jason Marsden',presentation:'neutral-human',identity:'Commons File:Jason Marsden (43904363590).jpg page 77564396 revision 890700321, object name and category Jason Marsden, source-image dHash distance 0.',presentationNote:'Direct review of the exact local asset shows Jason Marsden as the clearly dominant out-of-character human subject; an incidental cropped shoulder at the edge creates no subject ambiguity.'}],
            ['UC-679/still',{hash:'8ee9e5569834f15083ae331390a23f2cd9cfff8e3ab12be1b5ff54032e718d03',subject:'Leck',presentation:'character-depiction',identity:'Memory Alpha Leck page 78794 revision 3165329; File:Leck, 2373.jpg page 234287 revision 2604945, object name Leck, 2373, source-image dHash distance 0.',presentationNote:'Direct review of the exact local asset shows the filmed Ferengi character Leck in full prosthetic presentation, not artwork, a landscape, or a production substitute.'}],
            ['UC-679/portrait',{hash:'d2ec26b8b0151301581a6ee6993f2430875ece732a7628087bed251a53968132',subject:'Hamilton Camp',presentation:'neutral-human',identity:'English Wikipedia File:Hamilton Camp Sweet Joy Cropped.jpg page 34452734 revision 808012603, revision-bound file title naming Hamilton Camp, source-image dHash distance 0.',presentationNote:'Direct review of the exact local asset shows one out-of-character human musician without role makeup, group ambiguity, or a non-person subject.'}],
          ]);
          const items=audit.items.filter(row=>row.scope==='star-trek'&&wanted.has(`${row.wall_id}/${row.side}`));
          if(items.length!==4) throw new Error(`expected four corrected-scope facets, found ${items.map(row=>`${row.wall_id}/${row.side}/${row.status}`).join(', ')}`);
          for(const item of items){
            const expected=wanted.get(`${item.wall_id}/${item.side}`);
            if(item.asset?.sha256!==expected.hash) throw new Error(`${item.wall_id}/${item.side} asset drifted`);
          }
          const artifact={type:'workflow-artifact',value:'run 30060732587 artifact 8584432699 sha256 993534b9a81833d273e44591f4a655358599a6933912a1cbe5492df98bf58578'};
          const localArtifact={type:'workflow-artifact',value:'run 30060624715 artifact 8584395628 sha256 de44a7066f0ea0c805d69dda2ed40aef341f71925e778b9621e37bd69c0f8f19'};
          const rows=items.map(item=>{
            const expected=wanted.get(`${item.wall_id}/${item.side}`);
            return {item_id:item.id,wall_id:item.wall_id,side:item.side,expected_subject:expected.subject,asset_sha256:item.asset.sha256,asset_origin:item.asset.origin,disposition:'verify',identity_signal:{kind:'revision-bound-source-image',value:expected.identity},presentation:expected.presentation,evidence:[artifact,localArtifact]};
          });
          const receipt={version:1,scope:'star-trek',reviewed_at:'2026-07-24T02:03:00.000Z',semantics:'Identity uses revision-bound file/page metadata and exact source-image comparison, never facial recognition. Presentation uses direct inspection of the exact hash-bound local bytes.',source:audit.source,artifacts:{local:{workflow_run:30060624715,artifact_id:8584395628,sha256:'de44a7066f0ea0c805d69dda2ed40aef341f71925e778b9621e37bd69c0f8f19'},evidence:{workflow_run:30060732587,artifact_id:8584432699,sha256:'993534b9a81833d273e44591f4a655358599a6933912a1cbe5492df98bf58578'}},counts:{total:4,verify:4,null:0},rows};
          const receiptBytes=Buffer.from(JSON.stringify(receipt,null,2)+'\n');
          const receiptPath='data/review/ferengi-physical-media-source-receipt-2026-07-24.json';
          await writeFile(receiptPath,receiptBytes);
          const approvals=items.map(item=>{
            const expected=wanted.get(`${item.wall_id}/${item.side}`);
            return {item_id:item.id,asset_sha256:item.asset.sha256,identity_note:`${expected.identity} The exact source evidence names the expected subject; identity was not inferred from appearance.`,identity_evidence:[{type:'source-revision',value:expected.identity},{type:'source-image-comparison',value:`local sha256 ${item.asset.sha256}; comparison receipt in workflow run 30060732587`}],presentation:expected.presentation,presentation_note:expected.presentationNote,presentation_evidence:[localArtifact]};
          });
          const campaign={version:2,scope:'star-trek',reviewed_by:'chatgpt-second-desk',reviewed_role:'second-desk',reviewed_at:'2026-07-24T02:03:00.000Z',source:receipt.source,source_receipt:{path:receiptPath,sha256:sha256(receiptBytes)},expected_result:{total:750,verified:562,absent:188,review:0,attention:0},machine_reviewer:'source-metadata-bot',remediations:[],approvals};
          await writeFile('data/review/ferengi-physical-media-audit-campaign-2026-07-24.json',JSON.stringify(campaign,null,2)+'\n');
          NODE
          npm run media:audit:campaign -- --input data/review/ferengi-physical-media-audit-campaign-2026-07-24.json
          npm run media:audit -- sync --now 2026-07-24T02:04:00.000Z
          npm run media:audit -- validate
          npm run media:audit -- gate --scope star-trek
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const roadmapPath='data/ROADMAP-STATE.json';
          const roadmap=JSON.parse(await readFile(roadmapPath,'utf8'));
          roadmap.metrics.verified_records=375;
          roadmap.metrics.media_audit_ratio=1;
          const note='Ferengi role-taxonomy repair brought the existing Grimp and Leck cards into the Star Trek shelf and exact-subject scope: 375/375 Trek records and 750/750 facets complete; 562 facets verified and 188 honestly absent. This corrects classification and does not close a roadmap milestone.';
          if(!roadmap.notes.includes(note)) roadmap.notes.push(note);
          await writeFile(roadmapPath,JSON.stringify(roadmap,null,2)+'\n');
          const handoffPath='HANDOFF.md';
          let handoff=await readFile(handoffPath,'utf8');
          handoff=handoff.replace('The current Star Trek wall contains **746 facets across 373 records**:','The current Star Trek wall contains **750 facets across 375 records**:')
            .replace('| verified exact identity + presentation | **558** |','| verified exact identity + presentation | **562** |')
            .replace('The baseline is therefore **746 / 746 complete with zero media debt**.','The baseline is therefore **750 / 750 complete with zero media debt**.');
          await writeFile(handoffPath,handoff);
          NODE

      - name: Rebuild benchmark and archive contract before producer certification
        run: |
          node scripts/census-gate.mjs --write
          node scripts/build-contract.mjs
          node scripts/validate.mjs

      - name: Re-certify the changed producer and reconcile governed state
        run: |
          set +e
          (
            npm run autopilot -- certify \
              --scope star-trek \
              --reviewed-by chatgpt-second-desk \
              --activate \
              --now 2026-07-24T02:05:00.000Z
            npm run autopilot -- sync --now 2026-07-24T02:06:00.000Z
            npm run autopilot -- validate
            npm run media:audit -- validate
            npm run media:audit -- gate --scope star-trek
            node scripts/waterline.mjs status --scope star-trek --json > /tmp/waterline.json
            node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const waterline=JSON.parse(await readFile('/tmp/waterline.json','utf8'));
          if(waterline.phase!=='ready-for-cycle'||waterline.claim_allowed!==true||waterline.media.debt!==0||waterline.jobs.in_flight!==0){
            throw new Error(`taxonomy repair disturbed the rolling waterline: ${JSON.stringify(waterline)}`);
          }
          if(waterline.cycles.successful_receipts!==1||waterline.cycles.unreceipted.length!==0){
            throw new Error(`cycle history drifted: ${JSON.stringify(waterline.cycles)}`);
          }
          const state=JSON.parse(await readFile('data/AUTOPILOT.json','utf8'));
          const trek=state.jobs.filter(row=>row.scope==='star-trek');
          const counts=Object.fromEntries([...new Set(trek.map(row=>row.status))].sort().map(status=>[status,trek.filter(row=>row.status===status).length]));
          if((counts.leased||0)||(counts.drafted||0)||(counts.merged||0)) throw new Error('taxonomy repair left work in flight');
          const handoffPath='HANDOFF.md';
          let handoff=await readFile(handoffPath,'utf8');
          const replacement=`- Star Trek Autopilot: **${trek.length.toLocaleString('en-US')} durable tasks** — **${(counts.queued||0).toLocaleString('en-US')} queued**, **${(counts.blocked||0).toLocaleString('en-US')} blocked**,\n  **${(counts.resolved||0).toLocaleString('en-US')} resolved**, and **zero in flight**.`;
          const pattern=/- Star Trek Autopilot: \*\*[\d,]+ durable tasks\*\* — \*\*[\d,]+ queued\*\*, \*\*[\d,]+ blocked\*\*,\n  \*\*[\d,]+ resolved\*\*, and \*\*zero in flight\*\*\./;
          if(!pattern.test(handoff)) throw new Error('HANDOFF task accounting sentence not found');
          handoff=handoff.replace(pattern,replacement);
          await writeFile(handoffPath,handoff);
          console.log({trek:trek.length,counts,phase:waterline.phase});
          NODE
          ) > /tmp/ferengi-governance.log 2>&1
          code=$?
          set -e
          cat /tmp/ferengi-governance.log
          if [ "$code" -ne 0 ]; then
            mkdir -p ferengi-governance-diagnostics
            cp /tmp/ferengi-governance.log ferengi-governance-diagnostics/log.txt
            exit "$code"
          fi

      - name: Upload governance diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ferengi-governance-diagnostics
          path: ferengi-governance-diagnostics
          if-no-files-found: ignore
          retention-days: 7

      - name: Prove exact Ferengi semantics before publication
        run: |
          node scripts/shard.mjs
          npm run species:fixtures
          node scripts/roadmap.mjs validate
          node scripts/census-gate.mjs --write
          node scripts/build-contract.mjs
          node scripts/validate.mjs
          git diff --check

      - name: Remove installation and diagnostic scaffolding
        run: |
          rm -rf .github/ferengi-fix
          rm -f \
            .github/workflows/apply-ferengi-role-filter.yml \
            .github/workflows/inspect-ferengi-role-filter.yml \
            .github/workflows/inspect-ferengi-shelf-seams.yml \
            .github/workflows/export-ferengi-physical-media.yml \
            .github/workflows/verify-ferengi-physical-media.yml \
            .github/workflows/diagnose-ferengi-installer.yml \
            .github/workflows/read-ferengi-failure.yml \
            .github/workflows/patch-ferengi-final-rebuild.yml
          git config user.name 'undercast-taxonomy'
          git config user.email 'undercast-taxonomy@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Fix: make species filters exact to displayed roles'

      - name: Gate the exact permanent candidate
        run: |
          npx playwright install --with-deps chromium
          npm run gate
          npm run preserve:verify

      - name: Publish the exact gated candidate
        run: git push origin HEAD:agent/fix-ferengi-role-filter
