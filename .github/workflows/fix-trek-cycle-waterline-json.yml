name: fix-trek-cycle-waterline-json

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: fix-trek-cycle-waterline-json
  cancel-in-progress: true

jobs:
  fix:
    if: github.head_ref == 'agent/trek-cycle-001-success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-cycle-001-success
          fetch-depth: 1

      - name: Replace npm wrapper output with direct JSON CLI
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/close-trek-cycle-001-success.yml')
          text = path.read_text()
          replacements = {
              'npm run waterline -- status --scope star-trek --json > /tmp/waterline-before-receipt.json': 'node scripts/waterline.mjs status --scope star-trek --json > /tmp/waterline-before-receipt.json',
              'npm run waterline -- status --scope star-trek --json > /tmp/waterline-final.json': 'node scripts/waterline.mjs status --scope star-trek --json > /tmp/waterline-final.json',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'expected one waterline JSON probe, found {text.count(old)}: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          rm -f .github/workflows/fix-trek-cycle-waterline-json.yml
          git config user.name 'undercast-cycle'
          git config user.email 'undercast-cycle@users.noreply.github.com'
          git add .github/workflows/close-trek-cycle-001-success.yml .github/workflows/fix-trek-cycle-waterline-json.yml
          git diff --cached --check
          git commit -m 'Cycle: parse waterline status through direct CLI'
          git push origin HEAD:agent/trek-cycle-001-success
