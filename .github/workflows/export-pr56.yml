name: export-pr56-exact

on:
  pull_request:

permissions:
  contents: read

jobs:
  export:
    if: github.event.pull_request.number == 58
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/luna-autopilot
          fetch-depth: 1
      - name: Verify exact PR 56 head
        run: test "$(git rev-parse HEAD)" = "bf192e1f12f9283fcde0063232edc7fd4f987442"
      - name: Pack exact checkout
        run: tar --exclude=.git --exclude=node_modules -czf /tmp/pr56-exact.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: pr56-exact
          path: /tmp/pr56-exact.tar.gz
          if-no-files-found: error
          retention-days: 2
