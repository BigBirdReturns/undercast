name: export-autopilot-worktree

on:
  push:
    branches:
      - agent/luna-autopilot
  pull_request:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack autopilot control-plane sources
        run: |
          tar -czf /tmp/autopilot-worktree.tar.gz \
            package.json AGENTS.md LUNA.md docs/AUTOPILOT.md \
            scripts/autopilot.mjs scripts/autopilot-fixtures.mjs scripts/lib/autopilot*.mjs \
            data/AUTOPILOT.json data/AUTOPILOT-SCOPES.json \
            .github/workflows/autopilot.yml .github/workflows/validate.yml
      - uses: actions/upload-artifact@v4
        with:
          name: autopilot-worktree
          path: /tmp/autopilot-worktree.tar.gz
          if-no-files-found: error
          retention-days: 1
