name: apply-autopilot-promotion

on:
  push:
    branches:
      - agent/luna-autopilot

permissions:
  contents: write

concurrency:
  group: apply-autopilot-promotion
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/luna-autopilot
          fetch-depth: 0

      - name: Reconstruct and verify the reviewed promotion patch
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/promotion/autopilot-promotion.patch.part06')
          text = source.read_text()
          marker = '+diff -ruN /tmp/autopilot-original/scripts/lib/autopilot-model.mjs'
          if marker not in text:
              raise SystemExit('expected staged part06 normalization marker is missing')
          before, after = text.split(marker, 1)
          tail = marker + after
          fixed_tail = ''.join(line[1:] if line.startswith('+') else line for line in tail.splitlines(keepends=True))
          Path('/tmp/autopilot-promotion.part06.fixed').write_text(before + fixed_tail)
          PY

          cat \
            .github/promotion/autopilot-promotion.patch.part00 \
            .github/promotion/autopilot-promotion.patch.part01 \
            .github/promotion/autopilot-promotion.patch.part02 \
            .github/promotion/autopilot-promotion.patch.part03 \
            .github/promotion/autopilot-promotion.patch.part04 \
            .github/promotion/autopilot-promotion.patch.part05 \
            /tmp/autopilot-promotion.part06.fixed \
            .github/promotion/autopilot-promotion.patch.part07 \
            > /tmp/autopilot-promotion.patch

          echo "52f59912b609f048c791afa99e8f4914e9d3b20f3050482b62d444ab5d7831d9  /tmp/autopilot-promotion.patch" \
            | sha256sum --check --strict
          git apply --check /tmp/autopilot-promotion.patch

      - name: Upload reconstruction diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-promotion-reconstruction
          path: |
            /tmp/autopilot-promotion.patch
            /tmp/autopilot-promotion.part06.fixed
          if-no-files-found: warn
          retention-days: 2

      - name: Apply the promotion atomically to the branch worktree
        run: |
          git apply /tmp/autopilot-promotion.patch
          rm -f .github/workflows/export-autopilot-worktree.yml
          rm -f .github/promotion/autopilot-promotion.patch.part*
          rm -f .github/promotion/autopilot-payload.part*
          rmdir .github/promotion 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install test runtime
        run: npm ci

      - name: Validate the promoted control plane
        run: |
          for file in scripts/autopilot*.mjs scripts/lib/autopilot*.mjs; do
            node --check "$file"
          done
          npm run autopilot:fixtures
          git diff --check

      - name: Commit and push the reviewed promotion
        run: |
          git config user.name "undercast-bot"
          git config user.email "undercast-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Autopilot: certify producers and schedule bounded refresh"
          git push origin HEAD:agent/luna-autopilot
