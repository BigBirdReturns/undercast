name: fix-trek-cycle-waterline-json-v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: fix-trek-cycle-waterline-json-v2
  cancel-in-progress: true

jobs:
  fix:
    if: github.head_ref == 'agent/trek-cycle-001-success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-cycle-001-success
          fetch-depth: 1

      - name: Patch, self-remove, and publish
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/close-trek-cycle-001-success.yml')
          text = path.read_text()
          pairs = [
              ('npm run waterline -- status --scope star-trek --json > /tmp/waterline-before-receipt.json', 'node scripts/waterline.mjs status --scope star-trek --json > /tmp/waterline-before-receipt.json'),
              ('npm run waterline -- status --scope star-trek --json > /tmp/waterline-final.json', 'node scripts/waterline.mjs status --scope star-trek --json > /tmp/waterline-final.json'),
          ]
          for old, new in pairs:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one match, found {count}: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          rm -f \
            .github/workflows/fix-trek-cycle-waterline-json.yml \
            .github/workflows/fix-trek-cycle-waterline-json-v2.yml
          git config user.name 'undercast-cycle'
          git config user.email 'undercast-cycle@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git status --short
          git commit -m 'Cycle: parse waterline status through direct CLI'
          git push origin HEAD:agent/trek-cycle-001-success
