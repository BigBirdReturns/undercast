name: patch-ferengi-preservation-wrapper

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: patch-ferengi-preservation-wrapper
  cancel-in-progress: true

jobs:
  patch:
    if: github.event.pull_request.number == 72
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ferengi-role-filter
          fetch-depth: 1
      - name: Remove the invalid argumentless preserve-verify call
        run: |
          count=$(grep -c 'npm run preserve:verify' .github/workflows/apply-ferengi-role-filter.yml || true)
          test "$count" -eq 1
          sed -i '/npm run preserve:verify/d' .github/workflows/apply-ferengi-role-filter.yml
          test "$(grep -c 'npm run preserve:verify' .github/workflows/apply-ferengi-role-filter.yml || true)" -eq 0
          rm -f .github/workflows/read-ferengi-failure.yml
          git config user.name 'undercast-taxonomy'
          git config user.email 'undercast-taxonomy@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Fix: rely on canonical preservation validation'
          git push origin HEAD:agent/fix-ferengi-role-filter
