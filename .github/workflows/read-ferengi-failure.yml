name: read-ferengi-failure

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read

concurrency:
  group: read-ferengi-failure
  cancel-in-progress: true

jobs:
  read:
    if: github.event.pull_request.number == 72
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download failed job log and retain tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ferengi-failure
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/BigBirdReturns/undercast/actions/jobs/89384016267/logs \
            -o ferengi-failure/full.log
          tail -n 420 ferengi-failure/full.log > ferengi-failure/tail.log
          cat ferengi-failure/tail.log
      - uses: actions/upload-artifact@v4
        with:
          name: ferengi-proof-failure
          path: ferengi-failure
          if-no-files-found: error
          retention-days: 7
