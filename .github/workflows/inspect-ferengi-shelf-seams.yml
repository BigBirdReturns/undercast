name: inspect-ferengi-shelf-seams

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: inspect-ferengi-shelf-seams
  cancel-in-progress: true

jobs:
  inspect:
    if: github.event.pull_request.number == 72
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ferengi-role-filter
          fetch-depth: 1
      - name: Inspect Ferengi primary roles and legacy Voice shelf records
        run: |
          mkdir -p ferengi-shelf-diagnostics
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const read = async path => JSON.parse(await readFile(path, 'utf8'));
          const [specimens, species, coverage] = await Promise.all([
            read('data/specimens.json'), read('data/species.json'), read('data/CENSUS-COVERAGE.json')
          ]);
          const byId = new Map(specimens.map(row => [row.id, row]));
          const taxon = species.taxa.find(row => row.key === 'species:star-trek:ferengi');
          const taxonIds = new Set(taxon.records.map(row => row.id));
          const recordRows = taxon.records.map(row => ({
            id: row.id,
            specimen: byId.get(row.id),
            ferengi_credits: row.credits,
          }));
          const legacyVoiceStarTrek = specimens.filter(row => row.universe === 'Voice' && (
            /star trek|lower decks|prodigy|animated series/i.test(row.production || '') ||
            (row.references || []).some(ref => /memory-alpha\.fandom\.com/i.test(ref.source || '')) ||
            (row.performances || []).some(performance => (performance.references || []).some(ref => /memory-alpha\.fandom\.com/i.test(ref.source || '')))
          ));
          const ferengiCoverage = coverage.filter(row => row.franchise === 'Star Trek' && row.category === 'Ferengi');
          const report = {
            version: 1,
            counts: {
              taxon_records: recordRows.length,
              taxon_records_on_star_trek_shelf: recordRows.filter(row => row.specimen?.universe === 'Star Trek').length,
              taxon_records_on_voice_shelf: recordRows.filter(row => row.specimen?.universe === 'Voice').length,
              legacy_voice_star_trek_records: legacyVoiceStarTrek.length,
            },
            ferengi_taxon_records: recordRows,
            ferengi_voice_shelf_records: recordRows.filter(row => row.specimen?.universe === 'Voice'),
            all_legacy_voice_star_trek_records: legacyVoiceStarTrek,
            ferengi_coverage: ferengiCoverage,
          };
          await writeFile('ferengi-shelf-diagnostics/report.json', JSON.stringify(report, null, 2) + '\n');
          const lines = [
            `Ferengi taxon records: ${report.counts.taxon_records}`,
            `On Star Trek shelf: ${report.counts.taxon_records_on_star_trek_shelf}`,
            `On legacy Voice shelf: ${report.counts.taxon_records_on_voice_shelf}`,
            `All likely Star Trek records still filed under Voice: ${report.counts.legacy_voice_star_trek_records}`,
            '',
            'Ferengi records excluded by shelf=Star Trek:',
            ...report.ferengi_voice_shelf_records.map(row => `- ${row.id}: ${row.specimen.actor} — ${row.specimen.character}; production=${row.specimen.production}`),
          ];
          await writeFile('ferengi-shelf-diagnostics/report.txt', lines.join('\n') + '\n');
          console.log(lines.join('\n'));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: ferengi-shelf-diagnostics
          path: ferengi-shelf-diagnostics
          if-no-files-found: error
          retention-days: 7
