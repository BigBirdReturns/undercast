name: process-tosk-cycle

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: process-tosk-cycle
  cancel-in-progress: false

jobs:
  process:
    if: github.event_name != 'pull_request' || github.event.pull_request.number == 78
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/star-trek-gold-completion
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Submit the evidence-backed Tosk draft
        env:
          CONTACT: bigbirdreturns@proton.me
        run: |
          set -euo pipefail
          mkdir -p .luna cycle-artifact
          cat > .luna/results.json <<'JSON'
          {
            "version": 1,
            "lease_id": "lease_caac98ab2c967572183445c9",
            "agent": "luna",
            "results": [
              {
                "task_id": "ap_525b90d304dca267e9231889",
                "decision": "draft",
                "draft": {
                  "character": "Tosk",
                  "actor": "Scott MacDonald",
                  "production": "Star Trek: Deep Space Nine",
                  "universe": "Star Trek",
                  "years": "1993",
                  "designer": "Michael Westmore · Vincent Niebla",
                  "transform": 4,
                  "kind": "face",
                  "knownFor": "The hunted Gamma Quadrant visitor in “Captive Pursuit.”",
                  "reveal": "Scott MacDonald played Tosk beneath an extensive head-to-hand alien makeup with cat-eye contact lenses. Vincent Niebla sculpted the Tosk head under Michael Westmore’s Star Trek makeup department.",
                  "references": [
                    {
                      "claim": "performance",
                      "label": "Tosk — played by Scott MacDonald in Captive Pursuit",
                      "source": "https://memory-alpha.fandom.com/wiki/Tosk",
                      "publisher": "Memory Alpha"
                    },
                    {
                      "claim": "design-build",
                      "label": "Tosk makeup and Captive Pursuit production background",
                      "source": "https://memory-alpha.fandom.com/wiki/Captive_Pursuit_(episode)",
                      "publisher": "Memory Alpha"
                    },
                    {
                      "claim": "design-build",
                      "label": "Vincent Niebla sculpted the Tosk head",
                      "source": "https://memory-alpha.fandom.com/wiki/Vincent_Niebla",
                      "publisher": "Memory Alpha"
                    }
                  ],
                  "wiki": "https://en.wikipedia.org/wiki/Scott_MacDonald_(actor)"
                }
              }
            ]
          }
          JSON
          node scripts/autopilot.mjs submit \
            --batch data/review/trek-cycle-002-tosk-lease.json \
            --input .luna/results.json \
            --now 2026-07-24T08:35:00.000Z
          node scripts/autopilot.mjs validate
      - name: Merge, retrieve and rebuild the exact candidate
        env:
          CONTACT: bigbirdreturns@proton.me
          IMAGE_MODE: loose
          CRAWL_DELAY_MS: '1500'
        run: |
          set -euo pipefail
          node scripts/grow.mjs --drafts
          wall_id=$(node --input-type=module <<'NODE'
          import {readFile} from 'node:fs/promises';
          const rows=JSON.parse(await readFile('data/specimens.json','utf8'));
          const hits=rows.filter(row=>row.actor==='Scott MacDonald'&&row.character==='Tosk');
          if(hits.length!==1) throw new Error(`expected one Tosk card, found ${hits.length}`);
          console.log(hits[0].id);
          NODE
          )
          echo "$wall_id" > cycle-artifact/wall-id.txt
          RETRIEVE_ONLY="$wall_id" RETRIEVE_MAX=1 node scripts/retrieve.mjs
          node scripts/credits.mjs
          node scripts/sync-sources.mjs
          node scripts/shard.mjs
          node scripts/build-record-pages.mjs
          node scripts/build-contract.mjs
          node scripts/validate.mjs
          node scripts/autopilot.mjs sync --now 2026-07-24T08:45:00.000Z
          node scripts/autopilot.mjs validate
          node scripts/media-audit.mjs sync --now 2026-07-24T08:46:00.000Z
          node scripts/media-audit.mjs validate
          node --input-type=module <<'NODE'
          import {createHash} from 'node:crypto';
          import {copyFile,mkdir,readFile,stat,writeFile} from 'node:fs/promises';
          const wallId=(await readFile('cycle-artifact/wall-id.txt','utf8')).trim();
          const specimens=JSON.parse(await readFile('data/specimens.json','utf8'));
          const sources=JSON.parse(await readFile('data/SOURCES.json','utf8'));
          const audit=JSON.parse(await readFile('data/MEDIA-AUDIT.json','utf8'));
          const card=specimens.find(row=>row.id===wallId);
          const source=sources.find(row=>row.id===wallId);
          const items=audit.items.filter(row=>row.wall_id===wallId);
          if(!card||!source||items.length!==2) throw new Error('candidate evidence envelope incomplete');
          const files=[];
          await mkdir('cycle-artifact/images',{recursive:true});
          for(const side of ['still','portrait']){
            const path=card[side]?.src;
            if(!path) continue;
            const bytes=await readFile(path);
            const target=`cycle-artifact/images/${path.split('/').pop()}`;
            await copyFile(path,target);
            files.push({side,path,sha256:createHash('sha256').update(bytes).digest('hex'),bytes:(await stat(path)).size,origin:card[side].origin||source[side]?.origin||null,kind:card[side].kind||source[side]?.kind||null});
          }
          const envelope={version:1,wall_id:wallId,task_id:'ap_525b90d304dca267e9231889',lease_id:'lease_caac98ab2c967572183445c9',card,source,items,files};
          await writeFile('cycle-artifact/evidence-envelope.json',JSON.stringify(envelope,null,2)+'\n');
          await writeFile('cycle-artifact/autopilot-status.json',JSON.stringify(JSON.parse(await readFile('data/AUTOPILOT.json','utf8')).jobs.find(row=>row.id==='ap_525b90d304dca267e9231889'),null,2)+'\n');
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: trek-cycle-002-tosk-candidate
          path: cycle-artifact
          if-no-files-found: error
          retention-days: 30
      - name: Commit restart-safe merged state and remove this one-shot workflow
        run: |
          set -euo pipefail
          rm -rf .luna cycle-artifact
          rm -f .github/workflows/process-tosk-cycle.yml
          git config user.name 'undercast-cycle-operator'
          git config user.email 'undercast-cycle-operator@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Cycle 2: merge and retrieve Tosk'
          git push origin HEAD:agent/star-trek-gold-completion
