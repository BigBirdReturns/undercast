name: corpus-operations-status

on:
  schedule:
    - cron: "11 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: corpus-operations-status
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build the machine-readable operating report
        run: |
          mkdir -p .corpus-operations
          npm run corpus:ops -- validate --json > .corpus-operations/validate.json
          npm run corpus:ops -- status --json > .corpus-operations/status.json
          npm run corpus:ops -- plan --json > .corpus-operations/plan.json
          npm run corpus:ops -- next-estate --json > .corpus-operations/next-estate.json
          npm run media:search -- plan --scope star-trek --limit 20 --json > .corpus-operations/media-search-plan.json

      - name: Retain the daily collection plan
        uses: actions/upload-artifact@v4
        with:
          name: corpus-operations-${{ github.run_id }}
          path: .corpus-operations
          if-no-files-found: error
          retention-days: 14
