name: harvest-trek-fandom-metadata

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: harvest-trek-fandom-metadata
  cancel-in-progress: true

jobs:
  harvest:
    if: github.head_ref == 'agent/trek-media-baseline-closure'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-media-baseline-closure
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Harvest revision-bound Fandom metadata
        run: |
          python - <<'PY'
          import hashlib
          import html
          import json
          import re
          import time
          import urllib.parse
          import urllib.request
          from collections import defaultdict
          from pathlib import Path

          UA = 'UNDERCAST exact-subject source audit/1.0 (https://github.com/BigBirdReturns/undercast)'
          state = json.loads(Path('data/MEDIA-AUDIT.json').read_text())
          items = [row for row in state['items'] if row.get('scope') == 'star-trek' and row.get('asset') and row.get('status') not in ('verified','absent')]

          def fetch(base, params, attempts=5):
              url = base + '?' + urllib.parse.urlencode(params)
              last = None
              for attempt in range(attempts):
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': UA, 'Accept':'application/json'})
                      with urllib.request.urlopen(req, timeout=60) as response:
                          return json.load(response)
                  except Exception as exc:
                      last = exc
                      time.sleep(min(16,2**attempt))
              raise RuntimeError(f'{url}: {last}')

          def batches(values,size=30):
              values=list(values)
              for i in range(0,len(values),size): yield values[i:i+size]

          def clean(value):
              value=html.unescape(str(value or ''))
              value=re.sub(r'<[^>]+>',' ',value)
              return re.sub(r'\s+',' ',value).strip()

          origins=defaultdict(set)
          rows=[]
          for item in items:
              origin=item['asset'].get('origin') or ''
              parsed=urllib.parse.urlparse(origin)
              host=parsed.hostname or ''
              title=urllib.parse.unquote(parsed.path.split('/wiki/',1)[-1]).replace('_',' ') if '/wiki/' in parsed.path else ''
              if host.endswith('fandom.com'):
                  origins[host].add(title)
              rows.append({'item_id':item['id'],'wall_id':item['wall_id'],'side':item['side'],'expected_subject':item['expected_subject'],'asset_sha256':item['asset']['sha256'],'origin':origin,'origin_host':host,'origin_title':title})

          metadata={}
          for host,titles in origins.items():
              for batch in batches(sorted(titles)):
                  params={'action':'query','format':'json','formatversion':2,'redirects':1,'prop':'pageprops|categories|links|revisions','cllimit':'max','pllimit':'max','rvprop':'ids|timestamp|sha1','titles':'|'.join(batch)}
                  if any(title.lower().startswith('file:') for title in batch):
                      params['prop']+='|imageinfo'
                      params['iiprop']='extmetadata|url|mime|size'
                  doc=fetch(f'https://{host}/api.php',params)
                  norm={row['from']:row['to'] for row in doc.get('query',{}).get('normalized',[])}
                  redirects={row['from']:row['to'] for row in doc.get('query',{}).get('redirects',[])}
                  pages={page.get('title'):page for page in doc.get('query',{}).get('pages',[])}
                  for original in batch:
                      target=redirects.get(norm.get(original,original),norm.get(original,original))
                      page=pages.get(target) or pages.get(original) or {'title':target,'missing':True}
                      ii=(page.get('imageinfo') or [{}])[0]
                      rev=(page.get('revisions') or [{}])[0]
                      ext={key:clean(value.get('value') if isinstance(value,dict) else value) for key,value in (ii.get('extmetadata') or {}).items()}
                      body={'title':page.get('title'),'pageid':page.get('pageid'),'revision':rev.get('revid'),'timestamp':rev.get('timestamp'),'sha1':rev.get('sha1'),'categories':[row.get('title') for row in page.get('categories',[])],'links':[row.get('title') for row in page.get('links',[])],'image_url':ii.get('url'),'mime':ii.get('mime'),'width':ii.get('width'),'height':ii.get('height'),'extmetadata':ext,'missing':bool(page.get('missing'))}
                      body['metadata_sha256']=hashlib.sha256(json.dumps(body,sort_keys=True,separators=(',',':')).encode()).hexdigest()
                      metadata[f'{host}|{original}']=body
                  time.sleep(0.35)

          for row in rows:
              row['origin_metadata']=metadata.get(f'{row["origin_host"]}|{row["origin_title"]}')
          output={'version':2,'generated_at':'2026-07-23T00:00:00.000Z','item_set_sha256':state['source']['item_set_sha256'],'count':len(rows),'rows':rows}
          Path('fandom-metadata').mkdir(exist_ok=True)
          Path('fandom-metadata/metadata.json').write_text(json.dumps(output,indent=2)+'\n')
          unresolved=[row for row in rows if row['origin_host'].endswith('fandom.com') and not row.get('origin_metadata')]
          if unresolved: raise SystemExit(f'{len(unresolved)} Fandom rows lack metadata')
          print(f'harvested revision-bound Fandom metadata for {len(metadata)} unique origins')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: trek-fandom-source-metadata
          path: fandom-metadata
          if-no-files-found: error
          retention-days: 14
