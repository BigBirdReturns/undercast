name: ingest-leads

# KEYLESS. Harvests candidate performers from curated wiki categories into
# data/CANDIDATES.json — the triage worklist. Never touches the wall; nothing
# here is published as a card. grow.mjs (or a human) turns leads into specimens.

on:
  schedule:
    - cron: "11 6 * * *"     # nightly, offset from retrieve (07:23) and grow (05:41)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Harvest leads
        env:
          INGEST_MAX: "300"           # new leads per night
          CRAWL_DELAY_MS: "1200"      # be gentle with the wikis
          CONTACT: "bigbirdreturns@proton.me"  # goes in the crawler's User-Agent
        run: node scripts/ingest.mjs

      - name: Commit
        run: |
          git config user.name  "undercast-bot"
          git config user.email "undercast-bot@users.noreply.github.com"
          git add data/CANDIDATES.json
          git diff --cached --quiet || git commit -m "ingest: harvest candidate leads ($(date -u +%F))"
          git push
