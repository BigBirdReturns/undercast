name: search-media-improvements

# Collection-only media lane. Candidate bytes and provenance are searched in an
# isolated temporary corpus and retained as a workflow artifact. This workflow
# never modifies canonical specimens, SOURCES, media assignments, or images.

on:
  schedule:
    - cron: "23 7 * * 2,5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: media-search
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate collection-only operating mode
        run: npm run corpus:ops -- validate

      - name: Search due honest absences in isolation
        env:
          CONTACT: "bigbirdreturns@proton.me"
          CRAWL_DELAY_MS: "1500"
        run: node scripts/media-search.mjs search --scope star-trek --limit 12 --output .media-search

      - name: Retain noncanonical candidate bytes and manifest
        uses: actions/upload-artifact@v4
        with:
          name: media-search-${{ github.run_id }}
          path: .media-search
          if-no-files-found: error
          retention-days: 14

      - name: Validate attempt receipts
        run: node scripts/media-search.mjs validate

      - name: Commit search receipts only
        run: |
          git config user.name "undercast-bot"
          git config user.email "undercast-bot@users.noreply.github.com"
          git add data/MEDIA-SEARCH-STATE.json data/journal/media-search.jsonl 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "media: record noncanonical search attempts ($(date -u +%F))"
          for i in 1 2 3; do git pull --rebase --autostash origin main && git push && exit 0 || sleep $((i*3)); done
          echo "push failed after retries"; exit 1
