name: retrieve-images

# Keyless. Crawls wikis for stills + portraits, caches them into the repo,
# updates the provenance ledger, rebuilds CREDITS.md. No ANTHROPIC_API_KEY needed.

on:
  schedule:
    - cron: "23 7 * * *"     # nightly, offset from any other job
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: retrieve
  cancel-in-progress: false

jobs:
  retrieve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Retrieve images + provenance
        env:
          RETRIEVE_MAX: "40"          # chip away 40 cards per night
          CRAWL_DELAY_MS: "1500"      # be gentle with the wikis
          IMAGE_MODE: "loose"         # also pull Fandom performer photos (denser)
          CONTACT: "bigbirdreturns@proton.me"  # goes in the crawler's User-Agent
        run: node scripts/retrieve.mjs

      - name: Rebuild credits
        run: node scripts/credits.mjs

      - name: Rebuild serving projections (index + shards from the canonical data)
        run: node scripts/shard.mjs

      - name: Validate invariants (gate — refuse to commit a corrupt state)
        run: node scripts/validate.mjs

      - name: Commit
        run: |
          git config user.name  "undercast-bot"
          git config user.email "undercast-bot@users.noreply.github.com"
          git add data/specimens.json data/SOURCES.json data/GAPS.json CREDITS.md images
          git add data/index.json data/shard-manifest.json data/shards   # generated serving projections
          git add data/media-live.json 2>/dev/null || true               # lean release-url map (if any)
          git diff --cached --quiet && exit 0
          git commit -m "retrieve: images + provenance ($(date -u +%F))"
          for i in 1 2 3; do git pull --rebase --autostash origin main && git push && exit 0 || sleep $((i*3)); done
          echo "push failed after retries"; exit 1
