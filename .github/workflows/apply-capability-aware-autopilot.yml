name: apply-capability-aware-autopilot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-capability-aware-autopilot
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.number == 70 && github.head_ref == 'agent/capability-aware-autopilot'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/capability-aware-autopilot
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Apply reviewed capability integration
        env:
          PAYLOAD: 
        run: |
          printf '%s' "$PAYLOAD" | base64 --decode | gzip --decompress > /tmp/apply-capability-aware-autopilot.py
          python /tmp/apply-capability-aware-autopilot.py
          node --check scripts/lib/autopilot-capabilities.mjs
          node --check scripts/lib/autopilot-actions.mjs
          node --check scripts/lib/autopilot-model.mjs
          node --check scripts/autopilot.mjs
          node --check scripts/autopilot-capability-fixtures.mjs

      - name: Prove focused capability and waterline contracts
        run: |
          npm ci
          npm run autopilot:fixtures
          npm run waterline:fixtures
          npm run autopilot -- validate
          npm run autopilot -- candidates --scope star-trek --capability-profile text-vision --limit 200 --json > /tmp/candidates.json
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const report = JSON.parse(await readFile('/tmp/candidates.json', 'utf8'));
          const sargon = report.incompatible.find(row => row.task_id === 'ap_8ec80c60cecacc496a658628');
          if (!sargon || !sargon.missing_capabilities.includes('audio-listening')) throw new Error('Sargon did not remain audio-gated');
          const ishka = report.compatible.find(row => row.task_id === 'ap_167ac35ec0c06c7005bcc32f');
          if (!ishka) throw new Error('reviewed physical proof task is not capability-compatible');
          if (report.profile.id !== 'text-vision') throw new Error('wrong capability profile in candidate report');
          NODE

      - name: Create the exact permanent candidate
        run: |
          rm -f .github/workflows/apply-capability-aware-autopilot.yml
          git config user.name 'undercast-autopilot'
          git config user.email 'undercast-autopilot@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Autopilot: make task leasing capability-aware'

      - name: Gate the exact clean candidate
        run: |
          npx playwright install --with-deps chromium
          npm run gate

      - name: Publish exact gated candidate
        run: git push origin HEAD:agent/capability-aware-autopilot
