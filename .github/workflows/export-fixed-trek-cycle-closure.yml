name: export-fixed-trek-cycle-closure

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: export-fixed-trek-cycle-closure
  cancel-in-progress: true

jobs:
  export:
    if: github.head_ref == 'agent/trek-cycle-001-success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trek-cycle-001-success
          fetch-depth: 1

      - name: Emit corrected workflow bytes
        run: |
          mkdir -p fixed-cycle-workflow
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/close-trek-cycle-001-success.yml')
          text = source.read_text()
          pairs = [
              ('npm run waterline -- status --scope star-trek --json > /tmp/waterline-before-receipt.json', 'node scripts/waterline.mjs status --scope star-trek --json > /tmp/waterline-before-receipt.json'),
              ('npm run waterline -- status --scope star-trek --json > /tmp/waterline-final.json', 'node scripts/waterline.mjs status --scope star-trek --json > /tmp/waterline-final.json'),
          ]
          for old, new in pairs:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one match, found {count}: {old}')
              text = text.replace(old, new, 1)
          Path('fixed-cycle-workflow/close-trek-cycle-001-success.yml').write_text(text)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: fixed-trek-cycle-closure
          path: fixed-cycle-workflow
          if-no-files-found: error
          retention-days: 7
