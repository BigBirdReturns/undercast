name: harden-waterline-final-v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: harden-waterline-final-v2
  cancel-in-progress: true

jobs:
  harden:
    if: github.event.pull_request.number == 66 && github.head_ref == 'agent/rolling-gold-waterline'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rolling-gold-waterline
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Replay syntax-safe final hardening patch
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent
          text = Path('.github/workflows/harden-waterline-final.yml').read_text()
          text = text.replace('console.error(`missing waterline binding ${flag}`);', 'console.error("missing waterline binding " + flag);')
          block = text.split("python - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          exec(compile(dedent(block), '<waterline-final-hardening>', 'exec'))
          PY
          git diff --check
      - run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Prove path binding and incident authority
        run: |
          npm run waterline:fixtures
          npm run autopilot:fixtures
      - name: Create exact hardened candidate locally
        run: |
          git config user.name "undercast-waterline"
          git config user.email "undercast-waterline@users.noreply.github.com"
          git add scripts/autopilot.mjs scripts/autopilot-cli-fixtures.mjs \
            scripts/lib/waterline.mjs scripts/waterline.mjs scripts/waterline-fixtures.mjs docs/WATERLINE.md
          git commit -m "Waterline: bind lease paths and protect incident closure"
      - name: Gate exact hardened candidate
        run: npm run gate
      - name: Publish exact gated commit
        run: git push origin HEAD:agent/rolling-gold-waterline
