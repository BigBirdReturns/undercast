name: rolling-waterline-health

on:
  schedule:
    - cron: "41 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: rolling-waterline-health
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Validate rolling waterline
        run: npm run waterline -- validate
      - name: Capture current operating health
        run: |
          mkdir -p .waterline-health
          npm run waterline -- status --scope star-trek --json > .waterline-health/waterline.json
          npm run media:audit -- status --scope star-trek --json > .waterline-health/media-audit.json
          npm run autopilot -- status --scope star-trek --json > .waterline-health/autopilot.json
          npm run preserve:status -- --json > .waterline-health/preservation.json
          npm run roadmap -- status --json > .waterline-health/roadmap.json
          sha256sum .waterline-health/*.json > .waterline-health/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: rolling-waterline-health-${{ github.run_id }}
          path: .waterline-health
          if-no-files-found: error
          retention-days: 30
