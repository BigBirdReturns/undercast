name: apply-full-site-sweep-v2

on:
  push:
    branches: [agent/full-site-integrity-design-sweep]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: apply-full-site-sweep-v2
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name != 'pull_request' || (github.event.pull_request.number == 74 && github.head_ref == 'agent/full-site-integrity-design-sweep')
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-site-integrity-design-sweep
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install deterministic and rendered-test runtime
        run: npm ci

      - name: Apply both permanent sweeps
        run: |
          python .github/site-sweep-v2/apply.py
          python .github/site-sweep-v2/fix-approved-absence.py
          node --check scripts/site-sweep.mjs
          node --check scripts/site-sweep-fixtures.mjs
          node --check scripts/build-record-pages.mjs
          node --check scripts/gate.mjs

      - name: Rebuild every deterministic projection and permanent route
        run: |
          node scripts/shard.mjs
          node scripts/build-record-pages.mjs
          node scripts/build-contract.mjs

      - name: Prove role integrity and design convergence before commit
        run: |
          mkdir -p site-sweep-diagnostics
          set -o pipefail
          {
            set -x
            npm run species:fixtures
            npm run site:sweep:fixtures
            npm run site:sweep
            npm run test:site-seams
            node scripts/validate.mjs
            git diff --check
          } 2>&1 | tee site-sweep-diagnostics/proof.log

      - name: Remove one-shot audit machinery
        run: |
          rm -rf .github/site-sweep-v2 .github/site-sweep site-sweep-diagnostics
          rm -f \
            .github/workflows/apply-full-site-sweep-v2.yml \
            .github/workflows/export-site-sweep.yml
          git config user.name 'undercast-site-sweep'
          git config user.email 'undercast-site-sweep@users.noreply.github.com'
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'No permanent diff remained after reconciliation.'
          else
            git commit -m 'Audit: land permanent site integrity and fallback sweep'
          fi

      - name: Gate the exact permanent candidate
        run: |
          npx playwright install --with-deps chromium
          npm run gate
          npm run preserve:status -- --json

      - name: Retain diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-site-sweep-diagnostics
          path: |
            site-sweep-diagnostics
            test-results
            playwright-report
            .ci
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish the exact gated candidate
        run: git push origin HEAD:agent/full-site-integrity-design-sweep
